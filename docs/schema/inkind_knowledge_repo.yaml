    description: "Mixin for furniture slots, value maps, and UC rules. Applied to\
      \ FurnitureItem via mixins: [FurnitureCategory]. Uses FurnitureAssessmentEnum\
      \ instead of condition_grade \u2014 see schema description above for the assessment\
      \ model rationale. assessment_result required regardless of usage."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/furniture
