    - preconditions:
        slot_conditions:
          season:
            name: season
            equals_string: summer
      postconditions:
        slot_conditions:
          is_winter_suitable:
            name: is_winter_suitable
            equals_string: 'false'
      description: season = summer implies is_winter_suitable = false.
      title: vm-season-summer
    - preconditions:
        slot_conditions:
          season:
            name: season
            equals_string: all_season
      postconditions:
        slot_conditions:
          is_winter_suitable:
            name: is_winter_suitable
            equals_string: 'true'
      description: season = all_season implies is_winter_suitable = true.
      title: vm-season-all
  FurnitureCategory:
