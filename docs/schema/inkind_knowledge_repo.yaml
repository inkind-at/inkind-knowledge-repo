        see_also:
        - pto:Chair
      tables:
        text: tables
        description: Dining tables, coffee tables, desks. dimensions required.
        see_also:
        - pto:Table
      beds:
        text: beds
        description: Bed frames and divans. dimensions required.
        see_also:
        - pto:Bed
      storage_units:
        text: storage_units
        description: Wardrobes, cabinets, chests of drawers.
        see_also:
        - pto:Cabinet
      shelving:
        text: shelving
        description: Shelving units, bookcases, wall-mounted shelves.
      other:
        text: other
        description: Furniture not fitting above subcategories.
  FurnitureMaterialEnum:
    name: FurnitureMaterialEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/FurnitureMaterialEnum
    description: Primary furniture construction material. Grounded in schema:material
      (schema.org property on schema:Product, superseding GoodRelations gr:qualitativeProductOrServiceProperty).
      Valid values per subcategory constrained by vm-material-* rules.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/furniture
    permissible_values:
      wood:
        text: wood
        description: Solid wood or wood-composite (MDF, plywood, chipboard).
        see_also:
        - pto:Wood
        - schema:material
      metal:
        text: metal
        description: Metal frame (steel, aluminium, iron).
        see_also:
        - schema:material
      plastic:
        text: plastic
        description: Plastic or synthetic polymer primary construction.
        see_also:
        - schema:material
      fabric:
        text: fabric
        description: Upholstered fabric (sofas, chairs). Not valid for tables or beds.
        see_also:
        - schema:material
      glass:
        text: glass
        description: Glass panels or surface (glass-top tables). Not valid for beds.
        see_also:
        - schema:material
      mixed:
        text: mixed
        description: Mixed or composite materials.
        see_also:
        - schema:material
  BeddingAssessmentEnum:
    name: BeddingAssessmentEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/BeddingAssessmentEnum
    description: Structured hygiene and condition assessment for bedding and textiles.
      Replaces former boolean slots has_been_washed and is_mattress_hygienic. Required
      at sorting regardless of usage.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/bedding_textiles
    permissible_values:
      clean_unused:
        text: clean_unused
        description: Clearly unused/new with original packaging intact or no signs
          of previous use. No hygiene concerns.
      clean_washed:
        text: clean_washed
        description: Previously used but confirmed laundered and clean. No staining,
          odour, or hygiene concerns. Fully redistributable.
      clean_with_visible_staining:
        text: clean_with_visible_staining
        description: "Clean and odour-free but with visible staining. Structurally\
          \ sound. action: warn \u2014 sorting_notes required."
      used_not_confirmed_washed:
        text: used_not_confirmed_washed
        description: "Used item where laundering cannot be confirmed. action: warn\
          \ \u2014 sorting_notes required."
      hygiene_concern:
        text: hygiene_concern
        description: 'Visible contamination, significant staining, odour, infestation,
          or other hygiene issue. Redistribution unsafe. action: block, suggest: disposal.'
  BeddingTextilesSubcategoryEnum:
    name: BeddingTextilesSubcategoryEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/BeddingTextilesSubcategoryEnum
    description: Bedding and household textiles subcategories. Aligned with COICOP
      05.2. is_winter_suitable is meaningful for the first five subcategories; suppressed
      by the fragment compiler for the last three.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/bedding_textiles
    permissible_values:
      blankets:
        text: blankets
        description: "Blankets, throws, fleece covers. UNHCR NFI core relief item.\
          \ is_winter_suitable required \u2014 a fleece blanket and a cotton throw\
          \ serve very different needs in cold-weather distribution."
        see_also:
        - pto:Blanket
      duvets_quilts:
        text: duvets_quilts
        description: "Duvets, quilts, continental quilts. is_winter_suitable required\
          \ \u2014 tog rating (if legible) may be noted in sorting_notes."
        see_also:
        - pto:Duvet
      pillows:
        text: pillows
        description: Pillows and sleeping cushions.
        see_also:
        - pto:Pillow
      mattresses:
        text: mattresses
        description: "Single, double, children's mattresses. Hygiene UC applies. is_winter_suitable\
          \ typically not meaningful \u2014 suppressed in UI."
        see_also:
        - pto:Mattress
      sleeping_bags:
        text: sleeping_bags
        description: "Adult and general sleeping bags and camping bedding. UNHCR NFI\
          \ core relief item. is_winter_suitable required and UC-enforced \u2014 a\
          \ summer sleeping bag in cold-weather emergency distribution is a safety\
          \ risk. Thermal rating (e.g. \"3-season\", \"-10\xB0C comfort limit\") may\
          \ be noted in sorting_notes. IMPORTANT: Baby sleeping bags (0-24 months)\
          \ \u2192 BabyInfantItem (subcategory: sleeping_bags). EN 16781:2018 applies\
          \ \u2014 neck and armhole safety assessment required. Do not sort into this\
          \ category."
        see_also:
        - pto:Sleeping_bag
      bedsheets:
        text: bedsheets
        description: Fitted sheets, flat sheets, pillowcases, duvet covers.
      towels:
        text: towels
        description: "Bath, hand, face, beach towels. is_winter_suitable not meaningful\
          \ \u2014 suppressed by fragment compiler."
        see_also:
        - pto:Towel
      curtains_blinds:
        text: curtains_blinds
        description: "Curtains, net curtains, roller blinds. is_winter_suitable not\
          \ meaningful at item level \u2014 suppressed by fragment compiler."
        see_also:
        - pto:Curtain
      tablecloths_napkins:
        text: tablecloths_napkins
        description: Tablecloths, placemats, cloth napkins. Seasonal not applicable.
      other:
        text: other
        description: Household textiles not fitting above subcategories.
  HouseholdSubcategoryEnum:
    name: HouseholdSubcategoryEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/HouseholdSubcategoryEnum
    description: Household and kitchen goods subcategories aligned with COICOP 05.3-05.5.
