        tag: completeness_standard
        value: subcategory, is_set_complete, assessment_result, is_winter_suitable,
          usage
      completeness_detailed:
        tag: completeness_detailed
        value: subcategory, is_set_complete, assessment_result, is_winter_suitable,
          usage
      coicop_division:
        tag: coicop_division
        value: '05.2'
      unhcr_nfi_category:
        tag: unhcr_nfi_category
        value: household_items
      winter_suitable_subcategories:
        tag: winter_suitable_subcategories
        value: blankets, duvets_quilts, pillows, mattresses, sleeping_bags, bedsheets
      winter_suppress_subcategories:
        tag: winter_suppress_subcategories
        value: towels, curtains_blinds, tablecloths_napkins
    description: "Mixin for bedding and textiles slots and UC rules. Applied to BeddingTextilesItem\
      \ via mixins: [BeddingTextilesCategory]. Split from HouseholdItem per COICOP\
      \ 05.2 and UNHCR NFI standards. Uses BeddingAssessmentEnum \u2014 hygiene is\
      \ the primary redistribution signal. is_winter_suitable added for thermal weight\
      \ signal on blankets, duvets, and sleeping bags. SeasonEnum not declared \u2014\
      \ binary is sufficient for bedding. See schema description for full rationale."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/bedding_textiles
    see_also:
    - http://www.productontology.org/id/Bedding
    - https://emergency.unhcr.org/emergency-assistance/core-relief-items/kind-non-food-item-distribution
    is_a: CategoryMixin
    mixin: true
    slots:
    - notes
    - material
    - BeddingTextilesCategory_subcategory
    - BeddingTextilesCategory_assessment_result
    - is_set_complete
    - BeddingTextilesCategory_is_winter_suitable
    slot_usage:
      subcategory:
        name: subcategory
        range: BeddingTextilesSubcategoryEnum
        required: true
      assessment_result:
        name: assessment_result
        description: "Hygiene and condition assessment. Required regardless of usage\
          \ \u2014 new items may have packaging damage or factory soiling."
        range: BeddingAssessmentEnum
        required: true
      is_winter_suitable:
        name: is_winter_suitable
        description: "Whether this bedding item provides meaningful warmth for cold\
          \ conditions. Required at standard completeness for blankets, duvets_quilts,\
          \ and sleeping_bags. Not meaningful for towels, curtains, tablecloths. Suppressed\
          \ by fragment compiler for those subcategories via the season_relevant_subcategories\
          \ annotation.\nCritical for sleeping bags \u2014 a summer sleeping bag issued\
          \ in a cold-weather emergency is dangerous. Thermal rating in tog or season\
          \ number may be noted in sorting_notes as free text."
        range: boolean
        required: false
    class_uri: inkind_knowledge_repo:BeddingTextilesCategory
    rules:
    - preconditions:
        slot_conditions:
          assessment_result:
            name: assessment_result
            equals_string: hygiene_concern
      postconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            none_of:
            - equals_string: stored
            - equals_string: distributed
      description: 'Items with hygiene concerns must not be redistributed. Covers
        mattress staining, infestation signs, biological contamination, and packaging
        damage on new items. Applies regardless of usage. action: block, suggest:
        disposal.'
      title: uc-bedding-hygiene-concern-block
    - preconditions:
        slot_conditions:
          assessment_result:
            name: assessment_result
            equals_string: used_not_confirmed_washed
      postconditions:
        slot_conditions:
          sorting_notes:
            name: sorting_notes
            required: true
      description: "Used items where laundering is unconfirmed require sorter confirmation.\
        \ action: warn \u2014 sorting_notes required."
      title: uc-bedding-not-washed-warn
    - preconditions:
        slot_conditions:
          assessment_result:
            name: assessment_result
            equals_string: clean_with_visible_staining
      postconditions:
        slot_conditions:
          sorting_notes:
            name: sorting_notes
            required: true
      description: "Visibly stained items require sorter confirmation. action: warn\
        \ \u2014 sorting_notes required."
      title: uc-bedding-stained-warn
    - preconditions:
        slot_conditions:
          subcategory:
            name: subcategory
            equals_string: sleeping_bags
      postconditions:
        slot_conditions:
          is_winter_suitable:
            name: is_winter_suitable
            required: true
      description: "Sleeping bags require is_winter_suitable to be explicitly set.\
        \ A summer sleeping bag issued in a cold-weather emergency is a genuine safety\
        \ risk. Sorters must assess the thermal rating. action: warn \u2014 is_winter_suitable\
        \ must be set at sorted state."
      title: uc-bedding-sleeping-bag-winter-required
