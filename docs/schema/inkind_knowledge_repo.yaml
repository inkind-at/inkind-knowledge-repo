      postconditions:
        slot_conditions:
          assessment_result:
            name: assessment_result
            required: true
      description: assessment_result required at sorted state regardless of usage.
        New furniture can have manufacturing defects (cracked panels, defective joints,
        damaged flatpack components).
      title: lc-sorted-furniture-assessment-required
  BeddingTextilesItem:
    name: BeddingTextilesItem
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/BeddingTextilesItem
    annotations:
      label_en:
        tag: label_en
        value: Bedding and Textiles
      label_de:
        tag: label_de
        value: "Bettw\xE4sche und Textilien"
    description: "Bedding and household textiles: blankets, duvets, mattresses, pillows,\
      \ sleeping bags, towels, curtains. COICOP 05.2 (household textiles).\nSeparated\
      \ from HouseholdItem following COICOP 05.2 and UNHCR NFI kit standards, which\
      \ list blankets and sleeping mats as core relief items at the same priority\
      \ level as clothing \u2014 not incidental household goods. The hygiene assessment\
      \ vocabulary (BeddingAssessmentEnum) also differs fundamentally from household\
      \ item wear grading.\nAssessment: BeddingAssessmentEnum (hygiene and condition\
      \ assessment). Hygiene state is the primary redistribution signal for bedding\
      \ \u2014 a worn but clean blanket is redistributable; a visually intact but\
      \ stained mattress is not. assessment_result required regardless of usage because\
      \ new items may have packaging damage or factory soiling.\nUNHCR NFI standards\
      \ reference:\n  https://emergency.unhcr.org/emergency-assistance/core-relief-items/\n\
      \  kind-non-food-item-distribution"
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_item
    see_also:
    - http://www.productontology.org/id/Bedding
    - https://emergency.unhcr.org/emergency-assistance/core-relief-items/kind-non-food-item-distribution
    mappings:
    - pto:Bedding
    is_a: DonationItem
    mixins:
    - BeddingTextilesCategory
    slots:
    - id
    - DonationItem_usage
    - DonationItem_category
    - DonationItem_lifecycle_state
    - DonationItem_attribute_completeness
    - DonationItem_source_collection
    - DonationItem_donation_source
    - DonationItem_storage_unit
    - sorting_notes
    - created_at
    - updated_at
    - BeddingTextilesCategory_subcategory
    - BeddingTextilesCategory_material
    - BeddingTextilesCategory_assessment_result
    - is_set_complete
    - BeddingTextilesCategory_is_winter_suitable
    class_uri: pto:Bedding
    rules:
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
      postconditions:
        slot_conditions:
          assessment_result:
            name: assessment_result
            required: true
      description: assessment_result required at sorted state regardless of usage.
        New items may have packaging damage or factory soiling.
      title: lc-sorted-bedding-assessment-required
  HouseholdItem:
    name: HouseholdItem
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/HouseholdItem
    annotations:
      label_en:
        tag: label_en
        value: Household
