          is_sealed:
            name: is_sealed
            required: true
      description: is_sealed required at sorted state regardless of usage. Even new
        personal care items may have compromised packaging.
      title: lc-sorted-personal-care-sealed-required
  MobilityAidsItem:
    name: MobilityAidsItem
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/MobilityAidsItem
    annotations:
      label_en:
        tag: label_en
        value: Mobility Aids and Assistive Devices
      label_de:
        tag: label_de
        value: "Mobilit\xE4tshilfen und Hilfsger\xE4te"
    description: "Mobility aids and assistive devices: wheelchairs, crutches, walking\
      \ frames, hearing aids, orthotics, daily living aids. COICOP 06.1.3 (other medical\
      \ products) and 06.2 (outpatient services, durable medical equipment). Open\
      \ Eligibility \"Assistive Technology\" top-level category:\n  https://company.auntbertha.com/openeligibility/\n\
      \nAssessment: MobilityAssessmentEnum (structured safety and hygiene). A single\
      \ enum captures structural soundness, functional state, and body-contact hygiene\
      \ (used hearing aids, orthotics) \u2014 replacing the former separate boolean\
      \ structural_integrity + functional_status slots that generated the problematic\
      \ annotation-based approach. assessment_result required regardless of usage\
      \ \u2014 new mobility aids can have manufacturing defects."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_item
    see_also:
    - http://www.productontology.org/id/Assistive_technology
    - https://company.auntbertha.com/openeligibility/
    mappings:
    - pto:Assistive_technology
    is_a: DonationItem
    mixins:
    - MobilityAidsCategory
    slots:
    - id
    - DonationItem_usage
    - DonationItem_category
    - DonationItem_lifecycle_state
    - DonationItem_attribute_completeness
    - DonationItem_source_collection
    - DonationItem_donation_source
    - DonationItem_storage_unit
    - sorting_notes
    - created_at
    - updated_at
    - material
    - MobilityAidsCategory_subcategory
    - MobilityAidsCategory_assessment_result
    class_uri: pto:Assistive_technology
    rules:
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
      postconditions:
        slot_conditions:
          assessment_result:
            name: assessment_result
            required: true
      description: assessment_result required at sorted state regardless of usage.
        New mobility aids can have manufacturing defects.
      title: lc-sorted-mobility-assessment-required
  BabyInfantItem:
    name: BabyInfantItem
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/BabyInfantItem
    annotations:
      label_en:
        tag: label_en
        value: Baby and Infant Supplies
      label_de:
        tag: label_de
        value: Baby- und Kleinkindausstattung
    description: "Baby and infant supplies: pushchairs, cots, car seats, infant formula,\
      \ feeding bottles, baby monitors, bath equipment. Baby clothing belongs in ClothingItem\
      \ (demographic=baby).\nCOICOP distributes baby items across Division 03 (clothing),\
      \ 05 (household), and 01 (food). Treated as a first-class top-level category\
      \ here following Open Eligibility \"Baby Supplies\" and UNHCR NFI kit practice\
      \ (nappies and formula are core NFI kit items):\n  https://company.auntbertha.com/openeligibility/\n\
      \  https://emergency.unhcr.org/emergency-assistance/core-relief-items/\n\nThree-track\
      \ assessment model (defined in BabyInfantCategory):\n  Track 1 \u2014 safety-critical\
      \ equipment (BabyEquipmentAssessmentEnum):\n    pushchairs, cots, car seats,\
      \ carriers, high chairs, sleeping bags.\n    EN 1888 (pushchairs), EN 716 (cots),\
      \ EN 14344 (car seats),\n    EN 16781 (baby sleeping bags \u2014 neck/armhole\
      \ openings, no loose\n    cords), all require structured provenance + structural\
      \ assessment.\n    Baby sleeping bags are Track 1, NOT BeddingTextilesItem \u2014\
      \ the\n    EN 16781 safety check differs materially from adult sleeping bag\n\
      \    hygiene assessment.\n  Track 2 \u2014 consumables (is_sealed + expiry_date):\n\
      \    infant_formula, feeding_bottles_teats, baby_food.\n  Track 3 \u2014 general\
      \ baby gear (condition_grade):\n    bath equipment, changing, monitors, bouncers."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_item
    see_also:
    - http://www.productontology.org/id/Baby_transport
    - http://www.productontology.org/id/Infant_bed
    - https://company.auntbertha.com/openeligibility/
    - https://emergency.unhcr.org/emergency-assistance/core-relief-items/kind-non-food-item-distribution
    mappings:
    - pto:Baby_transport
    is_a: DonationItem
    mixins:
    - BabyInfantCategory
    slots:
    - id
    - DonationItem_usage
    - DonationItem_category
    - DonationItem_lifecycle_state
    - DonationItem_attribute_completeness
    - DonationItem_source_collection
    - DonationItem_donation_source
    - DonationItem_storage_unit
    - sorting_notes
    - created_at
    - updated_at
    - material
    - BabyInfantCategory_subcategory
    - BabyInfantCategory_assessment_result
    - manufacture_year
    - includes_original_accessories
    - BabyInfantCategory_is_winter_suitable
    - BabyInfantCategory_is_sealed
    - expiry_date
    - BabyInfantCategory_condition_grade
    class_uri: pto:Baby_transport
    rules:
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
          subcategory:
            name: subcategory
            equals_string: sleeping_bags
      postconditions:
        slot_conditions:
          is_winter_suitable:
            name: is_winter_suitable
            required: true
      description: "is_winter_suitable required at sorted state for baby sleeping\
        \ bags. A summer-weight baby sleeping bag (0.5-1.0 tog) issued in cold- weather\
        \ distribution is a safety risk \u2014 infants cannot regulate their own temperature.\
        \ BabyInfantCategory also carries this rule; the lifecycle rule here ensures\
        \ it is enforced at the sorted transition."
      title: lc-sorted-baby-sleeping-bag-winter-required
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
      postconditions:
        slot_conditions:
          subcategory:
            name: subcategory
            required: true
      description: subcategory required at sorted state. BabyInfantCategory rules
        then enforce the appropriate assessment track for that subcategory.
      title: lc-sorted-baby-subcategory-required
    - preconditions:
        slot_conditions:
          subcategory:
            name: subcategory
            any_of:
            - equals_string: cots_cribs
            - equals_string: car_seats
            - equals_string: pushchairs_prams
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
      postconditions:
        slot_conditions:
          manufacture_year:
            name: manufacture_year
            required: true
      description: Manufacture year is required for certain subcategories.
      title: lc-manufacture-year-required
  FoodItem:
    name: FoodItem
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/FoodItem
    annotations:
      label_en:
        tag: label_en
        value: Food
      label_de:
        tag: label_de
        value: Essen
    description: "Food donation item. COICOP Division 01 (food and non-alcoholic beverages).\
      \ Grounded in FoodOn (OBO Foundry food ontology):\n  http://purl.obolibrary.org/obo/foodon.owl\n\
      \nPhase 1 stub \u2014 fully declared to establish the schema; the sort_food\
      \ process path is activated when food-bank organisations are onboarded.\nAssessment:\
      \ packaging_intact + expiry_date (defined in FoodCategory). No condition_grade\
      \ or assessment_result \u2014 food safety is binary: packaging intact or not,\
      \ expired or not. FoodCategory does not extend CategoryMixin for this reason."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_item
    see_also:
    - foodon:00001006
    - http://purl.obolibrary.org/obo/foodon.owl
    mappings:
    - foodon:00001006
    is_a: DonationItem
    mixins:
    - FoodCategory
    slots:
    - id
    - DonationItem_usage
    - DonationItem_category
    - DonationItem_lifecycle_state
    - DonationItem_attribute_completeness
    - DonationItem_source_collection
    - DonationItem_donation_source
    - DonationItem_storage_unit
    - sorting_notes
    - created_at
    - updated_at
    - FoodCategory_food_type
    - FoodCategory_expiry_date
    - FoodCategory_packaging_intact
    - FoodCategory_storage_requirement
    - quantity
    class_uri: foodon:00001006
    rules:
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
      postconditions:
        slot_conditions:
          storage_requirement:
            name: storage_requirement
            required: true
      description: storage_requirement required at sorted state.
      title: lc-sorted-food-storage-required
  OtherItem:
    name: OtherItem
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/OtherItem
    annotations:
      label_en:
        tag: label_en
        value: Other
      label_de:
        tag: label_de
        value: Sonstiges
    description: "Catch-all for donation items not fitting any other category. No\
      \ mixin \u2014 minimal slots only (item_description + condition_grade). Use\
      \ sparingly: if a new item type appears frequently in operations, it warrants\
      \ a proper subclass with a category mixin and dedicated sorting fragment rather\
      \ than accumulating in OtherItem."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_item
    mappings:
    - schema:Product
    is_a: DonationItem
    slots:
    - id
    - DonationItem_usage
    - DonationItem_category
    - DonationItem_lifecycle_state
    - DonationItem_attribute_completeness
    - DonationItem_source_collection
    - DonationItem_donation_source
    - DonationItem_storage_unit
    - sorting_notes
    - created_at
    - updated_at
    - OtherItem_item_description
    - OtherItem_condition_grade
    slot_usage:
      item_description:
        name: item_description
        required: true
      condition_grade:
        name: condition_grade
        range: UsedConditionGradeEnum
        required: false
    class_uri: schema:Product
    rules:
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
      postconditions:
        slot_conditions:
          item_description:
            name: item_description
            required: true
          condition_grade:
            name: condition_grade
            required: true
      description: item_description and condition_grade required at sorted state.
        item_description provides the minimum human-readable record for items with
        no controlled vocabulary.
      title: lc-sorted-other-required-fields
  AnyValue:
    name: AnyValue
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/AnyValue
    description: Current workaround before proper attributes are introduced. Unconstrained
      value holder for schemaless JSON blobs. Used for DemandSignal.attributes until
      the Phase 2 typed ItemAttributes refactor.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/demand_signal
    slots:
    - subcategory
    - demographic
    - size
    class_uri: inkind_knowledge_repo:AnyValue
  DemandSignal:
    name: DemandSignal
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/DemandSignal
    description: A signal representing demand for a category of items.  Covers standing
      interests, time-bounded campaigns, and specific beneficiary requests under a
      single unified model.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/demand_signal
    see_also:
    - schema:Demand
    slots:
    - id
    - DemandSignal_org
    - signal_type
    - DemandSignal_category
    - attributes
    - quantity_requested
    - quantity_fulfilled
    - campaign
    - holder
    - context_note
    - deadline
    - DemandSignal_urgency_tier
    - DemandSignal_lifecycle_state
    - registered_at
    - public_visibility
    slot_usage:
      org:
        name: org
        range: SocialOrganisation
        required: true
      category:
        name: category
        see_also:
        - openeligibility:ServiceTag
        range: CategoryEnum
        required: true
      lifecycle_state:
        name: lifecycle_state
        range: DemandSignalLifecycleEnum
        required: true
      urgency_tier:
        name: urgency_tier
        see_also:
        - openeligibility:HumanSituation
        range: UrgencyTierEnum
        required: false
    class_uri: inkind_knowledge_repo:DemandSignal
  Campaign:
    name: Campaign
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/Campaign
    description: A public-facing appeal grouping related DemandSignals under a shared
      title, timeline, and beneficiary group.  Campaign progress is derived from its
      child signals.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/campaign
    mappings:
    - schema:Event
    slots:
    - id
    - Campaign_org
    - title
    - description
    - starts_at
    - ends_at
    - target_beneficiary_group
    - Campaign_lifecycle_state
    - signals
    slot_usage:
      org:
        name: org
        range: SocialOrganisation
        required: true
      lifecycle_state:
        name: lifecycle_state
        range: CampaignLifecycleEnum
        required: true
    class_uri: schema:Event
  CategoryMixin:
    name: CategoryMixin
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/CategoryMixin
    description: "Abstract mixin base for all category classes except FoodCategory.\n\
      Provides shared slots (material) available to all categories. Does NOT declare\
      \ a condition rule \u2014 each category type handles condition differently (see\
      \ schema description above for full rationale).\nFoodCategory does not extend\
      \ this mixin because food safety assessment uses packaging_intact + expiry_date\
      \ rather than condition_grade or assessment_result. Extending CategoryMixin\
      \ would pull in slots that are semantically incorrect for food items.\nAll other\
      \ concrete category mixins extend CategoryMixin and declare their own condition\
      \ approach (condition_grade or assessment_result) along with category-specific\
      \ slots, UC rules, VM rules, and completeness tier annotations."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/_base
    mixin: true
    slots:
    - material
    class_uri: inkind_knowledge_repo:CategoryMixin
  AccessoriesCategory:
    name: AccessoriesCategory
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/AccessoriesCategory
    annotations:
      completeness_minimal:
        tag: completeness_minimal
        value: subcategory, usage
      completeness_standard:
        tag: completeness_standard
        value: subcategory, usage, condition_grade
      completeness_detailed:
        tag: completeness_detailed
        value: subcategory, demographic, material, usage, condition_grade
      coicop_division:
        tag: coicop_division
        value: '03.1'
    description: "Mixin for fashion and personal accessories. Applied to AccessoriesItem\
      \ via mixins: [AccessoriesCategory]. Deliberately simpler than ClothingCategory\
      \ \u2014 no size dimension, no demographic\u2192size value map, simpler demographic\
      \ vocabulary, no underwear UC rules. See schema description above for full rationale."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/accessories
    see_also:
    - http://www.productontology.org/id/Fashion_accessory
    is_a: CategoryMixin
    mixin: true
    slots:
    - AccessoriesCategory_subcategory
    - AccessoriesCategory_demographic
    - AccessoriesCategory_material
    - AccessoriesCategory_condition_grade
    slot_usage:
      subcategory:
        name: subcategory
        range: AccessoriesSubcategoryEnum
        required: true
      demographic:
        name: demographic
        description: 'Optional age group. Not applicable to most accessories (bags,
          jewellery, belts are generally adult by default). Use for clearly age-targeted
          items: children''s hats, baby mittens, baby carriers (though carriers belong
          in BabyInfantItem).'
        range: AccessoriesDemographicEnum
        required: false
      material:
        name: material
        description: "Primary construction material of the accessory. Optional \u2014\
          \ detailed completeness tier. Record the dominant material; use other and\
          \ note the specific material in sorting_notes when known. See AccessoriesMaterialEnum\
          \ for full vocabulary and ontology grounding."
        range: AccessoriesMaterialEnum
        required: false
      condition_grade:
        name: condition_grade
        range: UsedConditionGradeEnum
        required: false
    class_uri: inkind_knowledge_repo:AccessoriesCategory
  ClothingCategory:
    name: ClothingCategory
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/ClothingCategory
    annotations:
      completeness_minimal:
        tag: completeness_minimal
        value: subcategory, usage
      completeness_standard:
        tag: completeness_standard
        value: subcategory, demographic, size, is_winter_suitable, usage, condition_grade
      completeness_detailed:
        tag: completeness_detailed
        value: subcategory, demographic, size, is_winter_suitable, season, material,
          usage, condition_grade, intact_labels
      coicop_division:
        tag: coicop_division
        value: '03.1'
      material_winter_hint:
        tag: material_winter_hint
        value: Fragment compiler may pre-fill is_winter_suitable=true when material
          in [wool, fleece, down] and is_winter_suitable=false when material in [linen,
          silk]. Sorter can always override.
      season_ui_hint:
        tag: season_ui_hint
        value: Fragment compiler may pre-fill is_winter_suitable=true when subcategory=outerwear
          and is_winter_suitable=false when subcategory=sportswear (swimwear). Sorter
          can override.
    description: "Mixin carrying clothing-specific slots, value maps, and UC rules.\
      \ Applied to ClothingItem via mixins: [ClothingCategory]. Does NOT include accessories\
      \ \u2014 see AccessoriesCategory (accessories.yaml).\nDomain-level rules only\
      \ (no lifecycle_state references). Lifecycle-aware rules (lc-*) live on ClothingItem\
      \ in donation_item.yaml because lifecycle_state is a DonationItem slot invisible\
      \ to this mixin.\nValue maps grounded in CPI ontology demographic and size vocabularies.\
      \ Underwear UC constraints reflect real social-sector hygiene policy. Seasonality:\
      \ is_winter_suitable (boolean, standard tier) + season (SeasonEnum, optional,\
      \ detailed tier). See schema description above for the full design rationale."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/clothing
    see_also:
    - http://www.ebusiness-unibw.org/ontologies/cpi/ns#ClothingAndAccessories
    is_a: CategoryMixin
    mixin: true
    slots:
    - ClothingCategory_condition_grade
    - ClothingCategory_subcategory
    - ClothingCategory_material
    - ClothingCategory_is_winter_suitable
    - ClothingCategory_demographic
    - ClothingCategory_size
    - ClothingCategory_season
    - intact_labels
    slot_usage:
      subcategory:
        name: subcategory
        description: Subcategory becomes a required field on DonationItem when item's
          lifecycle is sorted.
        range: ClothingSubcategoryEnum
        required: false
      demographic:
        name: demographic
        range: DemographicEnum
        required: false
      size:
        name: size
        range: ClothingSizeEnum
        required: false
      is_winter_suitable:
        name: is_winter_suitable
        description: "Whether this garment provides meaningful warmth in cold-weather\
          \ conditions. Required at standard completeness for tops, bottoms, outerwear,\
          \ nightwear. The sorter's direct assessment \u2014 not inferred from subcategory\
          \ or material. The primary emergency distribution filter: \"all winter-suitable\
          \ clothing for adults.\""
        range: boolean
        required: false
      season:
        name: season
        description: "Seasonal suitability. Optional \u2014 detailed completeness\
          \ tier. Multivalued: a garment may span seasons (e.g. spring_autumn + summer).\
          \ VM rules auto-derive is_winter_suitable for the extreme values (winter,\
          \ summer, all_season); spring_autumn leaves the sorter to set is_winter_suitable\
          \ explicitly."
        range: SeasonEnum
        required: false
        multivalued: true
      material:
        name: material
        description: "Primary fibre or fabric composition. Optional \u2014 detailed\
          \ completeness tier. Select the dominant fibre for blended fabrics; use\
          \ synthetic_blend when no single synthetic dominates. Exact fibre percentages\
          \ from legible care labels may be noted in sorting_notes. See ClothingMaterialEnum\
          \ for full vocabulary and ontology grounding."
        range: ClothingMaterialEnum
        required: false
      condition_grade:
        name: condition_grade
        range: UsedConditionGradeEnum
        required: false
    class_uri: inkind_knowledge_repo:ClothingCategory
    rules:
    - preconditions:
        slot_conditions:
          subcategory:
            name: subcategory
            equals_string: underwear
          condition_grade:
            name: condition_grade
            any_of:
            - equals_string: fair
            - equals_string: poor
      postconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            none_of:
            - equals_string: stored
            - equals_string: distributed
      description: 'Underwear must be new or like_new condition. fair or poor graded
        underwear must not be redistributed. Reflects universal hygiene policy across
        social organisations. action: block, suggest: disposal.'
      title: uc-underwear-condition-block
    - preconditions:
        slot_conditions:
          subcategory:
            name: subcategory
            equals_string: underwear
          demographic:
            name: demographic
            any_of:
            - equals_string: adult_male
            - equals_string: adult_female
          usage:
            name: usage
            equals_string: used
      postconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            none_of:
            - equals_string: stored
            - equals_string: distributed
      description: 'Used adult underwear (adult_male or adult_female demographic)
        must not be redistributed. usage must be new. Reflects hygiene and dignity
        standards applied universally in the social sector. action: block.'
      title: uc-underwear-adult-used-block
    - preconditions:
        slot_conditions:
          condition_grade:
            name: condition_grade
            equals_string: poor
      postconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            none_of:
            - equals_string: stored
            - equals_string: distributed
      description: 'Items in poor condition should not be distributed. action: block,
        suggest: disposal.'
      title: uc-poor-condition-block
    - preconditions:
        slot_conditions:
          subcategory:
            name: subcategory
            equals_string: underwear
      postconditions:
        slot_conditions:
          demographic:
            name: demographic
            any_of:
            - equals_string: baby
            - equals_string: child
            - equals_string: adult_male
            - equals_string: adult_female
      description: "Underwear subcategory restricts demographic to baby, child, adult_male,\
        \ adult_female. Unisex is not a valid demographic for underwear \u2014 underwear\
        \ is always gender-specific at the redistribution level."
      title: vm-demographic-underwear
    - preconditions:
        slot_conditions:
          demographic:
            name: demographic
            equals_string: baby
      postconditions:
        slot_conditions:
          size:
            name: size
            any_of:
            - equals_string: baby_0_3m
            - equals_string: baby_3_6m
            - equals_string: baby_6_12m
            - equals_string: baby_12_18m
            - equals_string: baby_18_24m
      description: baby demographic constrains size to infant size codes.
      title: vm-size-baby
    - preconditions:
        slot_conditions:
          demographic:
            name: demographic
            equals_string: child
      postconditions:
        slot_conditions:
          size:
            name: size
            any_of:
            - equals_string: child_2_3T
            - equals_string: child_4_5T
            - equals_string: child_6_7
            - equals_string: child_8_10
            - equals_string: child_12_14
      description: child demographic constrains size to children's size codes.
      title: vm-size-child
    - preconditions:
        slot_conditions:
          demographic:
            name: demographic
            any_of:
            - equals_string: adult_male
            - equals_string: adult_female
            - equals_string: unisex
      postconditions:
        slot_conditions:
          size:
            name: size
            any_of:
            - equals_string: xs_s
            - equals_string: m_l
            - equals_string: xl_plus
            - equals_string: one_size
      description: adult/unisex demographics constrain size to adult size codes.
      title: vm-size-adult
    - preconditions:
        slot_conditions:
          season:
            name: season
            equals_string: winter
      postconditions:
        slot_conditions:
          is_winter_suitable:
            name: is_winter_suitable
            equals_string: 'true'
      description: season = winter implies is_winter_suitable = true. A garment explicitly
        tagged winter must be winter-suitable.
      title: vm-season-winter
    - preconditions:
        slot_conditions:
          is_winter_suitable:
            name: is_winter_suitable
            equals_string: 'false'
      postconditions:
        slot_conditions:
          season:
            name: season
            any_of:
            - equals_string: summer
            - equals_string: spring_autumn
      description: is_winter_suitable = false implies that season cannot be winter
        and all season.
      title: vm-season-not-winter-suitable
    - preconditions:
        slot_conditions:
          season:
            name: season
            equals_string: summer
      postconditions:
        slot_conditions:
          is_winter_suitable:
            name: is_winter_suitable
            equals_string: 'false'
      description: "season = summer implies is_winter_suitable = false. A garment\
        \ explicitly tagged summer-only is not winter-suitable. Note: if a sorter\
        \ tags both summer and spring_autumn, the is_winter_suitable value is their\
        \ explicit call \u2014 no rule fires."
      title: vm-season-summer
    - preconditions:
        slot_conditions:
          season:
            name: season
            equals_string: all_season
      postconditions:
        slot_conditions:
          is_winter_suitable:
            name: is_winter_suitable
            equals_string: 'true'
      description: season = all_season implies is_winter_suitable = true. All-season
        items are by definition suitable in winter.
      title: vm-season-all
  FootwearCategory:
    name: FootwearCategory
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/FootwearCategory
    annotations:
      completeness_minimal:
        tag: completeness_minimal
        value: subcategory, usage
      completeness_standard:
        tag: completeness_standard
        value: subcategory, demographic, shoe_size, shoe_size_system, is_pair_complete,
          is_winter_suitable, usage, condition_grade
      completeness_detailed:
        tag: completeness_detailed
        value: subcategory, demographic, shoe_size, shoe_size_system, is_pair_complete,
          is_winter_suitable, season, material, usage, condition_grade
      coicop_division:
        tag: coicop_division
        value: '03.2'
      season_ui_hint:
        tag: season_ui_hint
        value: Fragment compiler may pre-fill is_winter_suitable=true for boots and
          is_winter_suitable=false for sandals. Sorter can override.
    description: 'Mixin for footwear slots and UC rules. Applied to FootwearItem via
      mixins: [FootwearCategory]. Uses shoe_size + shoe_size_system instead of ClothingSizeEnum.
      Reuses DemographicEnum, is_winter_suitable, and SeasonEnum from clothing.yaml.
      Same VM season auto-derivation rules apply.'
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/footwear
    see_also:
    - http://www.productontology.org/id/Footwear
    is_a: CategoryMixin
    mixin: true
    slots:
    - FootwearCategory_condition_grade
    - FootwearCategory_subcategory
    - FootwearCategory_material
    - is_pair_complete
    - FootwearCategory_is_winter_suitable
    - FootwearCategory_demographic
    - shoe_size
    - shoe_size_system
    - FootwearCategory_season
    slot_usage:
      subcategory:
        name: subcategory
        range: FootwearSubcategoryEnum
        required: true
      demographic:
        name: demographic
        range: DemographicEnum
        required: false
      is_winter_suitable:
        name: is_winter_suitable
        description: "Whether this footwear provides meaningful warmth and weather\
          \ protection in cold conditions. Required at standard completeness. Fragment\
          \ compiler may pre-fill: boots \u2192 true, sandals \u2192 false. Sorter\
          \ always overrides (e.g. a lightweight canvas boot \u2192 false)."
        range: boolean
        required: false
      season:
        name: season
        description: "Seasonal suitability. Optional \u2014 detailed completeness\
          \ tier. Same VM auto-derivation as ClothingCategory:\n  winter \u2192 is_winter_suitable\
          \ = true\n  summer \u2192 is_winter_suitable = false\n  all_season \u2192\
          \ is_winter_suitable = true\n  spring_autumn \u2192 sorter decides is_winter_suitable\
          \ explicitly."
        range: SeasonEnum
        required: false
        multivalued: true
      material:
        name: material
        description: "Primary upper-material. Optional \u2014 detailed completeness\
          \ tier. Record the dominant outer surface material. See FootwearMaterialEnum\
          \ for full vocabulary and ontology grounding."
        range: FootwearMaterialEnum
        required: false
      condition_grade:
        name: condition_grade
        range: UsedConditionGradeEnum
        required: false
    class_uri: inkind_knowledge_repo:FootwearCategory
    rules:
    - preconditions:
        slot_conditions:
          is_pair_complete:
            name: is_pair_complete
            equals_string: 'false'
      postconditions:
        slot_conditions:
          sorting_notes:
            name: sorting_notes
            required: true
      description: "Single shoes require sorter confirmation. Single shoes may still\
        \ be appropriate for beneficiaries with limb differences. action: warn \u2014\
        \ sorting_notes required."
      title: uc-footwear-pair-incomplete-warn
    - preconditions:
        slot_conditions:
          season:
            name: season
            equals_string: winter
      postconditions:
        slot_conditions:
          is_winter_suitable:
            name: is_winter_suitable
            equals_string: 'true'
      description: season = winter implies is_winter_suitable = true.
      title: vm-season-winter
    - preconditions:
        slot_conditions:
          season:
            name: season
            equals_string: summer
      postconditions:
        slot_conditions:
          is_winter_suitable:
            name: is_winter_suitable
            equals_string: 'false'
      description: season = summer implies is_winter_suitable = false.
      title: vm-season-summer
    - preconditions:
        slot_conditions:
          season:
            name: season
            equals_string: all_season
      postconditions:
        slot_conditions:
          is_winter_suitable:
            name: is_winter_suitable
            equals_string: 'true'
      description: season = all_season implies is_winter_suitable = true.
      title: vm-season-all
  FurnitureCategory:
