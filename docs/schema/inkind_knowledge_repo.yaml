      other:
        text: other
        description: Household textiles not fitting above subcategories.
        annotations:
          label_en:
            tag: label_en
            value: Other
          label_de:
            tag: label_de
            value: Sonstige
  HouseholdMaterialEnum:
    name: HouseholdMaterialEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/HouseholdMaterialEnum
    description: "Primary construction material of a household or kitchen item. Records\
      \ the dominant material; use mixed when no single material dominates (e.g. a\
      \ saucepan with a stainless steel body and plastic handle).\nGrounded in Product\
      \ Types Ontology (pto:) for discrete material types and schema:material as the\
      \ overarching property anchor (schema.org property on schema:Product, superseding\
      \ GoodRelations gr:qualitativeProductOrServiceProperty). pto: grounding is consistent\
      \ with FurnitureMaterialEnum (furniture.yaml).\nTwo redistribution-relevant\
      \ uses:\n  1. Allergen filtering \u2014 nickel in stainless steel cutlery (relevant\
      \ for\n     nickel contact dermatitis, though most modern stainless steel is\n\
      \     safe); copper cookware (rare sensitivity).\n  2. Care requirement matching\
      \ \u2014 cast iron requires seasoning and\n     cannot be soaked; copper requires\
      \ specialist polishing; wood\n     requires periodic oiling; non-stick coatings\
      \ need specific\n     cleaning instructions."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/household
    see_also:
    - schema:material
    permissible_values:
      stainless_steel:
        text: stainless_steel
        description: Stainless steel. Most common material for cutlery, pots, pans,
          kettles, and small appliances.
        annotations:
          label_en:
            tag: label_en
            value: Stainless Steel
          label_de:
            tag: label_de
            value: Edelstahl
        see_also:
        - pto:Stainless_steel
      wood:
        text: wood
        description: Solid wood or wood-composite (including bamboo, which is functionally
          similar). Common for utensils, chopping boards, salad bowls, and home decor.
          Requires periodic oiling; not dishwasher-safe.
        annotations:
          label_en:
            tag: label_en
            value: Wood / Bamboo
          label_de:
            tag: label_de
            value: Holz / Bambus
        see_also:
        - pto:Wood
      ceramic:
        text: ceramic
        description: Ceramic, earthenware, stoneware, or porcelain. Predominant for
          crockery (plates, bowls, mugs), baking dishes, and decorative items. May
          include a glazed finish.
        annotations:
          label_en:
            tag: label_en
            value: Ceramic / Porcelain
          label_de:
            tag: label_de
            value: Keramik / Porzellan
        see_also:
        - pto:Ceramic
      glass:
        text: glass
        description: Glass (borosilicate or soda-lime). Used for drinking glasses,
          storage jars, glass baking dishes, and glass decor items. Fragility relevant
          to packaging during storage and distribution.
        annotations:
          label_en:
            tag: label_en
            value: Glass
          label_de:
            tag: label_de
            value: Glas
        see_also:
        - schema:material
      cast_iron:
        text: cast_iron
        description: "Cast iron cookware (frying pans, casseroles, trivets). Requires\
          \ seasoning and cannot be soaked or put in the dishwasher. Heavy \u2014\
          \ relevant for storage slot load-bearing assessment."
        annotations:
          label_en:
            tag: label_en
            value: Cast Iron
          label_de:
            tag: label_de
            value: Gusseisen
        see_also:
        - pto:Cast_iron
      copper:
        text: copper
        description: Copper or copper-clad cookware and decor. Requires specialist
          polishing to prevent tarnishing.
        annotations:
          label_en:
            tag: label_en
            value: Copper
          label_de:
            tag: label_de
            value: Kupfer
        see_also:
        - pto:Copper
      aluminium:
        text: aluminium
        description: Aluminium cookware and baking trays. Lightweight and common in
          baking trays, roasting pans, and budget cookware.
        annotations:
          label_en:
            tag: label_en
            value: Aluminium
          label_de:
            tag: label_de
            value: Aluminium
        see_also:
        - pto:Aluminium
      non_stick:
        text: non_stick
        description: 'Non-stick coated cookware (PTFE/Teflon or ceramic-coated pans).
          Requires specific care: no metal utensils, hand-wash only. Record the base
          material in sorting_notes when visible (typically aluminium or stainless
          steel with non-stick coating).'
        annotations:
          label_en:
            tag: label_en
            value: Non-Stick Coated
          label_de:
            tag: label_de
            value: Antihaftbeschichtet
        see_also:
        - schema:material
      plastic:
        text: plastic
        description: Plastic (various types). Common for containers, food storage
          boxes, some appliances, and kitchen organisation items.
        annotations:
          label_en:
            tag: label_en
            value: Plastic
          label_de:
            tag: label_de
            value: Kunststoff
        see_also:
        - schema:material
      silicone:
        text: silicone
        description: Silicone. Used for baking molds, spatulas, oven gloves, and ice
          cube trays. Heat-resistant and dishwasher-safe.
        annotations:
          label_en:
            tag: label_en
            value: Silicone
          label_de:
            tag: label_de
            value: Silikon
        see_also:
        - pto:Silicone
      mixed:
        text: mixed
        description: "Mixed or composite materials where no single material dominates\
          \ \u2014 e.g. a saucepan with a stainless steel body and plastic handle."
        annotations:
          label_en:
            tag: label_en
            value: Mixed
          label_de:
            tag: label_de
            value: Gemischt
        see_also:
        - schema:material
      other:
        text: other
        description: Materials not covered above. Record the specific material in
          sorting_notes when known.
        annotations:
          label_en:
            tag: label_en
            value: Other
          label_de:
            tag: label_de
            value: Andere
        see_also:
        - schema:material
