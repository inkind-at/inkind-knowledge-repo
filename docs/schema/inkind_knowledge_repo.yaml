      title: vm-material-beds
    - preconditions:
        slot_conditions:
          subcategory:
            name: subcategory
            equals_string: tables
      postconditions:
        slot_conditions:
          material:
            name: material
            any_of:
            - equals_string: wood
            - equals_string: metal
            - equals_string: plastic
            - equals_string: glass
            - equals_string: mixed
      description: Tables do not use fabric as primary material.
      title: vm-material-tables
  BeddingTextilesCategory:
    name: BeddingTextilesCategory
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/BeddingTextilesCategory
    annotations:
      completeness_minimal:
        tag: completeness_minimal
        value: subcategory, assessment_result, usage
      completeness_standard:
        tag: completeness_standard
        value: subcategory, is_set_complete, assessment_result, is_winter_suitable,
