          label_de:
            tag: label_de
            value: Sonstiges
  AccessoriesMaterialEnum:
    name: AccessoriesMaterialEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/AccessoriesMaterialEnum
    description: "Primary construction material of a fashion or personal accessory.\
      \ Records the dominant material the sorter can identify quickly. Not all accessories\
      \ have a single primary material \u2014 a watch has a metal case, leather strap,\
      \ and glass face; record the most prominent element.\nGrounded in Product Types\
      \ Ontology (pto:) for individual fibres and common materials, and schema:material\
      \ as the overarching property anchor. Values and grounding are aligned with\
      \ ClothingMaterialEnum (clothing.yaml) for the fibre values (leather, wool,\
      \ cotton, silk) for consistency.\nTwo redistribution-relevant uses:\n  1. Allergen\
      \ filtering \u2014 wool (scarves, hats, gloves) and nickel\n     (base metal\
      \ jewellery, belt buckles) sensitivities.\n  2. Care requirement matching \u2014\
      \ leather requires conditioning; silk\n     is dry-clean only; metal jewellery\
      \ requires anti-tarnish storage."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/accessories
    see_also:
    - schema:material
    permissible_values:
      leather:
        text: leather
        description: Genuine or faux leather (PU/synthetic leather). Predominant material
          for bags, belts, wallets, and some gloves and watch straps. Requires specialist
          conditioning care.
        annotations:
          label_en:
            tag: label_en
            value: Leather / Faux Leather
          label_de:
            tag: label_de
            value: Leder / Kunstleder
        see_also:
        - pto:Leather
      wool:
        text: wool
        description: Wool, merino, cashmere, or wool-dominant blend. Primary material
          for scarves, hats, and gloves. Allergen signal for wool-sensitive beneficiaries.
        annotations:
          label_en:
            tag: label_en
            value: Wool
          label_de:
            tag: label_de
            value: Wolle
        see_also:
        - pto:Wool
      cotton:
        text: cotton
        description: Cotton or cotton-dominant woven fabric. Common in fabric hats,
          canvas bags, and some gloves and scarves. All-season versatile.
        annotations:
          label_en:
            tag: label_en
            value: Cotton / Canvas Fabric
          label_de:
            tag: label_de
            value: Baumwolle / Segeltuch
        see_also:
        - pto:Cotton
      silk:
        text: silk
        description: Silk or silk-blend. Typical for elegant scarves and ties. Requires
          specialist care (hand wash or dry clean).
        annotations:
          label_en:
            tag: label_en
            value: Silk
          label_de:
            tag: label_de
            value: Seide
        see_also:
        - pto:Silk
      metal:
        text: metal
        description: Metal (gold, silver, base metal, stainless steel, or alloy).
          Predominant for jewellery, watch cases, belt buckles, and eyewear frames.
          Nickel in base metal alloys is a common allergen.
        annotations:
          label_en:
            tag: label_en
            value: Metal
          label_de:
            tag: label_de
            value: Metall
        see_also:
        - schema:material
      plastic:
        text: plastic
        description: "Plastic or acrylic. Common for sunglasses frames, costume jewellery,\
          \ and some bags. Wide range of types \u2014 record specifics in sorting_notes\
          \ if relevant (e.g. recycled plastic, BPA-free for baby accessories)."
        annotations:
          label_en:
            tag: label_en
            value: Plastic
          label_de:
            tag: label_de
            value: Kunststoff
        see_also:
        - schema:material
      synthetic:
        text: synthetic
        description: "Synthetic fabric or material \u2014 nylon, polyester, or other\
          \ man-made fibres. Common in nylon bags, polyester scarves, and synthetic\
          \ gloves. Distinct from leather_faux_leather (which mimics leather texture)."
        annotations:
          label_en:
            tag: label_en
            value: Synthetic
          label_de:
            tag: label_de
            value: Synthetisch
        see_also:
        - schema:material
      natural_fibre:
        text: natural_fibre
        description: "Natural plant-based fibres other than cotton \u2014 straw, raffia,\
          \ jute, bamboo, rattan, wicker. Common in summer hats and baskets."
        annotations:
          label_en:
            tag: label_en
            value: Natural Fibre (Straw / Raffia / Wicker)
          label_de:
            tag: label_de
            value: Naturfaser (Stroh / Bast / Weide)
        see_also:
        - schema:material
      glass_crystal:
        text: glass_crystal
        description: Glass or crystal elements. Common in costume jewellery (glass
          beads, crystal pendants) and some decorative accessories.
        annotations:
          label_en:
            tag: label_en
            value: Glass / Crystal
          label_de:
            tag: label_de
            value: Glas / Kristall
        see_also:
        - schema:material
      other:
        text: other
        description: Materials not covered above. Record the specific material in
          sorting_notes when known.
        annotations:
          label_en:
            tag: label_en
            value: Other
          label_de:
            tag: label_de
            value: Andere
        see_also:
        - schema:material
  AccessoriesDemographicEnum:
    name: AccessoriesDemographicEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/AccessoriesDemographicEnum
    description: "Simplified age-group demographic for accessories. Gender split not\
      \ modelled \u2014 gender is not a meaningful dimension for most accessories\
      \ at the sorting level. This contrasts with DemographicEnum (clothing.yaml)\
      \ which carries adult_male/adult_female because clothing size systems are gender-differentiated.\
      \ Use only when the item clearly targets a specific age group (e.g. children's\
      \ hat, baby mittens)."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/accessories
    permissible_values:
      baby:
        text: baby
        description: Baby (0-24 months). e.g. baby hats, scratch mittens.
        annotations:
          label_en:
            tag: label_en
            value: Baby (0-24 months)
          label_de:
            tag: label_de
            value: Baby (0-24 Monate)
      child:
        text: child
        description: Child (2-14 years). e.g. children's hats, gloves.
        annotations:
          label_en:
            tag: label_en
            value: Child (2-14 years)
          label_de:
            tag: label_de
            value: Kind (2-14 Jahre)
      adult:
        text: adult
        description: Adult. Default for most accessories when demographic matters.
        annotations:
          label_en:
            tag: label_en
            value: Adult
          label_de:
            tag: label_de
            value: Erwachsene
      all_ages:
        text: all_ages
        description: Suitable for all ages or demographic not applicable.
        annotations:
          label_en:
            tag: label_en
            value: All
          label_de:
            tag: label_de
            value: Alle
  SeasonEnum:
    name: SeasonEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/SeasonEnum
    description: "Seasonal suitability of a clothing or footwear item. Used on ClothingCategory\
      \ (season slot) and FootwearCategory (season slot).\nDesign notes:\n  - Four\
      \ values only \u2014 fine enough for redistribution decisions,\n    coarse enough\
      \ for fast sorting.\n  - spring_autumn is a single value because the thermal\
      \ characteristics\n    that define a transitional garment are the same regardless\
      \ of\n    which shoulder season it appears in.\n  - all_season covers items\
      \ with no meaningful seasonal constraint\n    (e.g. a plain cotton t-shirt,\
      \ a lightweight fleece) \u2014 distinct from\n    \"we don't know\" (absence\
      \ of the field) and from \"suitable in all\n    conditions including winter\"\
      \ (is_winter_suitable=true + all_season).\n  - Multivalued: a linen blazer might\
      \ be both spring_autumn and summer.\n    Record all applicable values."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/clothing
    permissible_values:
      winter:
        text: winter
        description: 'Primarily suitable for cold weather. Implies is_winter_suitable=true.
          Examples: heavy winter coat, thermal base layer, fleece-lined trousers,
          woollen jumper, ski jacket.'
        annotations:
          label_en:
            tag: label_en
            value: Winter
          label_de:
            tag: label_de
            value: Winter
      spring_autumn:
        text: spring_autumn
        description: 'Suitable for mild transitional seasons. Thermal weight between
          winter and summer. is_winter_suitable is sorter''s call. Examples: light
          jacket, cardigan, jeans, hoodie, trench coat.'
        annotations:
          label_en:
            tag: label_en
            value: Spring/Autumn
          label_de:
            tag: label_de
            value: "Fr\xFChling/Herbst"
      summer:
        text: summer
        description: 'Suitable for warm weather; not appropriate for cold conditions.
          Implies is_winter_suitable=false. Examples: t-shirt, shorts, sundress, swimwear,
          linen top.'
        annotations:
          label_en:
            tag: label_en
            value: Summer
          label_de:
            tag: label_de
            value: Sommer
      all_season:
        text: all_season
        description: "No meaningful seasonal constraint \u2014 appropriate across\
          \ all seasons or in climate-controlled environments. Implies is_winter_suitable=true\
          \ (all-season items are by definition usable in winter). Examples: underwear,\
          \ plain cotton t-shirt used as a base layer, school uniform shirt."
        annotations:
          label_en:
            tag: label_en
            value: All Season
          label_de:
            tag: label_de
            value: Alle Jahreszeiten
  ClothingSubcategoryEnum:
    name: ClothingSubcategoryEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/ClothingSubcategoryEnum
    description: "Clothing garment subcategories. Accessories are NOT here \u2014\
      \ they are in AccessoriesSubcategoryEnum (accessories.yaml) on a separate item\
      \ class. Separation enables clean progressive disclosure in the UI."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/clothing
    see_also:
    - http://www.ebusiness-unibw.org/ontologies/cpi/ns#ClothingAndAccessories
    permissible_values:
      tops:
        text: tops
        description: "T-shirts, shirts, blouses, sweaters, upper-body garments. is_winter_suitable\
          \ varies widely \u2014 a linen shirt and a wool jumper are both tops. Sorter\
          \ must set explicitly."
        annotations:
          label_en:
            tag: label_en
            value: Tops
          label_de:
            tag: label_de
            value: Oberteile
        see_also:
        - cpi:ClothingAndAccessories
      bottoms:
        text: bottoms
        description: "Trousers, skirts, shorts, leggings, lower-body garments. is_winter_suitable\
          \ varies \u2014 shorts are summer; thermal leggings are winter."
        annotations:
          label_en:
            tag: label_en
            value: Bottoms
          label_de:
            tag: label_de
            value: Unterteile
      outerwear:
        text: outerwear
        description: Jackets, coats, outer layers. Fragment compiler may pre-fill
          is_winter_suitable=true; sorter can override for summer-weight jackets.
        annotations:
          label_en:
            tag: label_en
            value: Outerwear
          label_de:
            tag: label_de
            value: Oberbekleidung
        see_also:
        - pto:Coat
      underwear:
        text: underwear
        description: "Underwear and intimate apparel. UC constraints apply. Thermal\
          \ underwear should be tagged is_winter_suitable=true. Standard underwear\
          \ \u2192 all_season / is_winter_suitable=true (base layer)."
        annotations:
          label_en:
            tag: label_en
            value: Underwear
          label_de:
            tag: label_de
            value: Unterhose
      nightwear:
        text: nightwear
        description: "Pyjamas, nightgowns, dressing gowns, sleep sets. Seasonal weight\
          \ varies \u2014 lightweight vs. fleece nightwear."
        annotations:
          label_en:
