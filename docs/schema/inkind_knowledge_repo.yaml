    - material
    - SportsCategory_subcategory
    - SportsCategory_assessment_result
    - SportsCategory_condition_grade
    - sport_type
    - SportsCategory_demographic
    - is_set_complete
    class_uri: pto:Sporting_goods
    rules:
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
      postconditions:
        slot_conditions:
          subcategory:
            name: subcategory
            required: true
      description: subcategory required at sorted state. SportsCategory rules then
        enforce whether assessment_result or condition_grade is required based on
        the subcategory value (protective_gear vs. other).
      title: lc-sorted-sports-subcategory-required
  BooksItem:
