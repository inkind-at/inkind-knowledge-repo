        description: Footwear not fitting above subcategories.
  ShoeSizeSystemEnum:
    name: ShoeSizeSystemEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/ShoeSizeSystemEnum
    description: Shoe size measurement system. Multiple systems in common use across
      European, UK, US, and children's sizing conventions.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/footwear
    permissible_values:
      EU:
        text: EU
        description: European sizing (e.g. 36, 38, 42, 46)
      UK:
        text: UK
        description: UK sizing (e.g. 3, 5, 8, 11)
      US:
        text: US
        description: US sizing (e.g. 6, 7.5, 9, 12)
      CM:
        text: CM
        description: "Foot length in centimetres \u2014 used for infant sizing"
  FurnitureAssessmentEnum:
    name: FurnitureAssessmentEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/FurnitureAssessmentEnum
    description: "Structured assessment of furniture structural integrity and quality.\
      \ Replaces the boolean structural_integrity slot with a richer vocabulary that\
      \ distinguishes cosmetic damage from structural compromise. Required at sorting\
      \ regardless of usage \u2014 new items can have manufacturing defects. See schema\
      \ description for full rationale."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/furniture
    permissible_values:
      structurally_sound:
        text: structurally_sound
        description: All load-bearing components intact; no cracks, wobbling, or unsafe
          instability. Safe for redistribution without qualification. Appropriate
          for new items with no observed defects.
      minor_cosmetic_damage:
        text: minor_cosmetic_damage
        description: Scratches, scuffs, minor surface damage. Structural integrity
          unaffected. Fully redistributable.
      significant_cosmetic_damage:
        text: significant_cosmetic_damage
        description: "Visible staining, discolouration, or notable surface damage.\
          \ Structurally sound but appearance significantly affected. action: warn\
          \ for seating/beds \u2014 sorting_notes required."
      functional_with_repairs:
        text: functional_with_repairs
        description: "Item is usable but benefits from minor repair before redistribution\
          \ (loose screw, wobbly leg, minor adjustment needed). action: warn \u2014\
          \ sorting_notes required."
      structurally_compromised:
        text: structurally_compromised
        description: 'Load-bearing components cracked, broken, or unsafe. Must not
          be redistributed. Applies to new items (manufacturing defect) and used.
          action: block, suggest: disposal or repair referral.'
  FurnitureSubcategoryEnum:
