        value: Haustechnik
    description: "Household and kitchen goods: cookware, crockery, small appliances,\
      \ cleaning tools, home decor, garden tools. COICOP 05.3 (household appliances),\
      \ 05.4 (glassware, tableware, utensils), 05.5 (tools for house and garden).\
      \ Note: bedding and textiles (COICOP 05.2) are BeddingTextilesItem, not HouseholdItem\
      \ \u2014 separated per COICOP structure and UNHCR NFI practice. Assessment:\
      \ condition_grade (wear grade)."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_item
    see_also:
