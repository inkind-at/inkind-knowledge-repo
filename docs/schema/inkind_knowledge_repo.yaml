  NamedThing:
    name: NamedThing
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/NamedThing
    description: A generic grouping for any identifiable entity with an id, name,
      and description. Provided as a convenience base class; entity schemas are not
      required to extend it.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo
    mappings:
    - schema:Thing
    slots:
    - id
    - name
    - description
    class_uri: schema:Thing
  SocialOrganisation:
    name: SocialOrganisation
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/SocialOrganisation
    description: A social organisation deploying the in-kind platform.  Primary operational
      tenant; hierarchy depth is limited to 4 levels.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/organisation
    mappings:
    - org:Organization
    slots:
    - id
    - name
    - SocialOrganisation_parent
    - geo_point
    - is_active
    - config
    slot_usage:
      parent:
        name: parent
        description: "FK \u2014 parent organisation in the hierarchy. uri: org:subOrganizationOf\
          \ \u2014 hierarchy depth limit 4."
        range: SocialOrganisation
        required: false
    class_uri: org:Organization
  GeoPoint:
    name: GeoPoint
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/GeoPoint
    description: Geographic coordinates for public map display of an organisation.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/organisation
    slots:
    - geoPoint__lat
    - geoPoint__long
    attributes:
      lat:
        name: lat
        description: Latitude in decimal degrees.
        range: float
      long:
        name: long
        description: Longitude in decimal degrees.
        range: float
    class_uri: inkind_knowledge_repo:GeoPoint
  OrgConfig:
    name: OrgConfig
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/OrgConfig
    description: Organisation-specific configuration parameters (timezone, locale,
      etc.). Full schema to be expanded in Phase 1.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/organisation
    slots:
    - orgConfig__timezone
    - orgConfig__locale
    attributes:
      timezone:
        name: timezone
        description: IANA timezone identifier (e.g., "Europe/Vienna").
        range: string
      locale:
        name: locale
        description: BCP-47 locale code (e.g., "de-AT").
        range: string
    class_uri: inkind_knowledge_repo:OrgConfig
  Actor:
    name: Actor
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/Actor
    description: "A person interacting with the system \u2014 volunteer, staff, or\
      \ manager."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/actor
    see_also:
    - foaf:Person
    slots:
    - id
    - Actor_org
    - role
    - experience_level
    - is_active
    slot_usage:
      org:
        name: org
        range: SocialOrganisation
        required: true
    class_uri: inkind_knowledge_repo:Actor
  StorageLocation:
    name: StorageLocation
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/StorageLocation
    description: A physical storage unit within an organisation's warehouse.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/storage_location
    slots:
    - id
    - StorageLocation_org
    - label
    - StorageLocation_parent
    - capacity
    - current_occupancy
    - is_active
    - category_affinity
    slot_usage:
      org:
        name: org
        range: SocialOrganisation
        required: true
      parent:
        name: parent
        description: "FK \u2014 for hierarchical storage (zone -> rack -> bin).  Null\
          \ for top-level locations."
        range: StorageLocation
        required: false
    class_uri: inkind_knowledge_repo:StorageLocation
  DonationSource:
    name: DonationSource
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/DonationSource
    description: Supply-side abstraction representing the origin of a donation. Phase
      1 uses `anonymous_private` type only.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_source
    slots:
    - id
    - source_type
    - anonymous_donor_id
    - corporate_donor_ref
    - organisation_ref
    - DonationSource_lifecycle_state
    - created_at
    - provenance
    slot_usage:
      lifecycle_state:
        name: lifecycle_state
        range: DonationSourceLifecycleEnum
        required: true
    class_uri: inkind_knowledge_repo:DonationSource
  DonationCollection:
    name: DonationCollection
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/DonationCollection
    description: A general-purpose grouping of items with optional recursive parent-child
      structure.  Replaces the flat DonationBatch model.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_collection
    see_also:
    - ceon:Resource
    slots:
    - id
    - DonationCollection_org
    - collection_type
    - label
    - DonationCollection_parent
    - DonationCollection_donation_source
    - DonationCollection_lifecycle_state
    - item_count
    - total_item_count
    - created_at
    - created_by
    - notes
    slot_usage:
      org:
        name: org
        range: SocialOrganisation
        required: true
      lifecycle_state:
        name: lifecycle_state
        range: CollectionLifecycleEnum
        required: true
      donation_source:
        name: donation_source
        range: DonationSource
        required: false
      parent:
        name: parent
        description: "FK \u2014 null for arrival collections (root); set for all derived\
          \ child collections."
        range: DonationCollection
        required: false
    class_uri: inkind_knowledge_repo:DonationCollection
  DonationItem:
    name: DonationItem
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/DonationItem
    annotations:
      completeness_minimal:
        tag: completeness_minimal
        value: category, usage
      completeness_standard:
        tag: completeness_standard
        value: category, usage, sorting_notes
      completeness_detailed:
        tag: completeness_detailed
        value: category, usage, source_collection, donation_source, sorting_notes
      label_en:
        tag: label_en
        value: Donation Item
      label_de:
        tag: label_de
        value: Spendenartikel
    description: "Abstract base for all donation items. Never instantiated directly.\n\
      The category slot carries designates_type: true \u2014 its value (the class\
      \ URI of the concrete subclass) selects which subclass schema applies. This\
      \ is the LinkML mechanism for a discriminated union: category IS the type, not\
      \ an attribute of the item. Grounded in schema:Product.\nattribute_completeness\
      \ is set by the fragment engine when the sorting episode completes. It records\
      \ data quality \u2014 NOT whether the episode was complete (lifecycle_state\
      \ = sorted records that). See AttributeCompletenessEnum in core.yaml for the\
      \ full rationale.\nThe lifecycle state machine is documented in ItemLifecycleStateEnum\
      \ in core.yaml. Transitions are enforced by Django model clean(). The sorting_in_progress\
      \ state prevents concurrent editing of the same item by two sorters simultaneously."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_item
    see_also:
    - schema:Product
    mappings:
    - schema:Product
    abstract: true
    slots:
    - id
    - DonationItem_usage
    - DonationItem_category
    - DonationItem_lifecycle_state
    - DonationItem_attribute_completeness
    - DonationItem_source_collection
    - DonationItem_donation_source
    - DonationItem_storage_unit
    - sorting_notes
    - created_at
    - updated_at
    slot_usage:
      category:
        name: category
        notes:
        - Due to a limitation in LinkML, the designates_type annotation was removed
          because the range is an Enum and not a string.
        designates_type: true
        range: string
        required: true
      lifecycle_state:
        name: lifecycle_state
        range: ItemLifecycleStateEnum
        required: true
      usage:
        name: usage
        range: ItemUsageEnum
        required: true
      attribute_completeness:
        name: attribute_completeness
        range: AttributeCompletenessEnum
        required: false
      source_collection:
        name: source_collection
        range: DonationCollection
        required: false
      donation_source:
        name: donation_source
        range: DonationSource
        required: false
      storage_unit:
        name: storage_unit
        range: StorageLocation
        required: false
    class_uri: schema:Product
  ClothingItem:
    name: ClothingItem
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/ClothingItem
    annotations:
      label_en:
        tag: label_en
        value: Clothing
      label_de:
        tag: label_de
        value: Kleidung
    description: "Clothing garments: tops, bottoms, outerwear, underwear, nightwear,\
      \ sportswear. COICOP 03.1 (clothing). Grounded in CPI (Clothing Product Information\
      \ ontology):\n  http://www.ebusiness-unibw.org/ontologies/cpi/ns#ClothingAndAccessories\n\
      \nAssessment: condition_grade (wear grade). The demographic\u2192size value\
      \ map and all UC rules (underwear condition, adult underwear must be new) are\
      \ defined in ClothingCategory (categories/clothing.yaml).\nLifecycle-aware rules\
      \ here:\n  lc-sorted-clothing-condition-grade-required\n  lc-sorted-clothing-demographic-required\n\
      \  lc-sorted-clothing-size-required"
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_item
    see_also:
    - http://www.ebusiness-unibw.org/ontologies/cpi/ns#ClothingAndAccessories
    mappings:
    - cpi:ClothingAndAccessories
    is_a: DonationItem
    mixins:
    - ClothingCategory
    slots:
    - id
    - DonationItem_usage
    - DonationItem_category
    - DonationItem_lifecycle_state
    - DonationItem_attribute_completeness
    - DonationItem_source_collection
    - DonationItem_donation_source
    - DonationItem_storage_unit
    - sorting_notes
    - created_at
    - updated_at
    - ClothingCategory_condition_grade
    - ClothingCategory_subcategory
    - ClothingCategory_material
    - ClothingCategory_is_winter_suitable
    - ClothingCategory_demographic
    - ClothingCategory_size
    - ClothingCategory_season
    - intact_labels
    class_uri: cpi:ClothingAndAccessories
    rules:
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
          subcategory:
            name: subcategory
            any_of:
            - equals_string: tops
            - equals_string: bottoms
            - equals_string: outerwear
            - equals_string: nightwear
      postconditions:
        slot_conditions:
          is_winter_suitable:
            name: is_winter_suitable
            required: true
      description: "is_winter_suitable required at sorted state for tops, bottoms,\
        \ outerwear, and nightwear. Not required for underwear (thermally neutral\
        \ base layer) or sportswear (assessed differently by the SportsItem category).\
        \ The thermal character of a garment is independent of usage \u2014 sorters\
        \ assess what they hold."
      title: lc-sorted-clothing-is-winter-suitable-required
    - preconditions:
        slot_conditions:
          usage:
            name: usage
            equals_string: used
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
      postconditions:
        slot_conditions:
          condition_grade:
            name: condition_grade
            required: true
      description: For used clothing (usage = used), condition_grade is required.
      title: lc-used-clothing-condition-grade-required
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
      postconditions:
        slot_conditions:
          demographic:
            name: demographic
            required: true
      description: demographic required at sorted state for all ClothingItem instances.
        Drives demand signal matching (e.g. "adult female tops, size M").
      title: lc-sorted-clothing-demographic-required
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
      postconditions:
        slot_conditions:
          size:
            name: size
            required: true
      description: size required at sorted state. Drives demand signal matching and
        storage slot assignment.
      title: lc-sorted-clothing-size-required
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
      postconditions:
        slot_conditions:
          subcategory:
            name: subcategory
            required: true
      description: "subcategory required at sorted state. Drives demand signal matching,\
        \ UC rule evaluation (underwear constraints), and storage routing. Not required\
        \ at received state \u2014 category is known but subcategory is determined\
        \ during sorting."
      title: lc-sorted-clothing-subcategory-required
  AccessoriesItem:
    name: AccessoriesItem
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/AccessoriesItem
    annotations:
      label_en:
        tag: label_en
        value: Accessories
      label_de:
        tag: label_de
        value: Accesoires
    description: "Fashion and personal accessories: hats, scarves, gloves, belts,\
      \ bags, jewellery, sunglasses, watches. COICOP 03.1 (grouped with clothing by\
      \ COICOP; separated here for progressive UI disclosure and schema clarity).\n\
      Separated from ClothingItem because:\n  - No demographic\u2192size value map\
      \ \u2014 accessories are not sized XS\u2013XXL\n  - Clothing UC rules (underwear\
      \ condition) do not apply\n  - Progressive disclosure: \"clothing or accessory?\"\
      \ is a clean first\n    branch in the sorting UI\n  - AccessoriesDemographicEnum\
      \ uses a simpler age-only vocabulary\n    (baby/child/adult/all_ages) \u2014\
      \ gender is not meaningful for most\n    accessories\n\nAssessment: condition_grade\
      \ (wear grade)."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_item
    see_also:
    - http://www.productontology.org/id/Fashion_accessory
    mappings:
    - pto:Fashion_accessory
    is_a: DonationItem
    mixins:
    - AccessoriesCategory
    slots:
    - id
    - DonationItem_usage
    - DonationItem_category
    - DonationItem_lifecycle_state
    - DonationItem_attribute_completeness
    - DonationItem_source_collection
    - DonationItem_donation_source
    - DonationItem_storage_unit
    - sorting_notes
    - created_at
    - updated_at
    - AccessoriesCategory_subcategory
    - AccessoriesCategory_demographic
    - AccessoriesCategory_material
    - AccessoriesCategory_condition_grade
    class_uri: pto:Fashion_accessory
    rules:
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
      postconditions:
        slot_conditions:
          condition_grade:
            name: condition_grade
            required: true
      description: condition_grade required at sorted state regardless of usage.
      title: lc-sorted-accessories-condition-grade-required
  FootwearItem:
    name: FootwearItem
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/FootwearItem
    annotations:
      label_en:
        tag: label_en
        value: Footwear
      label_de:
        tag: label_de
        value: Schuhe
    description: "Footwear: shoes, boots, sandals, slippers. COICOP 03.2 (footwear).\
      \ Separated from ClothingItem because:\n  - Shoe sizing systems (EU/UK/US/CM)\
      \ differ from clothing sizes\n  - Pair-completeness is a footwear-specific assessment\
      \ concern\nAssessment: condition_grade (wear grade)."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_item
    see_also:
    - http://www.productontology.org/id/Footwear
    mappings:
    - pto:Footwear
    is_a: DonationItem
    mixins:
    - FootwearCategory
    slots:
    - id
    - DonationItem_usage
