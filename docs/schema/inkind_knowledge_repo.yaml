  ToysMaterialEnum:
    name: ToysMaterialEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/ToysMaterialEnum
    description: "Primary construction material of a toy or game item. Operationally\
      \ relevant under the EU Toy Safety Directive 2009/48/EC Annex II (Chemical properties),\
      \ which restricts hazardous substances in toy materials. Recording material\
      \ type enables targeted awareness:\n  - Old plastic (pre-2000) \u2192 potential\
      \ lead paint or cadmium concern.\n    Sorters should note in sorting_notes for\
      \ age-apparent vintage items.\n  - PVC plastic \u2192 potential phthalate concern\
      \ for toys aimed at\n    children under 3 (Directive Annex II, point 45).\n\
      \  - Rubber/natural rubber \u2192 latex allergen signal (teething rings,\n \
      \   bath toys). Fragment compiler may surface allergen note when\n    material=rubber\
      \ and age_range=age_0_to_3.\n  - Wood \u2192 durability and repairability signal;\
      \ matches demand for\n    natural-material toys.\n  - Fabric_plush \u2192 allergen\
      \ signal for dustmite sensitivity.\n    Laundering before redistribution is\
      \ good practice.\n\nGrounded in pto:Wood, pto:Rubber for values with discrete\
      \ IRIs, and schema:material as the overarching property anchor for the remainder."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/toys
    see_also:
    - schema:material
    - https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32009L0048
    permissible_values:
      plastic:
        text: plastic
        description: "Plastic (various types \u2014 ABS, PP, HDPE, PVC). The most\
          \ common primary toy material. PVC is of particular concern under the Directive\
          \ (phthalate restrictions for toys for under-3s). Sorters should note in\
          \ sorting_notes if item appears to be vintage PVC (typically pre-2005 soft\
          \ plastic with characteristic flexibility and smell)."
        annotations:
          label_en:
            tag: label_en
            value: Plastic
          label_de:
            tag: label_de
            value: Kunststoff
        see_also:
        - schema:material
      wood:
        text: wood
        description: Solid wood or wood composite. Positive signal for durability
          and repairability. Common in building blocks, puzzles, pull toys, and wooden
          vehicles. Supports demand matching for natural-material toy preferences.
        annotations:
          label_en:
            tag: label_en
            value: Wood
          label_de:
            tag: label_de
            value: Holz
        see_also:
        - pto:Wood
      fabric_plush:
        text: fabric_plush
        description: "Soft fabric or plush textile. Primary material for stuffed animals,\
          \ cloth dolls, fabric books, and cloth puzzles. Dust-mite allergen signal\
          \ \u2014 laundering before redistribution is recommended best practice.\
          \ Check that soft toys do not have small detachable decorative parts (choking\
          \ hazard for age_0_to_3 \u2014 see has_small_parts)."
        annotations:
          label_en:
            tag: label_en
            value: Fabric / Plush
          label_de:
            tag: label_de
            value: "Stoff / Pl\xFCsch"
        see_also:
        - schema:material
      rubber_silicone:
        text: rubber_silicone
        description: "Rubber or silicone. Common in bath toys, teething rings, and\
          \ some bouncy balls. Natural rubber is a known latex allergen \u2014 relevant\
          \ for teething rings and squeeze toys for very young children (age_0_to_3).\
          \ Synthetic rubber (TPR, TPE, silicone) is latex-free. Record in sorting_notes\
          \ if natural rubber is identifiable."
        annotations:
          label_en:
            tag: label_en
            value: Rubber / Silicone
          label_de:
            tag: label_de
            value: Gummi / Silikon
        see_also:
        - pto:Rubber
      metal:
        text: metal
        description: "Metal (steel, aluminium, tin, die-cast alloy). Common in die-cast\
          \ model vehicles, metal construction toys, and some board game pieces. Older\
          \ die-cast toys may contain lead alloys \u2014 sorters should note in sorting_notes\
          \ for visibly very old metal toys."
        annotations:
          label_en:
            tag: label_en
            value: Metal
          label_de:
            tag: label_de
            value: Metall
        see_also:
        - schema:material
      cardboard_paper:
        text: cardboard_paper
        description: 'Cardboard or paper. Primary material for board games, jigsaw
          puzzles, card games, memory games, and paper craft kits. Condition signal:
          check for water damage, missing pieces.'
        annotations:
          label_en:
            tag: label_en
            value: Cardboard / Paper
          label_de:
            tag: label_de
            value: Pappe / Papier
        see_also:
        - schema:material
      foam:
        text: foam
        description: "Foam (EVA, polyurethane, or other foam). Common in foam building\
          \ blocks, play mats, foam sports toys, and puzzle mats. Check for crumbling\
          \ or deterioration \u2014 degraded foam can produce small particles."
        annotations:
          label_en:
            tag: label_en
            value: Foam
          label_de:
            tag: label_de
            value: Schaum
        see_also:
        - schema:material
      mixed:
        text: mixed
        description: "Mixed or composite materials where no single material dominates\
          \ \u2014 e.g. a board game with a cardboard board, plastic pieces, and paper\
          \ cards."
        annotations:
          label_en:
            tag: label_en
            value: Mixed
          label_de:
            tag: label_de
            value: Gemischt
        see_also:
        - schema:material
      other:
        text: other
        description: Materials not covered above. Record the specific material in
          sorting_notes when known.
        annotations:
          label_en:
            tag: label_en
            value: Other
          label_de:
            tag: label_de
            value: Andere
        see_also:
        - schema:material
