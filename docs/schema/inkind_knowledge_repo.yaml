        see_also:
        - schema:WearableSizeGroupChildrens
      xs:
        text: xs
        description: Extra small (adult)
        see_also:
        - schema:WearableSizeGroupAdult
      s:
        text: s
        description: Small (adult)
        see_also:
        - schema:WearableSizeGroupAdult
      m:
        text: m
        description: Medium (adult)
        see_also:
        - schema:WearableSizeGroupAdult
      l:
        text: l
