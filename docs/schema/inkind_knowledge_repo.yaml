    description: "Whether this item provides meaningful warmth in cold-weather conditions.\
      \ The primary emergency distribution filter \u2014 enables \"show me all winter-suitable\
      \ clothing for children\" queries at standard completeness.\nSet explicitly\
      \ by the sorter. The fragment compiler may pre-fill based on subcategory (outerwear\
      \ \u2192 true, swimwear \u2192 false) as a UI hint, but the sorter's input always\
      \ takes precedence.\nAuto-derived from season when season is set to an unambiguous\
      \ value:\n  season = winter     \u2192 is_winter_suitable = true  (vm-season-winter)\n\
      \  season = summer     \u2192 is_winter_suitable = false (vm-season-summer)\n\
      \  season = all_season \u2192 is_winter_suitable = true  (vm-season-all)\n \
      \ season = spring_autumn \u2192 sorter decides explicitly\n\nAlso declared on\
      \ FootwearCategory (footwear.yaml) and BeddingTextilesCategory (bedding_textiles.yaml)\
      \ for the same purpose."
