    - DonationItem_attribute_completeness
    - DonationItem_source_collection
    - DonationItem_donation_source
    - DonationItem_storage_unit
    - sorting_notes
    - created_at
    - updated_at
    - HouseholdCategory_subcategory
    - HouseholdCategory_material
    - is_set_complete
    - HouseholdCategory_condition_grade
    class_uri: pto:Household_goods
    rules:
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
      postconditions:
        slot_conditions:
