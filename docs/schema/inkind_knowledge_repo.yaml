    slot_uri: schema:additionalType
    owner: DemandSignal
    domain_of:
    - DonationItem
    - DemandSignal
    range: CategoryEnum
    required: true
  notes:
    name: notes
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/notes
    description: Optional free-text notes.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/core
    slot_uri: inkind_knowledge_repo:notes
    owner: CategoryMixin
    domain_of:
    - DonationCollection
    - CategoryMixin
    range: string
  sorting_notes:
    name: sorting_notes
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/sorting_notes
    description: Free-text notes recorded by the sorter during sorting. Required by
      UC warn rules to capture explicit sorter confirmation (e.g. incomplete pair,
      body-contact item, inconclusive assessment).
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/core
    slot_uri: inkind_knowledge_repo:sorting_notes
    owner: DonationItem
    domain_of:
    - DonationItem
    range: string
  material:
    name: material
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/material
    description: Primary material composition. Range overridden per class.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/core
    slot_uri: inkind_knowledge_repo:material
    owner: HouseholdCategory
    domain_of:
    - CategoryMixin
    - AccessoriesCategory
    - FurnitureCategory
    - HouseholdCategory
    range: string
  subcategory:
    name: subcategory
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/subcategory
    description: Subcategory within the item type. Overridden via slot_usage in each
      concrete DonationItem subclass to a category-specific enum.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/core
    slot_uri: inkind_knowledge_repo:subcategory
    owner: BabyInfantCategory
    domain_of:
    - AnyValue
    - AccessoriesCategory
    - ClothingCategory
    - FootwearCategory
    - FurnitureCategory
    - BeddingTextilesCategory
    - HouseholdCategory
    - ElectronicsCategory
    - ToysCategory
    - SportsCategory
    - BooksCategory
    - StationeryCategory
    - PersonalCareCategory
    - MobilityAidsCategory
    - BabyInfantCategory
    range: string
  usage:
    name: usage
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/usage
    description: "Provenance condition \u2014 was the item ever used before donation?\
      \ Orthogonal to condition_grade and assessment_result. Maps to schema:NewCondition\
      \ / schema:UsedCondition. usage = new does NOT imply no defects \u2014 manufacturing\
      \ defects are possible and assessment must always be performed regardless of\
      \ usage."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/core
    see_also:
    - schema:OfferItemCondition
    - schema:NewCondition
    - schema:UsedCondition
    mappings:
    - schema:itemCondition
    slot_uri: schema:itemCondition
    owner: DonationItem
    domain_of:
    - DonationItem
    range: ItemUsageEnum
    required: true
  condition_grade:
    name: condition_grade
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/condition_grade
    description: "Observed wear/quality grade at sorting time. Grounded in schema:OfferItemCondition\
      \ and schema:itemCondition. Applied to wear-graded categories: clothing, accessories,\
      \ footwear, books, stationery, household, toys, general sports equipment.\n\
      Required at sorted state regardless of usage:\n  new item, no defects      \
      \     \u2192 like_new\n  new item, manufacturing defect \u2192 fair or poor\n\
      \  used item, minimal wear        \u2192 like_new or good\nSorters record what\
      \ they observe, not what the label says.\nCategories using structured assessment_result\
      \ enums instead (furniture, electronics, bedding, protective sports gear, mobility\
      \ aids, baby equipment) do NOT declare this slot."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/core
    see_also:
    - schema:OfferItemCondition
    - schema:LikeNewCondition
    - schema:DamagedCondition
    - schema:itemCondition
    slot_uri: inkind_knowledge_repo:condition_grade
    owner: BabyInfantCategory
    domain_of:
    - OtherItem
    - AccessoriesCategory
    - ClothingCategory
    - FootwearCategory
    - HouseholdCategory
    - ToysCategory
    - SportsCategory
    - BooksCategory
    - StationeryCategory
    - BabyInfantCategory
    range: UsedConditionGradeEnum
    required: false
  assessment_result:
    name: assessment_result
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/assessment_result
    description: "Category-specific structured assessment result. Range overridden\
      \ to a category-specific enum in each concrete mixin via slot_usage. Used by\
      \ categories that require a structured pass/fail or hygiene/safety assessment\
      \ instead of a wear grade: furniture, electronics, bedding_textiles, mobility_aids,\
      \ protective sports gear, baby equipment (Tracks 1 & 2). Required regardless\
      \ of usage \u2014 new items can have manufacturing defects."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/core
    see_also:
    - schema:OfferItemCondition
    slot_uri: inkind_knowledge_repo:assessment_result
    owner: BabyInfantCategory
    domain_of:
    - FurnitureCategory
    - BeddingTextilesCategory
    - ElectronicsCategory
    - SportsCategory
    - MobilityAidsCategory
    - BabyInfantCategory
    range: string
    required: false
  attribute_completeness:
    name: attribute_completeness
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/attribute_completeness
    description: 'Data quality tier set by the fragment engine on sorting completion.
      Not derived from field presence. Not a lifecycle gate. Used by the match engine
      to filter candidates by data quality tier. See AttributeCompletenessEnum for
      the relationship to lifecycle_state. Set by: fragment_engine. Read by: match_engine.'
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/core
    slot_uri: inkind_knowledge_repo:attribute_completeness
    owner: DonationItem
    domain_of:
    - DonationItem
    range: AttributeCompletenessEnum
    required: false
  geo_point:
    name: geo_point
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/geo_point
    description: "Geographic coordinates for public map display.  Optional \u2014\
