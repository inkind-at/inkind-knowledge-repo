    - FootwearCategory_subcategory
    - FootwearCategory_material
    - is_pair_complete
    - FootwearCategory_is_winter_suitable
    - FootwearCategory_demographic
    - shoe_size
    - shoe_size_system
    - FootwearCategory_season
    class_uri: pto:Footwear
    rules:
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
      postconditions:
        slot_conditions:
          condition_grade:
            name: condition_grade
            required: true
      description: condition_grade required at sorted state regardless of usage.
      title: lc-sorted-footwear-condition-grade-required
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
      postconditions:
        slot_conditions:
          is_winter_suitable:
            name: is_winter_suitable
            required: true
      description: "is_winter_suitable required at sorted state. The thermal and weather-protection\
        \ character of footwear is operationally critical for cold-weather emergency\
        \ distribution \u2014 boots and sandals serve entirely different needs. Sorter\
        \ makes the call; fragment compiler provides subcategory-based hints only."
      title: lc-sorted-footwear-is-winter-suitable-required
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
