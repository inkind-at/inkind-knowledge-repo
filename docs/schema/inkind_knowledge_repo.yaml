types:
  string:
    name: string
    definition_uri: https://w3id.org/linkml/String
    description: A character string
    notes:
    - In RDF serializations, a slot with range of string is treated as a literal or
      type xsd:string.   If you are authoring schemas in LinkML YAML, the type is
      referenced with the lower case "string".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Text
    base: str
    uri: xsd:string
  integer:
    name: integer
    definition_uri: https://w3id.org/linkml/Integer
    description: An integer
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "integer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Integer
    base: int
    uri: xsd:integer
  boolean:
    name: boolean
    definition_uri: https://w3id.org/linkml/Boolean
    description: A binary (true or false) value
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "boolean".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Boolean
    base: Bool
    uri: xsd:boolean
    repr: bool
  float:
    name: float
    definition_uri: https://w3id.org/linkml/Float
    description: A real number that conforms to the xsd:float specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "float".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Float
    base: float
    uri: xsd:float
  double:
    name: double
    definition_uri: https://w3id.org/linkml/Double
    description: A real number that conforms to the xsd:double specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "double".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:Float
    base: float
    uri: xsd:double
  decimal:
    name: decimal
    definition_uri: https://w3id.org/linkml/Decimal
    description: A real number with arbitrary precision that conforms to the xsd:decimal
      specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "decimal".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    broad_mappings:
    - schema:Number
    base: Decimal
    uri: xsd:decimal
  time:
    name: time
    definition_uri: https://w3id.org/linkml/Time
    description: A time object represents a (local) time of day, independent of any
      particular day
    notes:
    - URI is dateTime because OWL reasoners do not work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "time".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Time
    base: XSDTime
    uri: xsd:time
    repr: str
  date:
    name: date
    definition_uri: https://w3id.org/linkml/Date
    description: a date (year, month and day) in an idealized calendar
    notes:
    - URI is dateTime because OWL reasoners don't work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Date
    base: XSDDate
    uri: xsd:date
    repr: str
  datetime:
    name: datetime
    definition_uri: https://w3id.org/linkml/Datetime
    description: The combination of a date and time
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:DateTime
    base: XSDDateTime
    uri: xsd:dateTime
    repr: str
  date_or_datetime:
    name: date_or_datetime
    definition_uri: https://w3id.org/linkml/DateOrDatetime
    description: Either a date or a datetime
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date_or_datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: linkml:DateOrDatetime
    repr: str
  uriorcurie:
    name: uriorcurie
    definition_uri: https://w3id.org/linkml/Uriorcurie
    description: a URI or a CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uriorcurie".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: URIorCURIE
    uri: xsd:anyURI
    repr: str
  curie:
    name: curie
    definition_uri: https://w3id.org/linkml/Curie
    conforms_to: https://www.w3.org/TR/curie/
    description: a compact URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "curie".
    comments:
    - in RDF serializations this MUST be expanded to a URI
    - in non-RDF serializations MAY be serialized as the compact representation
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: Curie
    uri: xsd:string
    repr: str
  uri:
    name: uri
    definition_uri: https://w3id.org/linkml/Uri
    conforms_to: https://www.ietf.org/rfc/rfc3987.txt
    description: a complete URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uri".
    comments:
    - in RDF serializations a slot with range of uri is treated as a literal or type
      xsd:anyURI unless it is an identifier or a reference to an identifier, in which
      case it is translated directly to a node
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:URL
    base: URI
    uri: xsd:anyURI
    repr: str
  ncname:
    name: ncname
    definition_uri: https://w3id.org/linkml/Ncname
    description: Prefix part of CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "ncname".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NCName
    uri: xsd:string
    repr: str
  objectidentifier:
    name: objectidentifier
    definition_uri: https://w3id.org/linkml/Objectidentifier
    description: A URI or CURIE that represents an object in the model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "objectidentifier".
    comments:
    - Used for inheritance and type checking
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: ElementIdentifier
    uri: shex:iri
    repr: str
  nodeidentifier:
    name: nodeidentifier
    definition_uri: https://w3id.org/linkml/Nodeidentifier
    description: A URI, CURIE or BNODE that represents a node in a model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "nodeidentifier".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NodeIdentifier
    uri: shex:nonLiteral
    repr: str
  jsonpointer:
    name: jsonpointer
    definition_uri: https://w3id.org/linkml/Jsonpointer
    conforms_to: https://datatracker.ietf.org/doc/html/rfc6901
    description: A string encoding a JSON Pointer. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to a valid object within the current
      instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpointer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  jsonpath:
    name: jsonpath
    definition_uri: https://w3id.org/linkml/Jsonpath
    conforms_to: https://www.ietf.org/archive/id/draft-goessner-dispatch-jsonpath-00.html
    description: A string encoding a JSON Path. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to zero or more valid objects within
      the current instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  sparqlpath:
    name: sparqlpath
    definition_uri: https://w3id.org/linkml/Sparqlpath
    conforms_to: https://www.w3.org/TR/sparql11-query/#propertypaths
    description: A string encoding a SPARQL Property Path. The value of the string
      MUST conform to SPARQL syntax and SHOULD dereference to zero or more valid objects
      within the current instance document when encoded as RDF.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "sparqlpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
enums:
  ItemUsageEnum:
    name: ItemUsageEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/ItemUsageEnum
    description: "Provenance \u2014 was the item ever used before donation? Orthogonal\
      \ to assessment. new does NOT imply no defects. Grounds the top-level split\
      \ in schema:OfferItemCondition."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/core
    see_also:
    - schema:OfferItemCondition
    - schema:NewCondition
    - schema:UsedCondition
    permissible_values:
      new:
        text: new
        description: "Never used before donation. Does NOT imply defect-free \u2014\
          \ manufacturing defects or transit damage are possible. Assessment must\
          \ still be performed."
        meaning: schema:NewCondition
      used:
        text: used
        description: Previously used before donation. Assessment required.
        meaning: schema:UsedCondition
  UsedConditionGradeEnum:
    name: UsedConditionGradeEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/UsedConditionGradeEnum
    description: "Observed wear/quality grade at sorting time. For wear-graded categories.\
      \ Grounds schema:OfferItemCondition sub-values and schema:itemCondition. Applied\
      \ regardless of usage \u2014 a new item with a defect is graded fair or poor,\
      \ not assumed like_new. Sorters record what they observe."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/core
    see_also:
    - schema:OfferItemCondition
    - schema:LikeNewCondition
    - schema:DamagedCondition
    - schema:itemCondition
    permissible_values:
      like_new:
        text: like_new
        description: No visible wear or defects. As-new appearance and function. Appropriate
          for new items with no observed defects, or used items showing no signs of
          wear.
        meaning: schema:LikeNewCondition
      good:
        text: good
        description: Minor wear; fully functional; no significant defects. Most common
          grade for used items in acceptable condition.
        see_also:
        - schema:itemCondition
      fair:
        text: fair
        description: Visible wear, minor defects, or manufacturing issues. Still suitable
          for redistribution with appropriate beneficiary matching.
      poor:
        text: poor
        description: "Significant wear or defects. Redistribution subject to category-specific\
          \ UC rules \u2014 some categories block, others warn and require explicit\
          \ sorter confirmation."
        meaning: schema:DamagedCondition
  AttributeCompletenessEnum:
    name: AttributeCompletenessEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/AttributeCompletenessEnum
    description: "Data quality tier for a DonationItem's category-specific attributes.\
      \ Set by the fragment engine on sorting step completion \u2014 not derived from\
      \ field presence at the schema level.\nDesign rationale:\n  lifecycle_state\
      \ = sorted means the sorting episode completed (process\n  fact). attribute_completeness\
      \ records the data quality outcome (data\n  fact). These are orthogonal:\n \
      \   - A size label may be missing \u2192 item sorted with minimal completeness\n\
      \    - A structural assessment may be inconclusive \u2192 item sorted but routed\n\
      \      to a hold state, not blocked from progressing in the lifecycle\n  The\
      \ match engine reads attribute_completeness to calibrate which demand\n  signals\
      \ an item can be matched against.\n\nEach category mixin declares field sets\
      \ for each tier via annotations:\n  completeness_minimal:  mandatory fields\
      \ \u2014 must be present at sorted state\n  completeness_standard: standard\
      \ fields \u2014 normal redistribution\n  completeness_detailed: optional fields\
      \ \u2014 improve match quality\nThe fragment compiler reads these annotations\
      \ to configure the sorting UI."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/core
    permissible_values:
      minimal:
        text: minimal
        description: 'Only mandatory fields recorded. Matches broad demand signals
          only (e.g. "any adult clothing"). Typical cause: missing labels, inconclusive
          assessment, rapid triage under time pressure.'
      standard:
        text: standard
        description: All standard fields recorded. Normal redistribution path. Matches
          the majority of demand signals.
      detailed:
        text: detailed
        description: All optional fields also recorded (colour, style, intact labels,
          etc.). Maximum match quality. Enables fine-grained demand signal matching.
  ItemLifecycleStateEnum:
    name: ItemLifecycleStateEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/ItemLifecycleStateEnum
    description: "Lifecycle states for a DonationItem. Ordered; transitions enforced\
      \ by Django model clean(). The fragment engine drives the sorted transition\
      \ on sorting episode completion; attribute_completeness is set at the same time.\n\
      Design rationale for explicit lifecycle states:\n  States are enforced by the\
      \ model (illegal transitions raise validation\n  errors). The fragment engine\
      \ reads lifecycle_state to determine which\n  fragment is valid. This replaces\
      \ implicit UI-flow sequencing with\n  explicit data-level sequencing \u2014\
      \ which is the prerequisite for\n  multi-org configuration and concurrent access\
      \ control.\n  No state machine library is needed: a status field with transition\n\
      \  validation in the model layer is sufficient.\n\nsorted and attribute_completeness\
      \ are ORTHOGONAL:\n  sorted    = the sorting episode completed (process fact)\n\
      \  minimal   = episode done but limited data captured, e.g. label missing\n\
      \  An item is always sorted when the episode completes \u2014 attribute_completeness\n\
      \  records how much was captured, not whether the episode was complete.\n\n\
      Transitions:\n  announced           \u2192 received            (item physically\
      \ arrives)\n  received            \u2192 sorting_in_progress (sort episode launched)\n\
      \  sorting_in_progress \u2192 sorted              (sort episode completed;\n\
      \                                             attribute_completeness set)\n\
      \  sorted              \u2192 stored              (storage assignment made)\n\
      \  sorted              \u2192 disposed            (unsuitable; Phase 2)\n  stored\
      \              \u2192 distributed         (given to beneficiary; Phase 2)\n\
      \  stored              \u2192 shared              (transferred to org; Phase\
      \ 2)\n  stored              \u2192 disposed            (culled from stock; Phase\
      \ 2)"
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/core
    permissible_values:
      announced:
        text: announced
        description: "Donor indicated intent to donate; item not yet physically present.\
          \ Optional state \u2014 used when pre-registration is supported."
      received:
        text: received
        description: "Item physically arrived and registered against a DonationCollection.\
          \ usage must be set at this point. Category-specific assessment slots are\
          \ absent \u2014 they are populated during sorting."
      sorting_in_progress:
        text: sorting_in_progress
        description: Active sorting episode in progress. Fragment engine sets this
          on episode launch to prevent concurrent editing of the same item.
      sorted:
        text: sorted
        description: Sorting episode completed. Assessment and category attributes
          recorded. attribute_completeness set by the fragment engine. Item is ready
          for storage assignment.
      stored:
        text: stored
        description: Item assigned to a physical StorageLocation. storage_unit FK
          is set at this transition.
      disposed:
        text: disposed
        description: "Item deemed unsuitable for redistribution and disposed of. Terminal\
          \ state. (Phase 2 stub \u2014 declared now for schema completeness.)"
      distributed:
        text: distributed
        description: Item given to a beneficiary. Terminal state. (Phase 2 stub.)
      shared:
        text: shared
        description: Item transferred to another organisation via the Share workflow.
          Terminal state. (Phase 2 stub.)
  CategoryEnum:
    name: CategoryEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/CategoryEnum
    description: "Canonical registry of all donation item categories. Mirrors the\
      \ DonationItem subclass URI hierarchy for use in non-item entities: DemandSignal.category,\
      \ StorageLocation.category_affinity, etc.\nDonationItem itself uses designates_type\
      \ on the category slot; this enum is for other entities that reference categories\
      \ by value.\nGrouping is aligned with COICOP 2018 divisions where applicable,\
      \ with deviations documented per value:\n  Apparel    \u2192 COICOP Division\
      \ 03 (clothing and footwear)\n  Home       \u2192 COICOP Division 05 (housing,\
      \ household goods)\n  Technology \u2192 COICOP Division 09 (recreation and culture)\n\
      \  Learning   \u2192 COICOP Division 09 (recreation and culture)\n  Care   \
      \    \u2192 COICOP Divisions 06 (health) and 12 (personal care)\n  Life stage\
      \ \u2192 COICOP Divisions 01 (food) and 03/05 (baby items)"
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/core
    see_also:
    - https://unstats.un.org/unsd/classifications/Family/Detail/2094
    - https://emergency.unhcr.org/emergency-assistance/core-relief-items/kind-non-food-item-distribution
    - https://company.auntbertha.com/openeligibility/
    permissible_values:
      ClothingItem:
        text: ClothingItem
        description: "Clothing garments: tops, bottoms, outerwear, underwear, nightwear,\
          \ sportswear \u2192 ClothingItem. COICOP 03.1. Separated from accessories\
          \ because the demographic\u2192size value map and UC rules (underwear condition)\
          \ do not apply to accessories."
        meaning: inkind_knowledge_repo:ClothingItem
        see_also:
        - http://www.ebusiness-unibw.org/ontologies/cpi/ns#ClothingAndAccessories
      AccessoriesItem:
        text: AccessoriesItem
        description: "Fashion accessories: hats, bags, jewellery, scarves, gloves,\
          \ belts \u2192 AccessoriesItem. COICOP 03.1 (grouped with clothing by COICOP;\
          \ separated here for progressive UI disclosure and schema clarity \u2014\
          \ no size dimension, simpler demographic vocabulary)."
        meaning: inkind_knowledge_repo:AccessoriesItem
        see_also:
        - http://www.productontology.org/id/Fashion_accessory
      FootwearItem:
        text: FootwearItem
        description: "Shoes, boots, sandals, slippers \u2192 FootwearItem. COICOP\
          \ 03.2. Separated from clothing because shoe sizing systems (EU/UK/US/CM)\
          \ differ from clothing sizes and pair-completeness is footwear-specific."
        meaning: inkind_knowledge_repo:FootwearItem
        see_also:
        - http://www.productontology.org/id/Footwear
      FurnitureItem:
        text: FurnitureItem
        description: "Structural furniture: chairs, tables, beds, wardrobes \u2192\
          \ FurnitureItem. COICOP 05.1 (furniture and furnishings)."
        meaning: inkind_knowledge_repo:FurnitureItem
        see_also:
        - http://www.productontology.org/id/Furniture
      BeddingTextilesItem:
        text: BeddingTextilesItem
        description: "Blankets, duvets, mattresses, pillows, towels, curtains \u2192\
          \ BeddingTextilesItem. COICOP 05.2 (household textiles). Separated from\
          \ household following COICOP 05.2 and UNHCR NFI kit standards, which list\
          \ blankets and sleeping mats as core relief items at the same priority level\
          \ as clothing."
        meaning: inkind_knowledge_repo:BeddingTextilesItem
        see_also:
        - http://www.productontology.org/id/Bedding
        - https://emergency.unhcr.org/emergency-assistance/core-relief-items/kind-non-food-item-distribution
      HouseholdItem:
        text: HouseholdItem
        description: "Cookware, crockery, small appliances, home decor \u2192 HouseholdItem.\
          \ COICOP 05.3 (household appliances), 05.4 (glassware/tableware/utensils),\
          \ 05.5 (tools for house and garden)."
        meaning: inkind_knowledge_repo:HouseholdItem
        see_also:
        - http://www.productontology.org/id/Household_goods
      ElectronicsItem:
        text: ElectronicsItem
        description: "Consumer electronics: phones, laptops, cameras, gaming \u2192\
          \ ElectronicsItem. COICOP 09.1 (audio-visual equipment) and 09.2."
        meaning: inkind_knowledge_repo:ElectronicsItem
        see_also:
        - http://www.productontology.org/id/Consumer_electronics
      ToysItem:
        text: ToysItem
        description: "Toys and games \u2192 ToysItem. COICOP 09.3 (games, toys, hobbies).\
          \ Age-grading follows EU Toy Safety Directive 2009/48/EC."
        meaning: inkind_knowledge_repo:ToysItem
        see_also:
        - http://www.productontology.org/id/Toy
      SportsItem:
        text: SportsItem
        description: "Sports and fitness equipment \u2192 SportsItem. COICOP 09.4\
          \ (sport and recreational equipment). Note: bicycles are placed here by\
          \ domain convention; COICOP assigns them to Division 07 (Transport)."
        meaning: inkind_knowledge_repo:SportsItem
        see_also:
        - http://www.productontology.org/id/Sporting_goods
      BooksItem:
        text: BooksItem
        description: "Books and educational materials \u2192 BooksItem. COICOP 09.5\
          \ (newspapers, books, stationery)."
        meaning: inkind_knowledge_repo:BooksItem
        see_also:
        - http://schema.org/Book
      StationeryItem:
        text: StationeryItem
        description: "Pens, notebooks, art supplies, office equipment \u2192 StationeryItem.\
          \ COICOP 09.5 (newspapers, books, stationery). Separated from books because\
          \ published content (BooksItem) and consumable/office supplies have different\
          \ sorting paths, condition vocabularies, and demand signals."
        meaning: inkind_knowledge_repo:StationeryItem
        see_also:
        - http://www.productontology.org/id/Stationery
      PersonalCareItem:
        text: PersonalCareItem
        description: "Personal hygiene, health, and beauty products \u2192 PersonalCareItem.\
          \ Merges COICOP 06.1 (medical products and appliances) and 12.1 (personal\
          \ care). Merged because the operative safety rules are identical across\
          \ both: sealed required, used tools blocked, expiry enforced. Open Eligibility\
          \ uses a single \"Personal Care Items\" node."
        meaning: inkind_knowledge_repo:PersonalCareItem
        see_also:
        - http://www.productontology.org/id/Personal_hygiene
        - http://www.productontology.org/id/Cosmetics
        - https://company.auntbertha.com/openeligibility/
      MobilityAidsItem:
        text: MobilityAidsItem
        description: "Wheelchairs, crutches, hearing aids, assistive devices \u2192\
          \ MobilityAidsItem. COICOP 06.1.3 (other medical products) and 06.2 (outpatient\
          \ services, durable medical equipment). Open Eligibility \"Assistive Technology\"\
          \ top-level category."
        meaning: inkind_knowledge_repo:MobilityAidsItem
        see_also:
        - http://www.productontology.org/id/Assistive_technology
        - https://company.auntbertha.com/openeligibility/
      BabyInfantItem:
        text: BabyInfantItem
        description: "Pushchairs, cots, car seats, infant formula, feeding equipment\
          \ \u2192 BabyInfantItem. COICOP distributes baby items across 03 (clothing),\
          \ 05 (household), and 01 (food). Treated as a first-class top-level category\
          \ here following Open Eligibility \"Baby Supplies\" and UNHCR NFI kit practice\
          \ (nappies and formula are core NFI kit items)."
        meaning: inkind_knowledge_repo:BabyInfantItem
        see_also:
        - https://company.auntbertha.com/openeligibility/
        - https://emergency.unhcr.org/emergency-assistance/core-relief-items/kind-non-food-item-distribution
      FoodItem:
        text: FoodItem
        description: "Food items \u2192 FoodItem. COICOP Division 01 (food and non-alcoholic\
          \ beverages). Phase 1 stub \u2014 activated when food-bank organisations\
          \ are onboarded. Grounded in FoodOn (OBO Foundry)."
        meaning: inkind_knowledge_repo:FoodItem
        see_also:
        - http://purl.obolibrary.org/obo/foodon.owl
      OtherItem:
        text: OtherItem
        description: "Items not fitting any other category \u2192 OtherItem. No COICOP\
          \ alignment. Use sparingly \u2014 if a type appears frequently, add a proper\
          \ subclass."
        meaning: inkind_knowledge_repo:OtherItem
  ConditionEnum:
    name: ConditionEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/ConditionEnum
    description: DEPRECATED. Use usage + condition_grade instead.
    deprecated: Replaced by ItemUsageEnum (usage slot) + UsedConditionGradeEnum (condition_grade
      slot) + category-specific assessment enums. Retained for migration compatibility
      only. Remove after all references are updated to the new condition model.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/core
    permissible_values:
      new:
        text: new
        meaning: schema:NewCondition
      good:
        text: good
        meaning: schema:UsedCondition
      fair:
        text: fair
        meaning: schema:UsedCondition
      poor:
        text: poor
        meaning: schema:DamagedCondition
  ActorRoleEnum:
    name: ActorRoleEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/ActorRoleEnum
    description: Valid actor roles within a SocialOrganisation.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/actor
    permissible_values:
      volunteer:
        text: volunteer
        description: "Volunteer \u2014 routed to guided fragment mode by default."
      staff:
        text: staff
        description: "Staff member \u2014 routed to expert mode by default."
      manager:
        text: manager
        description: "Manager \u2014 access to reporting and configuration."
      admin:
        text: admin
        description: "Organisation administrator \u2014 full configuration access."
  ExperienceLevelEnum:
    name: ExperienceLevelEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/ExperienceLevelEnum
    description: Actor experience level for fragment mode selection.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/actor
    permissible_values:
      novice:
        text: novice
        description: "Novice \u2014 additional guidance text shown."
      experienced:
        text: experienced
        description: "Experienced \u2014 standard guidance."
      expert:
        text: expert
        description: "Expert \u2014 minimal guidance, fast-path mode."
  DonationSourceTypeEnum:
    name: DonationSourceTypeEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/DonationSourceTypeEnum
    description: Discriminator for the origin type of a donation.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_source
    permissible_values:
      anonymous_private:
        text: anonymous_private
        description: Anonymous private donor.  Only type active in Phase 1. Identity
          tracked via opaque `anonymous_donor_id` token only.
      corporate:
        text: corporate
        description: "Corporate donor \u2014 linked to CorporateDonor profile. Year\
          \ 2 feature stub."
      organisation:
        text: organisation
        description: Donation from another SocialOrganisation (e.g., a Share workflow
          transfer).  Phase 2 stub.
  DonationSourceLifecycleEnum:
    name: DonationSourceLifecycleEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/DonationSourceLifecycleEnum
    description: Lifecycle states for a DonationSource.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_source
    permissible_values:
      announced:
        text: announced
        description: Donor indicated intent to donate; physical items not yet received.
      received:
        text: received
        description: Physical items received and linked to this source.
      acknowledged:
        text: acknowledged
        description: "Impact notification sent to donor.  Phase 1 stub \u2014 activated\
          \ when items complete their lifecycle and Donor Portal is live."
  CollectionTypeEnum:
    name: CollectionTypeEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/CollectionTypeEnum
    description: Operational type of a DonationCollection.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_collection
    permissible_values:
      arrival:
        text: arrival
        description: Root collection created when a donation arrives.  Replaces DonationBatch.  Phase
          1 only type in active use.
      working:
        text: working
        description: Temporary intermediate collection during a multi-stage sort pass.
          Phase 2 stub.
      sorted:
        text: sorted
        description: Stable grouping after a sort stage completes.  Phase 2 stub.
      stock:
        text: stock
        description: Named standing collection ready for distribution.  Maps to DemandSignal
          of type `standing`.  Phase 2 stub.
        see_also:
        - ceon:CircularValueNetwork
      campaign:
        text: campaign
        description: Collection assembled for a specific Campaign entity.  Phase 2
          stub.
      disposed:
        text: disposed
        description: "Items culled during sorting \u2014 auditable at collection level.\
          \ Phase 2 stub."
  CollectionLifecycleEnum:
    name: CollectionLifecycleEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/CollectionLifecycleEnum
    description: Lifecycle states for a DonationCollection.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_collection
    permissible_values:
      open:
        text: open
        description: Collection is open for item registration or operations.
      processing:
        text: processing
        description: Items are actively being registered or processed.
      closed:
        text: closed
        description: All processing complete; collection is closed.
      archived:
        text: archived
        description: Collection has been archived for record-keeping.
  DemandSignalTypeEnum:
    name: DemandSignalTypeEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/DemandSignalTypeEnum
    description: Discriminator for the type of demand signal.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/demand_signal
    permissible_values:
      standing:
        text: standing
        description: Permanent standing interest in a category.  No deadline, no quantity
          target.  Stays active until explicitly withdrawn.
      campaign:
        text: campaign
        description: Time-bounded coordinated effort tied to a Campaign.  Has deadline
          and quantity target.
      specific:
        text: specific
        description: Concrete request for a specific beneficiary or holder.  Has urgency
          tier.
  UrgencyTierEnum:
    name: UrgencyTierEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/UrgencyTierEnum
    description: Urgency classification for campaign and specific demand signals.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/demand_signal
    permissible_values:
      low:
        text: low
        description: "Low urgency \u2014 no immediate deadline pressure."
      medium:
        text: medium
        description: Medium urgency.
      high:
        text: high
        description: "High urgency \u2014 deadline approaching or need is acute."
      critical:
        text: critical
        description: "Critical \u2014 immediate fulfilment required."
  DemandSignalLifecycleEnum:
    name: DemandSignalLifecycleEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/DemandSignalLifecycleEnum
    description: Lifecycle states for a DemandSignal.  Standing signals stay `active`
      permanently; campaign and specific signals follow the full lifecycle.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/demand_signal
    permissible_values:
      active:
        text: active
        description: Signal is active and accepting matched items.
      partially_fulfilled:
        text: partially_fulfilled
        description: Some items matched but quantity_requested not yet reached.
      fulfilled:
        text: fulfilled
        description: All requested items matched.
      expired:
        text: expired
        description: Deadline passed without full fulfilment (campaign/specific types
          only).
      withdrawn:
        text: withdrawn
        description: Organisation explicitly cancelled this signal.
  CampaignLifecycleEnum:
    name: CampaignLifecycleEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/CampaignLifecycleEnum
    description: Lifecycle states for a Campaign.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/campaign
    permissible_values:
      planned:
        text: planned
        description: Campaign is planned but not yet started.
      active:
        text: active
        description: Campaign is active and accepting donations.
      completed:
        text: completed
        description: Campaign reached its end date with fulfilment achieved.
      cancelled:
        text: cancelled
        description: Campaign was cancelled before completion.
  AccessoriesSubcategoryEnum:
    name: AccessoriesSubcategoryEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/AccessoriesSubcategoryEnum
    description: Fashion and personal accessories subcategories. Deliberately separate
      from ClothingSubcategoryEnum to enable clean progressive disclosure in the sorting
      UI. Grounded in Product Types Ontology (pto:) terms.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/accessories
    permissible_values:
      hats_headwear:
        text: hats_headwear
        description: Hats, caps, beanies, headscarves, berets.
        see_also:
        - pto:Hat
      scarves:
        text: scarves
        description: Scarves and shawls worn at neck or shoulders.
        see_also:
        - pto:Scarf
      gloves_mittens:
        text: gloves_mittens
        description: Gloves and mittens (all ages).
        see_also:
        - pto:Glove
      belts:
        text: belts
        description: Belts, braces, and waist accessories.
        see_also:
        - pto:Belt
      bags_luggage:
        text: bags_luggage
        description: Handbags, tote bags, backpacks, shoulder bags, wallets, purses,
          clutch bags, small luggage items.
        see_also:
        - pto:Bag
      jewellery:
        text: jewellery
        description: Necklaces, bracelets, rings, earrings, brooches.
        see_also:
        - pto:Jewellery
      sunglasses:
        text: sunglasses
        description: Sunglasses and fashion spectacle frames.
        see_also:
        - pto:Sunglasses
      watches:
        text: watches
        description: Wristwatches and pocket watches.
        see_also:
        - pto:Watch
      other:
        text: other
        description: Accessories not fitting above subcategories.
  AccessoriesDemographicEnum:
    name: AccessoriesDemographicEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/AccessoriesDemographicEnum
    description: "Simplified age-group demographic for accessories. Gender split not\
      \ modelled \u2014 gender is not a meaningful dimension for most accessories\
      \ at the sorting level. This contrasts with DemographicEnum (clothing.yaml)\
      \ which carries adult_male/adult_female because clothing size systems are gender-differentiated.\
      \ Use only when the item clearly targets a specific age group (e.g. children's\
      \ hat, baby mittens)."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/accessories
    permissible_values:
      baby:
        text: baby
        description: Baby (0-24 months). e.g. baby hats, scratch mittens.
      child:
        text: child
        description: Child (2-14 years). e.g. children's hats, gloves.
      adult:
        text: adult
        description: Adult. Default for most accessories when demographic matters.
      all_ages:
        text: all_ages
        description: Suitable for all ages or demographic not applicable.
  SeasonEnum:
    name: SeasonEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/SeasonEnum
    description: "Seasonal suitability of a clothing or footwear item. Used on ClothingCategory\
      \ (season slot) and FootwearCategory (season slot).\nDesign notes:\n  - Four\
      \ values only \u2014 fine enough for redistribution decisions,\n    coarse enough\
      \ for fast sorting.\n  - spring_autumn is a single value because the thermal\
      \ characteristics\n    that define a transitional garment are the same regardless\
      \ of\n    which shoulder season it appears in.\n  - all_season covers items\
      \ with no meaningful seasonal constraint\n    (e.g. a plain cotton t-shirt,\
      \ a lightweight fleece) \u2014 distinct from\n    \"we don't know\" (absence\
      \ of the field) and from \"suitable in all\n    conditions including winter\"\
      \ (is_winter_suitable=true + all_season).\n  - Multivalued: a linen blazer might\
      \ be both spring_autumn and summer.\n    Record all applicable values."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/clothing
    permissible_values:
      winter:
        text: winter
        description: 'Primarily suitable for cold weather. Implies is_winter_suitable=true.
          Examples: heavy winter coat, thermal base layer, fleece-lined trousers,
          woollen jumper, ski jacket.'
      spring_autumn:
        text: spring_autumn
        description: 'Suitable for mild transitional seasons. Thermal weight between
          winter and summer. is_winter_suitable is sorter''s call. Examples: light
          jacket, cardigan, jeans, hoodie, trench coat.'
      summer:
        text: summer
        description: 'Suitable for warm weather; not appropriate for cold conditions.
          Implies is_winter_suitable=false. Examples: t-shirt, shorts, sundress, swimwear,
          linen top.'
      all_season:
        text: all_season
        description: "No meaningful seasonal constraint \u2014 appropriate across\
          \ all seasons or in climate-controlled environments. Implies is_winter_suitable=true\
          \ (all-season items are by definition usable in winter). Examples: underwear,\
          \ plain cotton t-shirt used as a base layer, school uniform shirt."
  ClothingSubcategoryEnum:
    name: ClothingSubcategoryEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/ClothingSubcategoryEnum
    description: "Clothing garment subcategories. Accessories are NOT here \u2014\
      \ they are in AccessoriesSubcategoryEnum (accessories.yaml) on a separate item\
      \ class. Separation enables clean progressive disclosure in the UI."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/clothing
    see_also:
    - http://www.ebusiness-unibw.org/ontologies/cpi/ns#ClothingAndAccessories
    permissible_values:
      tops:
        text: tops
        description: "T-shirts, shirts, blouses, sweaters, upper-body garments. is_winter_suitable\
          \ varies widely \u2014 a linen shirt and a wool jumper are both tops. Sorter\
          \ must set explicitly."
        see_also:
        - cpi:ClothingAndAccessories
      bottoms:
        text: bottoms
        description: "Trousers, skirts, shorts, leggings, lower-body garments. is_winter_suitable\
          \ varies \u2014 shorts are summer; thermal leggings are winter."
      outerwear:
        text: outerwear
        description: Jackets, coats, outer layers. Fragment compiler may pre-fill
          is_winter_suitable=true; sorter can override for summer-weight jackets.
        see_also:
        - pto:Coat
      underwear:
        text: underwear
        description: "Underwear and intimate apparel. UC constraints apply. Thermal\
          \ underwear should be tagged is_winter_suitable=true. Standard underwear\
          \ \u2192 all_season / is_winter_suitable=true (base layer)."
      nightwear:
        text: nightwear
        description: "Pyjamas, nightgowns, dressing gowns, sleep sets. Seasonal weight\
          \ varies \u2014 lightweight vs. fleece nightwear."
      sportswear:
        text: sportswear
        description: "Athletic wear, gym tops, leggings, swimwear, base layers. Non-specialist\
          \ \u2014 specialist sports clothing (wetsuits, cycling jerseys) belongs\
          \ in SportsItem. Fragment compiler may pre-fill is_winter_suitable=false\
          \ for swimwear subcategory context."
      other:
        text: other
        description: Clothing garments not fitting above subcategories.
  DemographicEnum:
    name: DemographicEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/DemographicEnum
    description: Combined age-and-gender demographic for clothing and footwear items.
      Grounded in cpi:designatedFor and schema.org wearable size groups. Shared with
      FootwearItem and SportsItem via slot_usage overrides. AccessoriesItem uses the
      simpler AccessoriesDemographicEnum instead.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/clothing
    see_also:
    - cpi:designatedFor
    permissible_values:
      baby:
