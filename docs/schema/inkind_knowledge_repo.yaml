  BeddingMaterialEnum:
    name: BeddingMaterialEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/BeddingMaterialEnum
    description: "Primary fibre or fabric composition of a bedding or textile item.\
      \ Records the dominant fibre; use synthetic_blend when no single synthetic dominates\
      \ (e.g. a polyester/cotton blend duvet cover).\nGrounded in Product Types Ontology\
      \ (pto:) for individual fibres and schema:material as the overarching property\
      \ anchor. Values for natural fibres (cotton, wool, linen, silk, down_feather)\
      \ are aligned with ClothingMaterialEnum (clothing.yaml) for consistency across\
      \ all textile category material enums.\nThree redistribution-relevant uses:\n\
      \  1. Allergen filtering \u2014 wool (blankets, duvets) for wool-sensitive\n\
      \     beneficiaries; down/feather (duvets, pillows) for feather-allergy\n  \
      \   or asthma sufferers.\n  2. Winter suitability hinting \u2014 the fragment\
      \ compiler MAY pre-fill\n     is_winter_suitable=true for wool, fleece, and\
      \ down_feather, and\n     false for linen and silk. Sorter always overrides.\n\
      \     The winter_hint annotation on individual values carries this signal.\n\
      \  3. Care requirement matching \u2014 wool requires gentle/hand-wash;\n   \
      \  silk requires dry-clean; down requires low-heat tumble drying."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/bedding_textiles
    see_also:
    - schema:material
    permissible_values:
      cotton:
        text: cotton
        description: Cotton or cotton-dominant. The most common natural fibre for
          sheets, pillowcases, and towels. All-season versatile; thermal weight varies
          by thread count and weave.
        annotations:
          label_en:
            tag: label_en
            value: Cotton
          label_de:
            tag: label_de
            value: Baumwolle
        see_also:
        - pto:Cotton
      polyester:
        text: polyester
        description: Polyester or polyester-dominant synthetic. Common in budget blankets,
          pillows, and duvet covers. All-season; easy-care.
        annotations:
          label_en:
            tag: label_en
            value: Polyester
          label_de:
            tag: label_de
            value: Polyester
        see_also:
        - pto:Polyester
      wool:
        text: wool
        description: Wool, merino, or wool-dominant blend. Primary signal of winter
          suitability in blankets and duvets. Fragment compiler may pre-fill is_winter_suitable=true.
          Allergen signal for wool-sensitive beneficiaries.
        annotations:
          label_en:
            tag: label_en
            value: Wool
          label_de:
            tag: label_de
            value: Wolle
          winter_hint:
            tag: winter_hint
            value: 'true'
        see_also:
        - pto:Wool
      linen:
        text: linen
        description: Linen (flax) fabric. Lightweight and breathable. Typical for
          summer-weight sheets and tablecloths. Fragment compiler may pre-fill is_winter_suitable=false.
        annotations:
          label_en:
            tag: label_en
            value: Linen
          label_de:
            tag: label_de
            value: Leinen
          winter_hint:
            tag: winter_hint
            value: 'false'
        see_also:
        - pto:Linen
      fleece:
        text: fleece
        description: Polar fleece or other synthetic-pile fabric. Common in lightweight
          throws and entry-level blankets. Warm for its weight. Fragment compiler
          may pre-fill is_winter_suitable=true.
        annotations:
          label_en:
            tag: label_en
            value: Fleece
          label_de:
            tag: label_de
            value: Fleece
          winter_hint:
            tag: winter_hint
            value: 'true'
        see_also:
        - pto:Polar_fleece
      down_feather:
        text: down_feather
        description: Down-filled or feather-filled duvets and pillows. Classic winter-weight
          fill. Fragment compiler may pre-fill is_winter_suitable=true. Allergen signal
          for feather/down allergy and asthma sufferers. Requires low-heat tumble
          drying.
        annotations:
          label_en:
            tag: label_en
            value: Down / Feather
          label_de:
            tag: label_de
            value: Daunen / Federn
          winter_hint:
            tag: winter_hint
            value: 'true'
        see_also:
        - pto:Down_feather
      silk:
        text: silk
        description: Silk. Lightweight and temperature-regulating. Common in premium
          bedding sets. Requires dry-clean or specialist gentle wash. Fragment compiler
          may pre-fill is_winter_suitable=false.
        annotations:
          label_en:
            tag: label_en
            value: Silk
          label_de:
            tag: label_de
            value: Seide
          winter_hint:
            tag: winter_hint
            value: 'false'
        see_also:
        - pto:Silk
      microfibre:
        text: microfibre
        description: Microfibre (ultra-fine synthetic) fabric. Common in microfibre
          towels, soft sheets, and lightweight blankets. Quick-drying and easy-care.
        annotations:
          label_en:
            tag: label_en
            value: Microfibre
          label_de:
            tag: label_de
            value: Mikrofaser
        see_also:
        - schema:material
      synthetic_blend:
        text: synthetic_blend
        description: Mixed synthetic fibres or a synthetic + natural blend where no
          single fibre dominates. Covers polyester/cotton blends (polycotton), acrylic
          blends, and other mixed compositions.
        annotations:
          label_en:
            tag: label_en
            value: Synthetic Blend
          label_de:
            tag: label_de
            value: Synthetische Mischung
        see_also:
        - schema:material
      other:
        text: other
        description: Materials not covered above. Record the specific material in
          sorting_notes when known.
        annotations:
          label_en:
            tag: label_en
            value: Other
          label_de:
            tag: label_de
            value: Andere
        see_also:
        - schema:material
  BeddingAssessmentEnum:
    name: BeddingAssessmentEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/BeddingAssessmentEnum
    description: Structured hygiene and condition assessment for bedding and textiles.
