  ElectronicsAssessmentEnum:
    name: ElectronicsAssessmentEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/ElectronicsAssessmentEnum
    description: "Structured functional and cosmetic assessment for electronic items.\
      \ Combines functional state with cosmetic condition in one vocabulary. Required\
      \ at sorting regardless of usage \u2014 new devices can have defects."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/electronics
    permissible_values:
      fully_functional:
        text: fully_functional
        description: Powers on; all features operate correctly; cosmetic condition
          good or better. Ready for redistribution. Appropriate for new items with
          no observed defects.
        annotations:
          label_en:
            tag: label_en
            value: Fully Functional
          label_de:
            tag: label_de
            value: "Voll funktionsf\xE4hig"
      functional_minor_cosmetic:
        text: functional_minor_cosmetic
        description: Fully functional but with minor cosmetic issues (light scratches,
          small scuffs) that do not affect operation. Redistributable.
        annotations:
          label_en:
            tag: label_en
            value: Functional (Minor Cosmetic)
          label_de:
            tag: label_de
            value: Funktional (Geringe kosmetische Defekte)
      functional_significant_cosmetic:
        text: functional_significant_cosmetic
        description: Fully functional but with significant cosmetic damage (cracked
          bezel, major scratches, missing casing components). Functional but appearance
          notably affected.
        annotations:
          label_en:
            tag: label_en
            value: Functional (Significant Cosmetic)
          label_de:
            tag: label_de
            value: Funktional (Erhebliche kosmetische Defekte)
      functional_with_issues:
        text: functional_with_issues
        description: "Powers on but has functional issues (cracked screen still displays,\
          \ missing key, camera not working, port not functioning). Redistributable\
          \ with explicit description \u2014 sorting_notes required."
        annotations:
          label_en:
            tag: label_en
            value: Functional (With Issues)
          label_de:
            tag: label_de
            value: Funktional (Mit Problemen)
      non_functional:
        text: non_functional
        description: "Does not power on, or major functionality failure rendering\
          \ it unusable. action: warn \u2014 sorting_notes required. Consider repair\
          \ referral or electronics recycling."
        annotations:
          label_en:
            tag: label_en
            value: Non-Functional
          label_de:
            tag: label_de
            value: "Nicht funktionsf\xE4hig"
      untested:
        text: untested
        description: "Not yet tested. Valid only at received state \u2014 blocked\
          \ at sorted state by lc-sorted-electronics-not-untested rule in donation_item.yaml."
        annotations:
          label_en:
            tag: label_en
            value: Untested
          label_de:
            tag: label_de
            value: Ungetestet
