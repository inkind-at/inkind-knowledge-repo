          label_en:
            tag: label_en
            value: Blankets
          label_de:
            tag: label_de
            value: Decken
        see_also:
        - pto:Blanket
      duvets_quilts:
        text: duvets_quilts
        description: "Duvets, quilts, continental quilts. is_winter_suitable required\
          \ \u2014 tog rating (if legible) may be noted in sorting_notes."
        annotations:
          label_en:
            tag: label_en
            value: Duvets & Quilts
          label_de:
            tag: label_de
            value: Bettdecken & Steppdecken
        see_also:
        - pto:Duvet
      pillows:
        text: pillows
        description: Pillows and sleeping cushions.
        annotations:
          label_en:
            tag: label_en
            value: Pillows
          label_de:
            tag: label_de
            value: Kissen
        see_also:
        - pto:Pillow
      mattresses:
        text: mattresses
        description: "Single, double, children's mattresses. Hygiene UC applies. is_winter_suitable\
          \ typically not meaningful \u2014 suppressed in UI."
        annotations:
          label_en:
            tag: label_en
            value: Mattresses
          label_de:
            tag: label_de
            value: Matratzen
        see_also:
        - pto:Mattress
      sleeping_bags:
        text: sleeping_bags
        description: "Adult and general sleeping bags and camping bedding. UNHCR NFI\
          \ core relief item. is_winter_suitable required and UC-enforced \u2014 a\
