  BabyInfantCategory:
    name: BabyInfantCategory
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/BabyInfantCategory
    annotations:
      completeness_minimal:
        tag: completeness_minimal
        value: subcategory, usage
