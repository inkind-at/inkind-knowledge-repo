          lifecycle_state:
            name: lifecycle_state
            none_of:
            - equals_string: stored
            - equals_string: distributed
      description: 'Items assessed as structurally_compromised must not be redistributed.
        Applies to both new items (manufacturing defect) and used items. action: block,
        suggest: disposal or repair referral.'
      title: uc-furniture-compromised-block
    - preconditions:
        slot_conditions:
          assessment_result:
            name: assessment_result
            equals_string: functional_with_repairs
      postconditions:
        slot_conditions:
          sorting_notes:
            name: sorting_notes
            required: true
      description: "Items assessed as functional_with_repairs require sorter confirmation.\
        \ action: warn \u2014 sorting_notes required."
      title: uc-furniture-repairable-warn
    - preconditions:
        slot_conditions:
          subcategory:
            name: subcategory
            any_of:
            - equals_string: seating
            - equals_string: beds
          assessment_result:
            name: assessment_result
            equals_string: significant_cosmetic_damage
      postconditions:
        slot_conditions:
          sorting_notes:
            name: sorting_notes
            required: true
      description: "Seating and beds with significant cosmetic damage require sorter\
        \ confirmation. action: warn \u2014 sorting_notes required."
      title: uc-furniture-seating-beds-cosmetic-warn
    - preconditions:
        slot_conditions:
          subcategory:
            name: subcategory
            equals_string: beds
      postconditions:
        slot_conditions:
          material:
            name: material
            any_of:
            - equals_string: wood
            - equals_string: metal
            - equals_string: mixed
      description: Beds accept structural materials only (wood, metal, mixed). Fabric
