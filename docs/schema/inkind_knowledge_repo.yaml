        tag: regulatory_references
        value: EN 1888, EN 716, EN 14344, EN 14350, EN 16781
    description: "Mixin for baby and infant supply slots and UC rules. Applied to\
      \ BabyInfantItem via mixins: [BabyInfantCategory]. Three-track assessment model\
      \ \u2014 see schema description above. EN 1888 (pushchairs), EN 716 (cots),\
      \ EN 14344 (car seats), EN 14350 (feeding bottles) ground the safety UC rules."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/baby_infant
    see_also:
    - http://www.productontology.org/id/Baby_transport
    - https://company.auntbertha.com/openeligibility/
    is_a: CategoryMixin
    mixin: true
    slots:
    - material
    - BabyInfantCategory_subcategory
    - BabyInfantCategory_assessment_result
    - manufacture_year
    - includes_original_accessories
    - BabyInfantCategory_is_winter_suitable
    - BabyInfantCategory_is_sealed
    - expiry_date
    - BabyInfantCategory_condition_grade
    slot_usage:
      subcategory:
        name: subcategory
        range: BabyInfantSubcategoryEnum
        required: true
      assessment_result:
        name: assessment_result
        description: Structural/provenance assessment for Track 1 safety-critical
          equipment. Required when subcategory in [pushchairs_prams, cots_cribs, baby_carriers,
          high_chairs, car_seats, sleeping_bags].
        range: BabyEquipmentAssessmentEnum
        required: false
      is_winter_suitable:
        name: is_winter_suitable
        description: "Whether this item provides meaningful warmth in cold conditions.\
          \ Required for sleeping_bags (UC-enforced) \u2014 a summer-weight baby sleeping\
          \ bag in cold-weather distribution is a safety risk. Thermal rating (e.g.\
          \ \"2.5 tog\", \"0\xB0C comfort limit\") may be noted in sorting_notes."
        range: boolean
        required: false
      is_sealed:
        name: is_sealed
        description: Packaging/seal integrity for Track 2 consumables. Required when
          subcategory in [infant_formula, feeding_bottles_teats, baby_food].
        required: false
      condition_grade:
        name: condition_grade
        description: Wear grade for Track 3 general baby gear. Required when subcategory
          in [bath_equipment, changing, baby_monitors, bouncers_swings, breastfeeding,
          other].
        range: UsedConditionGradeEnum
        required: false
    class_uri: inkind_knowledge_repo:BabyInfantCategory
    rules:
    - preconditions:
        slot_conditions:
          subcategory:
            name: subcategory
            any_of:
            - equals_string: pushchairs_prams
            - equals_string: cots_cribs
            - equals_string: baby_carriers
            - equals_string: high_chairs
            - equals_string: car_seats
            - equals_string: sleeping_bags
      postconditions:
        slot_conditions:
          assessment_result:
            name: assessment_result
            required: true
      description: "Safety-critical baby equipment requires a structured assessment.\
        \ Required regardless of usage \u2014 new equipment can have defects. Standards:\
        \ EN 1888 (pushchairs), EN 716 (cots), EN 14344 (car seats), EN 16781 (baby\
        \ sleeping bags \u2014 neck/armhole openings, no loose cords)."
      title: uc-baby-equipment-assessment-required
    - preconditions:
        slot_conditions:
          assessment_result:
            name: assessment_result
            any_of:
            - equals_string: do_not_redistribute
            - equals_string: structural_concern
      postconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            none_of:
            - equals_string: stored
            - equals_string: distributed
      description: 'Equipment assessed as do_not_redistribute or structural_concern
        must not be redistributed. action: block.'
      title: uc-baby-equipment-unsafe-block
    - preconditions:
        slot_conditions:
          subcategory:
            name: subcategory
            equals_string: car_seats
      postconditions:
        slot_conditions:
          manufacture_year:
            name: manufacture_year
            required: true
      description: "Car seats require manufacture_year to enable the runtime age check.\
        \ EN 14344 standard \u2014 car seats over 10 years old or with unknown collision\
        \ history must not be redistributed. manufacture_year must be recorded for\
        \ all car seats (new and used) so the runtime check can verify the 10-year\
        \ limit."
      title: uc-baby-car-seat-manufacture-year
    - preconditions:
        slot_conditions:
          assessment_result:
            name: assessment_result
            equals_string: requires_specialist_check
      postconditions:
        slot_conditions:
          sorting_notes:
            name: sorting_notes
            required: true
      description: "Equipment requiring specialist check before redistribution needs\
        \ sorter confirmation. action: warn \u2014 sorting_notes required."
      title: uc-baby-equipment-specialist-warn
    - preconditions:
        slot_conditions:
          subcategory:
            name: subcategory
            equals_string: sleeping_bags
      postconditions:
        slot_conditions:
          is_winter_suitable:
            name: is_winter_suitable
            required: true
      description: "Baby sleeping bags require is_winter_suitable to be explicitly\
        \ set. A summer-weight baby sleeping bag (e.g. 0.5-1.0 tog) issued in a cold-weather\
        \ response is a genuine safety risk \u2014 infants cannot regulate their own\
        \ temperature. The thermal rating is typically printed on the label (tog,\
        \ season number, or comfort temperature). action: warn \u2014 is_winter_suitable\
        \ must be set at sorted state."
      title: uc-baby-sleeping-bag-winter-required
    - preconditions:
        slot_conditions:
          subcategory:
            name: subcategory
            any_of:
            - equals_string: infant_formula
            - equals_string: feeding_bottles_teats
            - equals_string: baby_food
      postconditions:
        slot_conditions:
          is_sealed:
            name: is_sealed
            required: true
      description: "Consumable baby items require sealed packaging. Nappies and formula\
        \ are UNHCR NFI core relief items \u2014 hygiene integrity is essential."
      title: uc-baby-consumable-sealed-required
    - preconditions:
        slot_conditions:
          subcategory:
            name: subcategory
            any_of:
            - equals_string: infant_formula
            - equals_string: feeding_bottles_teats
            - equals_string: baby_food
          is_sealed:
            name: is_sealed
            equals_string: 'false'
      postconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            none_of:
            - equals_string: stored
            - equals_string: distributed
      description: 'Unsealed consumable baby items must not be redistributed. action:
        block.'
      title: uc-baby-consumable-unsealed-block
    - preconditions:
        slot_conditions:
          subcategory:
            name: subcategory
            equals_string: feeding_bottles_teats
          usage:
            name: usage
            equals_string: used
      postconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            none_of:
            - equals_string: stored
            - equals_string: distributed
      description: "Used feeding bottles and teats must not be redistributed. Hygiene\
        \ and infant safety \u2014 EN 14350 (drinking equipment for children). action:\
        \ block \u2014 no override."
      title: uc-baby-feeding-used-block
    - preconditions: {}
      annotations:
        enforcement:
          tag: enforcement
          value: application_layer
        uc_action:
          tag: uc_action
          value: block
        uc_suggest:
          tag: uc_suggest
          value: disposal
        uc_note:
          tag: uc_note
          value: "expiry_date < today \u2014 runtime check by Django model clean()"
      description: Consumables past expiry must not be redistributed. Runtime check.
      title: uc-baby-consumable-expiry-block
    - preconditions:
        slot_conditions:
          subcategory:
            name: subcategory
            any_of:
            - equals_string: bath_equipment
            - equals_string: changing
            - equals_string: baby_monitors
            - equals_string: bouncers_swings
            - equals_string: breastfeeding
            - equals_string: other
      postconditions:
        slot_conditions:
          condition_grade:
            name: condition_grade
            required: true
      description: General baby gear requires condition_grade wear assessment.
      title: uc-baby-general-condition-grade-required
