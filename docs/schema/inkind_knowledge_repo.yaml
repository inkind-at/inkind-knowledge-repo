      \ http://purl.obolibrary.org/obo/foodon.owl Does not extend CategoryMixin \u2014\
      \ see schema description for rationale. Phase 1 stub \u2014 sort_food process\
      \ path activated on food-bank onboarding."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/food
    see_also:
    - foodon:00001006
    - http://purl.obolibrary.org/obo/foodon.owl
    mixin: true
    slots:
    - FoodCategory_food_type
    - FoodCategory_expiry_date
    - FoodCategory_packaging_intact
    - FoodCategory_storage_requirement
    - quantity
    slot_usage:
      food_type:
        name: food_type
        required: true
      packaging_intact:
        name: packaging_intact
        required: true
      storage_requirement:
        name: storage_requirement
        required: true
      expiry_date:
        name: expiry_date
        annotations:
          uc_action:
            tag: uc_action
            value: block
          uc_suggest:
            tag: uc_suggest
            value: disposal
          uc_note:
            tag: uc_note
            value: "Dynamic date comparison \u2014 runtime enforcement"
        description: 'Expiry or best-before date as printed on the packaging. UC block:
          expiry_date < today (runtime check by Django model clean()).'
        see_also:
        - foodon:00001043
    class_uri: inkind_knowledge_repo:FoodCategory
    rules:
    - preconditions:
        slot_conditions:
          packaging_intact:
            name: packaging_intact
            equals_string: 'false'
          food_type:
            name: food_type
            any_of:
            - equals_string: fresh_produce
            - equals_string: dairy
            - equals_string: frozen
            - equals_string: baby_food
      postconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            none_of:
            - equals_string: stored
            - equals_string: distributed
      description: "Perishable items with compromised packaging must not be redistributed.\
        \ Food safety principle \u2014 perishable items cannot be safely redistributed\
        \ once packaging integrity is lost. action: block."
      title: uc-packaging-perishable-block
    - preconditions: {}
      annotations:
        enforcement:
          tag: enforcement
          value: application_layer
        uc_action:
          tag: uc_action
          value: block
        uc_suggest:
          tag: uc_suggest
          value: disposal
        uc_note:
          tag: uc_note
          value: "expiry_date < today \u2014 runtime check by Django model clean()"
      description: "Items past expiry date must not be redistributed. Runtime check\
        \ \u2014 dynamic date comparison not expressible as a static LinkML rule.\
        \ Enforced by Django model clean() at save time."
      title: uc-expiry-date-past-block
    - preconditions:
        slot_conditions:
          food_type:
            name: food_type
            equals_string: frozen
      postconditions:
        slot_conditions:
          storage_requirement:
            name: storage_requirement
            equals_string: frozen
      description: 'Frozen food requires frozen storage only. Breaking the cold chain
        makes frozen food unsafe to refreeze. action: block invalid value.'
      title: vm-storage-frozen
    - preconditions:
        slot_conditions:
          food_type:
            name: food_type
            equals_string: dairy
      postconditions:
        slot_conditions:
          storage_requirement:
            name: storage_requirement
            any_of:
            - equals_string: refrigerated
            - equals_string: frozen
      description: Dairy requires refrigerated or frozen storage.
      title: vm-storage-dairy
    - preconditions:
        slot_conditions:
          food_type:
            name: food_type
            equals_string: canned_goods
      postconditions:
        slot_conditions:
          storage_requirement:
            name: storage_requirement
            equals_string: ambient
      description: "Canned goods are shelf-stable \u2014 ambient storage only."
      title: vm-storage-canned
