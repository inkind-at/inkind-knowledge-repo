    description: "Mixin for personal care, hygiene, and health product slots and UC\
      \ rules. Applied to PersonalCareItem via mixins: [PersonalCareCategory]. Merges\
      \ COICOP 06.1 and 12.1. See schema description for merge rationale. No condition_grade\
      \ or assessment_result \u2014 is_sealed + expiry_date are the complete assessment\
      \ vocabulary. See schema description."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/personal_care
    see_also:
    - http://www.productontology.org/id/Personal_hygiene
    - https://company.auntbertha.com/openeligibility/
    is_a: CategoryMixin
    mixin: true
    slots:
    - material
    - PersonalCareCategory_subcategory
    - PersonalCareCategory_is_sealed
    - PersonalCareCategory_expiry_date
    slot_usage:
      subcategory:
        name: subcategory
        range: PersonalCareSubcategoryEnum
        required: true
      is_sealed:
        name: is_sealed
        description: "Whether the item's original packaging/seal is intact. UC block\
          \ for most consumable subcategories when false. Primary safety signal for\
          \ personal care items \u2014 replaces condition_grade."
        required: true
      expiry_date:
        name: expiry_date
        annotations:
          uc_action:
            tag: uc_action
            value: block
          uc_suggest:
            tag: uc_suggest
            value: disposal
          uc_note:
            tag: uc_note
            value: "Dynamic date comparison \u2014 runtime enforcement by Django model\
              \ clean()"
        description: "Expiry or best-before date from the packaging. UC block: expiry_date\
          \ < today (runtime check by Django model clean()). Secondary safety signal\
          \ \u2014 important for medications, skincare, food."
        range: date
    class_uri: inkind_knowledge_repo:PersonalCareCategory
    rules:
    - preconditions:
        slot_conditions:
          is_sealed:
            name: is_sealed
            equals_string: 'false'
          subcategory:
            name: subcategory
            any_of:
            - equals_string: soap_body_wash
            - equals_string: shampoo_conditioner
            - equals_string: dental
            - equals_string: deodorant
            - equals_string: sanitary_products
            - equals_string: nappies_incontinence
            - equals_string: skincare
            - equals_string: cosmetics
            - equals_string: hair_styling
            - equals_string: otc_medication
            - equals_string: first_aid
            - equals_string: medical_consumables
      postconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            none_of:
            - equals_string: stored
            - equals_string: distributed
      description: 'Unsealed consumable personal care products must not be redistributed.
        A PC (Policy Constraint) override at the org level can permit specific subcategories
        (e.g. bulk bar soap) if org policy allows. action: block.'
      title: uc-personal-care-unsealed-consumables-block
    - preconditions:
        slot_conditions:
          subcategory:
            name: subcategory
            equals_string: personal_care_tools
          usage:
            name: usage
            equals_string: used
      postconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            none_of:
            - equals_string: stored
            - equals_string: distributed
      description: "Used personal care tools must not be redistributed. Health and\
        \ sanitary safety \u2014 no PC override permitted. action: block."
      title: uc-personal-care-used-tools-block
    - preconditions: {}
      annotations:
        enforcement:
          tag: enforcement
          value: application_layer
        uc_action:
          tag: uc_action
          value: block
        uc_suggest:
          tag: uc_suggest
          value: disposal
        uc_note:
          tag: uc_note
          value: "expiry_date < today \u2014 runtime check by Django model clean()"
      description: "Items past expiry date must not be redistributed. Runtime check\
