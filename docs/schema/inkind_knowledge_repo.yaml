      COICOP 09.5 (newspapers, books, stationery). Separated from BooksItem because
      published content (BooksItem) and consumable/office supplies have different
      sorting paths, condition vocabularies (partially-used pens are not "poor condition
      books"), and demand signal patterns (school supply drives vs. book donations).
      Assessment: condition_grade (wear grade).'
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_item
