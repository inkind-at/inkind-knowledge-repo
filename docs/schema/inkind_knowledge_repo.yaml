  GeoPoint:
    name: GeoPoint
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/GeoPoint
    description: Geographic coordinates for public map display of an organisation.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/organisation
    slots:
    - geoPoint__lat
    - geoPoint__long
    attributes:
      lat:
        name: lat
        description: Latitude in decimal degrees.
        range: float
      long:
        name: long
        description: Longitude in decimal degrees.
        range: float
    class_uri: inkind_knowledge_repo:GeoPoint
  OrgConfig:
    name: OrgConfig
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/OrgConfig
    description: Organisation-specific configuration parameters (timezone, locale,
      etc.). Full schema to be expanded in Phase 1.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/organisation
    slots:
    - orgConfig__timezone
    - orgConfig__locale
    attributes:
      timezone:
        name: timezone
        description: IANA timezone identifier (e.g., "Europe/Vienna").
        range: string
      locale:
        name: locale
        description: BCP-47 locale code (e.g., "de-AT").
        range: string
    class_uri: inkind_knowledge_repo:OrgConfig
  Actor:
    name: Actor
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/Actor
    description: "A person interacting with the system \u2014 volunteer, staff, or\
      \ manager."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/actor
    see_also:
    - foaf:Person
    slots:
    - id
    - Actor_org
    - role
    - experience_level
    - is_active
    slot_usage:
      org:
        name: org
        range: SocialOrganisation
        required: true
    class_uri: inkind_knowledge_repo:Actor
  StorageLocation:
    name: StorageLocation
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/StorageLocation
    description: A physical storage unit within an organisation's warehouse.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/storage_location
    slots:
    - id
    - StorageLocation_org
    - label
    - StorageLocation_parent
    - capacity
    - current_occupancy
    - is_active
    - category_affinity
    slot_usage:
      org:
        name: org
        range: SocialOrganisation
        required: true
      parent:
        name: parent
        description: "FK \u2014 for hierarchical storage (zone -> rack -> bin).  Null\
          \ for top-level locations."
        range: StorageLocation
        required: false
    class_uri: inkind_knowledge_repo:StorageLocation
  DonationSource:
    name: DonationSource
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/DonationSource
    description: Supply-side abstraction representing the origin of a donation. Phase
      1 uses `anonymous_private` type only.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_source
    slots:
    - id
    - source_type
    - anonymous_donor_id
    - corporate_donor_ref
    - organisation_ref
    - DonationSource_lifecycle_state
    - created_at
    - provenance
    slot_usage:
      lifecycle_state:
        name: lifecycle_state
        range: DonationSourceLifecycleEnum
        required: true
    class_uri: inkind_knowledge_repo:DonationSource
  DonationCollection:
    name: DonationCollection
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/DonationCollection
    description: A general-purpose grouping of items with optional recursive parent-child
      structure.  Replaces the flat DonationBatch model.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_collection
    see_also:
    - ceon:Resource
    slots:
    - id
    - DonationCollection_org
    - collection_type
    - label
    - DonationCollection_parent
    - DonationCollection_donation_source
    - DonationCollection_lifecycle_state
    - item_count
    - total_item_count
    - created_at
    - created_by
    - notes
    slot_usage:
      org:
        name: org
        range: SocialOrganisation
        required: true
      lifecycle_state:
        name: lifecycle_state
        range: CollectionLifecycleEnum
        required: true
      donation_source:
        name: donation_source
        range: DonationSource
        required: false
      parent:
        name: parent
        description: "FK \u2014 null for arrival collections (root); set for all derived\
          \ child collections."
        range: DonationCollection
        required: false
    class_uri: inkind_knowledge_repo:DonationCollection
  DonationItem:
    name: DonationItem
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/DonationItem
    description: "Abstract base for all donation items. Never instantiated directly.\n\
      The category slot carries designates_type: true \u2014 its value (the class\
      \ URI of the concrete subclass) selects which subclass schema applies. This\
      \ is the LinkML mechanism for a discriminated union: category IS the type, not\
      \ an attribute of the item. Grounded in schema:Product.\nattribute_completeness\
      \ is set by the fragment engine when the sorting episode completes. It records\
      \ data quality \u2014 NOT whether the episode was complete (lifecycle_state\
      \ = sorted records that). See AttributeCompletenessEnum in core.yaml for the\
      \ full rationale.\nThe lifecycle state machine is documented in ItemLifecycleStateEnum\
      \ in core.yaml. Transitions are enforced by Django model clean(). The sorting_in_progress\
      \ state prevents concurrent editing of the same item by two sorters simultaneously."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_item
    see_also:
    - schema:Product
    mappings:
    - schema:Product
    abstract: true
    slots:
    - id
    - DonationItem_category
    - DonationItem_lifecycle_state
    - DonationItem_usage
    - DonationItem_attribute_completeness
    - DonationItem_source_collection
    - DonationItem_donation_source
    - DonationItem_storage_unit
    - sorting_notes
    - created_at
    - updated_at
    slot_usage:
      category:
        name: category
        notes:
        - Due to a limitation in LinkML, the designates_type annotation was removed
          because the range is an Enum and not a string.
        required: true
      lifecycle_state:
        name: lifecycle_state
        range: ItemLifecycleStateEnum
        required: true
      usage:
        name: usage
        range: ItemUsageEnum
        required: true
      attribute_completeness:
        name: attribute_completeness
        range: AttributeCompletenessEnum
        required: false
      source_collection:
        name: source_collection
        range: DonationCollection
        required: false
      donation_source:
        name: donation_source
        range: DonationSource
        required: false
      storage_unit:
        name: storage_unit
        range: StorageLocation
        required: false
    class_uri: schema:Product
  ClothingItem:
    name: ClothingItem
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/ClothingItem
    description: "Clothing garments: tops, bottoms, outerwear, underwear, nightwear,\
      \ sportswear. COICOP 03.1 (clothing). Grounded in CPI (Clothing Product Information\
      \ ontology):\n  http://www.ebusiness-unibw.org/ontologies/cpi/ns#ClothingAndAccessories\n\
      \nAssessment: condition_grade (wear grade). The demographic\u2192size value\
      \ map and all UC rules (underwear condition, adult underwear must be new) are\
      \ defined in ClothingCategory (categories/clothing.yaml).\nLifecycle-aware rules\
      \ here:\n  lc-sorted-clothing-condition-grade-required\n  lc-sorted-clothing-demographic-required\n\
      \  lc-sorted-clothing-size-required"
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_item
    see_also:
    - http://www.ebusiness-unibw.org/ontologies/cpi/ns#ClothingAndAccessories
    mappings:
    - cpi:ClothingAndAccessories
    is_a: DonationItem
    mixins:
    - ClothingCategory
    slots:
    - id
    - DonationItem_category
    - DonationItem_lifecycle_state
    - DonationItem_usage
    - DonationItem_attribute_completeness
    - DonationItem_source_collection
    - DonationItem_donation_source
    - DonationItem_storage_unit
    - sorting_notes
    - created_at
    - updated_at
    - notes
    - material
    - ClothingCategory_subcategory
    - ClothingCategory_demographic
    - ClothingCategory_size
    - ClothingCategory_is_winter_suitable
    - ClothingCategory_season
    - intact_labels
    - ClothingCategory_condition_grade
    class_uri: cpi:ClothingAndAccessories
    rules:
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
      postconditions:
        slot_conditions:
          condition_grade:
            name: condition_grade
            required: true
      description: "condition_grade required at sorted state regardless of usage.\
        \ New item with defect \u2192 grade fair or poor, not assumed like_new. Sorters\
        \ observe and record; they do not assume from the usage label."
      title: lc-sorted-clothing-condition-grade-required
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
          subcategory:
            name: subcategory
            any_of:
            - equals_string: tops
            - equals_string: bottoms
            - equals_string: outerwear
            - equals_string: nightwear
      postconditions:
        slot_conditions:
          is_winter_suitable:
            name: is_winter_suitable
            required: true
      description: "is_winter_suitable required at sorted state for tops, bottoms,\
        \ outerwear, and nightwear. Not required for underwear (thermally neutral\
        \ base layer) or sportswear (assessed differently by the SportsItem category).\
        \ The thermal character of a garment is independent of usage \u2014 sorters\
        \ assess what they hold."
      title: lc-sorted-clothing-is-winter-suitable-required
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
      postconditions:
        slot_conditions:
          demographic:
            name: demographic
            required: true
      description: demographic required at sorted state for all ClothingItem instances.
        Drives demand signal matching (e.g. "adult female tops, size M").
      title: lc-sorted-clothing-demographic-required
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
      postconditions:
        slot_conditions:
          size:
            name: size
            required: true
      description: size required at sorted state. Drives demand signal matching and
        storage slot assignment.
      title: lc-sorted-clothing-size-required
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
      postconditions:
        slot_conditions:
          subcategory:
            name: subcategory
            required: true
      description: "subcategory required at sorted state. Drives demand signal matching,\
        \ UC rule evaluation (underwear constraints), and storage routing. Not required\
        \ at received state \u2014 category is known but subcategory is determined\
        \ during sorting."
      title: lc-sorted-clothing-subcategory-required
  AccessoriesItem:
    name: AccessoriesItem
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/AccessoriesItem
    description: "Fashion and personal accessories: hats, scarves, gloves, belts,\
      \ bags, jewellery, sunglasses, watches. COICOP 03.1 (grouped with clothing by\
      \ COICOP; separated here for progressive UI disclosure and schema clarity).\n\
      Separated from ClothingItem because:\n  - No demographic\u2192size value map\
      \ \u2014 accessories are not sized XS\u2013XXL\n  - Clothing UC rules (underwear\
      \ condition) do not apply\n  - Progressive disclosure: \"clothing or accessory?\"\
      \ is a clean first\n    branch in the sorting UI\n  - AccessoriesDemographicEnum\
      \ uses a simpler age-only vocabulary\n    (baby/child/adult/all_ages) \u2014\
      \ gender is not meaningful for most\n    accessories\n\nAssessment: condition_grade\
      \ (wear grade)."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_item
    see_also:
    - http://www.productontology.org/id/Fashion_accessory
    mappings:
    - pto:Fashion_accessory
    is_a: DonationItem
    mixins:
    - AccessoriesCategory
    slots:
    - id
    - DonationItem_category
    - DonationItem_lifecycle_state
    - DonationItem_usage
    - DonationItem_attribute_completeness
    - DonationItem_source_collection
    - DonationItem_donation_source
    - DonationItem_storage_unit
    - sorting_notes
    - created_at
    - updated_at
    - notes
    - AccessoriesCategory_subcategory
    - AccessoriesCategory_demographic
    - AccessoriesCategory_material
    - AccessoriesCategory_condition_grade
    class_uri: pto:Fashion_accessory
    rules:
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
      postconditions:
        slot_conditions:
          condition_grade:
            name: condition_grade
            required: true
      description: condition_grade required at sorted state regardless of usage.
      title: lc-sorted-accessories-condition-grade-required
  FootwearItem:
    name: FootwearItem
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/FootwearItem
    description: "Footwear: shoes, boots, sandals, slippers. COICOP 03.2 (footwear).\
      \ Separated from ClothingItem because:\n  - Shoe sizing systems (EU/UK/US/CM)\
      \ differ from clothing sizes\n  - Pair-completeness is a footwear-specific assessment\
      \ concern\nAssessment: condition_grade (wear grade)."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_item
    see_also:
    - http://www.productontology.org/id/Footwear
    mappings:
    - pto:Footwear
    is_a: DonationItem
    mixins:
    - FootwearCategory
    slots:
    - id
    - DonationItem_category
    - DonationItem_lifecycle_state
    - DonationItem_usage
    - DonationItem_attribute_completeness
    - DonationItem_source_collection
    - DonationItem_donation_source
    - DonationItem_storage_unit
    - sorting_notes
    - created_at
    - updated_at
    - notes
    - material
    - FootwearCategory_subcategory
    - FootwearCategory_demographic
    - shoe_size
    - shoe_size_system
    - is_pair_complete
    - FootwearCategory_is_winter_suitable
    - FootwearCategory_season
    - FootwearCategory_condition_grade
    class_uri: pto:Footwear
    rules:
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
      postconditions:
        slot_conditions:
          condition_grade:
            name: condition_grade
            required: true
      description: condition_grade required at sorted state regardless of usage.
      title: lc-sorted-footwear-condition-grade-required
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
      postconditions:
        slot_conditions:
          is_winter_suitable:
            name: is_winter_suitable
            required: true
      description: "is_winter_suitable required at sorted state. The thermal and weather-protection\
        \ character of footwear is operationally critical for cold-weather emergency\
        \ distribution \u2014 boots and sandals serve entirely different needs. Sorter\
        \ makes the call; fragment compiler provides subcategory-based hints only."
      title: lc-sorted-footwear-is-winter-suitable-required
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
      postconditions:
        slot_conditions:
          shoe_size:
            name: shoe_size
            required: true
          shoe_size_system:
            name: shoe_size_system
            required: true
      description: shoe_size and shoe_size_system required at sorted state. System
        required alongside size to disambiguate EU 42 from UK 8.
      title: lc-sorted-footwear-size-required
  FurnitureItem:
    name: FurnitureItem
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/FurnitureItem
    description: "Structural furniture: chairs, tables, beds, wardrobes, shelving.\
      \ COICOP 05.1 (furniture and furnishings). Grounded in Product Types Ontology:\n\
      \  http://www.productontology.org/id/Furniture\n\nAssessment: FurnitureAssessmentEnum\
      \ (structured structural assessment). Structural soundness is the primary redistribution\
      \ signal for furniture \u2014 a scratched but solid chair is redistributable;\
      \ a wobbly but clean one is not. assessment_result required regardless of usage\
      \ because new flatpack furniture can have manufacturing defects or assembly\
      \ issues."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_item
    see_also:
    - http://www.productontology.org/id/Furniture
    mappings:
    - pto:Furniture
    is_a: DonationItem
    mixins:
    - FurnitureCategory
    slots:
    - id
    - DonationItem_category
    - DonationItem_lifecycle_state
    - DonationItem_usage
    - DonationItem_attribute_completeness
    - DonationItem_source_collection
    - DonationItem_donation_source
    - DonationItem_storage_unit
    - sorting_notes
    - created_at
    - updated_at
    - notes
    - FurnitureCategory_subcategory
    - FurnitureCategory_material
    - FurnitureCategory_assessment_result
    - dimensions
    - style
    class_uri: pto:Furniture
    rules:
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
      postconditions:
        slot_conditions:
          assessment_result:
            name: assessment_result
            required: true
      description: assessment_result required at sorted state regardless of usage.
        New furniture can have manufacturing defects (cracked panels, defective joints,
        damaged flatpack components).
      title: lc-sorted-furniture-assessment-required
  BeddingTextilesItem:
    name: BeddingTextilesItem
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/BeddingTextilesItem
    description: "Bedding and household textiles: blankets, duvets, mattresses, pillows,\
      \ sleeping bags, towels, curtains. COICOP 05.2 (household textiles).\nSeparated\
      \ from HouseholdItem following COICOP 05.2 and UNHCR NFI kit standards, which\
      \ list blankets and sleeping mats as core relief items at the same priority\
      \ level as clothing \u2014 not incidental household goods. The hygiene assessment\
      \ vocabulary (BeddingAssessmentEnum) also differs fundamentally from household\
      \ item wear grading.\nAssessment: BeddingAssessmentEnum (hygiene and condition\
      \ assessment). Hygiene state is the primary redistribution signal for bedding\
      \ \u2014 a worn but clean blanket is redistributable; a visually intact but\
      \ stained mattress is not. assessment_result required regardless of usage because\
      \ new items may have packaging damage or factory soiling.\nUNHCR NFI standards\
      \ reference:\n  https://emergency.unhcr.org/emergency-assistance/core-relief-items/\n\
      \  kind-non-food-item-distribution"
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_item
    see_also:
    - http://www.productontology.org/id/Bedding
    - https://emergency.unhcr.org/emergency-assistance/core-relief-items/kind-non-food-item-distribution
    mappings:
    - pto:Bedding
    is_a: DonationItem
    mixins:
    - BeddingTextilesCategory
    slots:
    - id
    - DonationItem_category
    - DonationItem_lifecycle_state
    - DonationItem_usage
    - DonationItem_attribute_completeness
    - DonationItem_source_collection
    - DonationItem_donation_source
    - DonationItem_storage_unit
    - sorting_notes
    - created_at
    - updated_at
    - notes
    - material
    - BeddingTextilesCategory_subcategory
    - BeddingTextilesCategory_assessment_result
    - is_set_complete
    - BeddingTextilesCategory_is_winter_suitable
    class_uri: pto:Bedding
    rules:
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
      postconditions:
        slot_conditions:
          assessment_result:
            name: assessment_result
            required: true
      description: assessment_result required at sorted state regardless of usage.
        New items may have packaging damage or factory soiling.
      title: lc-sorted-bedding-assessment-required
  HouseholdItem:
    name: HouseholdItem
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/HouseholdItem
    description: "Household and kitchen goods: cookware, crockery, small appliances,\
      \ cleaning tools, home decor, garden tools. COICOP 05.3 (household appliances),\
      \ 05.4 (glassware, tableware, utensils), 05.5 (tools for house and garden).\
      \ Note: bedding and textiles (COICOP 05.2) are BeddingTextilesItem, not HouseholdItem\
      \ \u2014 separated per COICOP structure and UNHCR NFI practice. Assessment:\
      \ condition_grade (wear grade)."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_item
    see_also:
    - http://www.productontology.org/id/Household_goods
    mappings:
    - pto:Household_goods
    is_a: DonationItem
    mixins:
    - HouseholdCategory
    slots:
    - id
    - DonationItem_category
    - DonationItem_lifecycle_state
    - DonationItem_usage
    - DonationItem_attribute_completeness
    - DonationItem_source_collection
    - DonationItem_donation_source
    - DonationItem_storage_unit
    - sorting_notes
    - created_at
    - updated_at
    - notes
    - HouseholdCategory_subcategory
    - material
    - is_set_complete
    - HouseholdCategory_condition_grade
    class_uri: pto:Household_goods
    rules:
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
      postconditions:
        slot_conditions:
          condition_grade:
            name: condition_grade
            required: true
      description: condition_grade required at sorted state regardless of usage.
      title: lc-sorted-household-condition-grade-required
  ElectronicsItem:
    name: ElectronicsItem
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/ElectronicsItem
    description: "Consumer electronics: phones, tablets, laptops, cameras, audio devices,\
      \ cables, gaming consoles. COICOP 09.1 (audio-visual equipment) and 09.2.\n\
      Assessment: ElectronicsAssessmentEnum (functional and cosmetic state). Functional\
      \ state is the primary redistribution signal for electronics \u2014 a cracked-screen\
      \ phone that works is more useful than a pristine one that does not. assessment_result\
      \ required regardless of usage because new devices can have factory defects\
      \ or dead batteries.\nData wiping is a process concern (fragment step in sort_electronics\
      \ process path), not a schema constraint \u2014 it is enforced by the fragment\
      \ engine, not by a UC rule here."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_item
    see_also:
    - http://www.productontology.org/id/Consumer_electronics
    mappings:
    - pto:Consumer_electronics
    is_a: DonationItem
    mixins:
    - ElectronicsCategory
    slots:
    - id
    - DonationItem_category
    - DonationItem_lifecycle_state
    - DonationItem_usage
    - DonationItem_attribute_completeness
    - DonationItem_source_collection
    - DonationItem_donation_source
    - DonationItem_storage_unit
    - sorting_notes
    - created_at
    - updated_at
    - notes
    - material
    - ElectronicsCategory_subcategory
    - ElectronicsCategory_assessment_result
    - includes_charger
    - includes_original_packaging
    class_uri: pto:Consumer_electronics
    rules:
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
      postconditions:
        slot_conditions:
          assessment_result:
            name: assessment_result
            required: true
      description: assessment_result required at sorted state regardless of usage.
        New devices can have factory defects or dead batteries.
      title: lc-sorted-electronics-assessment-required
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
      postconditions:
        slot_conditions:
          assessment_result:
            name: assessment_result
            none_of:
            - equals_string: untested
      description: untested is only valid at received state. At sorted state the sorter
        must have tested the device and recorded a definitive assessment result.
      title: lc-sorted-electronics-not-untested
  ToysItem:
    name: ToysItem
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/ToysItem
    description: "Toys and games. COICOP 09.3 (games, toys, hobbies). Age grading\
      \ follows EU Toy Safety Directive 2009/48/EC:\n  https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32009L0048\n\
      UC rule for small parts choking hazard also references ASTM F963 (US standard)\
      \ for completeness. Assessment: condition_grade (wear grade)."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_item
    see_also:
    - http://www.productontology.org/id/Toy
    - https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32009L0048
    mappings:
    - pto:Toy
    is_a: DonationItem
    mixins:
    - ToysCategory
    slots:
    - id
    - DonationItem_category
    - DonationItem_lifecycle_state
    - DonationItem_usage
    - DonationItem_attribute_completeness
    - DonationItem_source_collection
    - DonationItem_donation_source
    - DonationItem_storage_unit
    - sorting_notes
    - created_at
    - updated_at
    - notes
    - material
    - ToysCategory_subcategory
    - ToysCategory_age_range
    - is_set_complete
    - has_small_parts
    - ToysCategory_condition_grade
    class_uri: pto:Toy
    rules:
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
      postconditions:
        slot_conditions:
          condition_grade:
            name: condition_grade
            required: true
      description: condition_grade required at sorted state regardless of usage.
      title: lc-sorted-toys-condition-grade-required
  SportsItem:
    name: SportsItem
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/SportsItem
    description: "Sports and fitness equipment. COICOP 09.4 (sport and recreational\
      \ equipment). Note: bicycles are placed here by domain convention; COICOP assigns\
      \ them to Division 07 (Transport). The domain decision reflects how social organisations\
      \ actually sort and store these items.\nDual-track assessment (defined in SportsCategory,\
      \ categories/sports.yaml):\n  protective_gear subcategory \u2192 SportsProtectiveAssessmentEnum\n\
      \    Wear grade is insufficient for safety-critical items \u2014 structural\n\
      \    damage may not be visually apparent after impact (e.g. a cracked\n    helmet\
      \ inner shell invisible under an intact outer shell).\n  all other subcategories\
      \ \u2192 condition_grade (wear grade)"
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_item
    see_also:
    - http://www.productontology.org/id/Sporting_goods
    mappings:
    - pto:Sporting_goods
    is_a: DonationItem
    mixins:
    - SportsCategory
    slots:
    - id
    - DonationItem_category
    - DonationItem_lifecycle_state
    - DonationItem_usage
    - DonationItem_attribute_completeness
    - DonationItem_source_collection
    - DonationItem_donation_source
    - DonationItem_storage_unit
    - sorting_notes
    - created_at
    - updated_at
    - notes
    - material
    - SportsCategory_subcategory
    - SportsCategory_assessment_result
    - SportsCategory_condition_grade
    - sport_type
    - SportsCategory_demographic
    - is_set_complete
    class_uri: pto:Sporting_goods
    rules:
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
      postconditions:
        slot_conditions:
          subcategory:
            name: subcategory
            required: true
      description: subcategory required at sorted state. SportsCategory rules then
        enforce whether assessment_result or condition_grade is required based on
        the subcategory value (protective_gear vs. other).
      title: lc-sorted-sports-subcategory-required
  BooksItem:
    name: BooksItem
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/BooksItem
    description: "Books and educational materials. COICOP 09.5 (newspapers, books,\
      \ stationery). Grounded in schema:Book (schema.org has a first-class Book type\
      \ distinct from generic Product). No demographic or clothing-style size dimension\
      \ \u2014 age_range (BookAgeRangeEnum) is broader and non-gendered. Assessment:\
      \ condition_grade (wear grade)."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_item
    see_also:
    - schema:Book
    mappings:
    - schema:Book
    is_a: DonationItem
    mixins:
    - BooksCategory
    slots:
    - id
    - DonationItem_category
    - DonationItem_lifecycle_state
    - DonationItem_usage
    - DonationItem_attribute_completeness
    - DonationItem_source_collection
    - DonationItem_donation_source
    - DonationItem_storage_unit
    - sorting_notes
    - created_at
    - updated_at
    - notes
    - material
    - BooksCategory_subcategory
    - language
    - BooksCategory_age_range
    - BooksCategory_condition_grade
    class_uri: schema:Book
    rules:
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
      postconditions:
        slot_conditions:
          condition_grade:
            name: condition_grade
            required: true
      description: condition_grade required at sorted state regardless of usage.
      title: lc-sorted-books-condition-grade-required
  StationeryItem:
    name: StationeryItem
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/StationeryItem
    description: 'Stationery and office supplies: pens, notebooks, art supplies, calculators.
      COICOP 09.5 (newspapers, books, stationery). Separated from BooksItem because
      published content (BooksItem) and consumable/office supplies have different
      sorting paths, condition vocabularies (partially-used pens are not "poor condition
      books"), and demand signal patterns (school supply drives vs. book donations).
      Assessment: condition_grade (wear grade).'
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_item
    see_also:
    - http://www.productontology.org/id/Stationery
    mappings:
    - pto:Stationery
    is_a: DonationItem
    mixins:
    - StationeryCategory
    slots:
    - id
    - DonationItem_category
    - DonationItem_lifecycle_state
    - DonationItem_usage
    - DonationItem_attribute_completeness
    - DonationItem_source_collection
    - DonationItem_donation_source
    - DonationItem_storage_unit
    - sorting_notes
    - created_at
    - updated_at
    - notes
    - material
    - StationeryCategory_subcategory
    - is_set_complete
    - StationeryCategory_condition_grade
    class_uri: pto:Stationery
    rules:
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
      postconditions:
        slot_conditions:
          condition_grade:
            name: condition_grade
            required: true
      description: condition_grade required at sorted state regardless of usage.
      title: lc-sorted-stationery-condition-grade-required
  PersonalCareItem:
    name: PersonalCareItem
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/PersonalCareItem
    description: "Personal care, hygiene, and health products. Merges COICOP 06.1\
      \ (medical products and appliances) and 12.1 (personal care \u2014 toiletries,\
      \ cosmetics, related appliances). Open Eligibility uses a single \"Personal\
      \ Care Items\" node for both:\n  https://company.auntbertha.com/openeligibility/\n\
      \nMerged because the operative safety rules are identical across both former\
      \ categories: sealed required, used tools blocked, expiry enforced. Splitting\
      \ them would duplicate all three rules with no semantic benefit.\nAssessment:\
      \ is_sealed + expiry_date (no condition_grade or assessment_result). For personal\
      \ care products, the relevant safety signals are hygiene integrity (sealed?)\
      \ and freshness (not expired?). A wear grade is meaningless for a tube of toothpaste\
      \ \u2014 it is either sealed or it is not."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_item
    see_also:
    - http://www.productontology.org/id/Personal_hygiene
    - http://www.productontology.org/id/Cosmetics
    - https://company.auntbertha.com/openeligibility/
    mappings:
    - pto:Personal_hygiene
    is_a: DonationItem
    mixins:
    - PersonalCareCategory
    slots:
    - id
    - DonationItem_category
    - DonationItem_lifecycle_state
    - DonationItem_usage
    - DonationItem_attribute_completeness
    - DonationItem_source_collection
    - DonationItem_donation_source
    - DonationItem_storage_unit
    - sorting_notes
    - created_at
    - updated_at
    - notes
    - material
    - PersonalCareCategory_subcategory
    - PersonalCareCategory_is_sealed
    - PersonalCareCategory_expiry_date
    class_uri: pto:Personal_hygiene
    rules:
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
      postconditions:
        slot_conditions:
          is_sealed:
            name: is_sealed
            required: true
      description: is_sealed required at sorted state regardless of usage. Even new
        personal care items may have compromised packaging.
      title: lc-sorted-personal-care-sealed-required
  MobilityAidsItem:
    name: MobilityAidsItem
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/MobilityAidsItem
    description: "Mobility aids and assistive devices: wheelchairs, crutches, walking\
      \ frames, hearing aids, orthotics, daily living aids. COICOP 06.1.3 (other medical\
      \ products) and 06.2 (outpatient services, durable medical equipment). Open\
      \ Eligibility \"Assistive Technology\" top-level category:\n  https://company.auntbertha.com/openeligibility/\n\
      \nAssessment: MobilityAssessmentEnum (structured safety and hygiene). A single\
      \ enum captures structural soundness, functional state, and body-contact hygiene\
      \ (used hearing aids, orthotics) \u2014 replacing the former separate boolean\
      \ structural_integrity + functional_status slots that generated the problematic\
      \ annotation-based approach. assessment_result required regardless of usage\
      \ \u2014 new mobility aids can have manufacturing defects."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_item
    see_also:
    - http://www.productontology.org/id/Assistive_technology
    - https://company.auntbertha.com/openeligibility/
    mappings:
    - pto:Assistive_technology
    is_a: DonationItem
    mixins:
    - MobilityAidsCategory
    slots:
    - id
    - DonationItem_category
    - DonationItem_lifecycle_state
    - DonationItem_usage
    - DonationItem_attribute_completeness
    - DonationItem_source_collection
    - DonationItem_donation_source
    - DonationItem_storage_unit
    - sorting_notes
    - created_at
    - updated_at
    - notes
    - material
    - MobilityAidsCategory_subcategory
    - MobilityAidsCategory_assessment_result
    class_uri: pto:Assistive_technology
    rules:
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
      postconditions:
        slot_conditions:
          assessment_result:
            name: assessment_result
            required: true
      description: assessment_result required at sorted state regardless of usage.
        New mobility aids can have manufacturing defects.
      title: lc-sorted-mobility-assessment-required
  BabyInfantItem:
    name: BabyInfantItem
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/BabyInfantItem
    description: "Baby and infant supplies: pushchairs, cots, car seats, infant formula,\
      \ feeding bottles, baby monitors, bath equipment. Baby clothing belongs in ClothingItem\
      \ (demographic=baby).\nCOICOP distributes baby items across Division 03 (clothing),\
      \ 05 (household), and 01 (food). Treated as a first-class top-level category\
      \ here following Open Eligibility \"Baby Supplies\" and UNHCR NFI kit practice\
      \ (nappies and formula are core NFI kit items):\n  https://company.auntbertha.com/openeligibility/\n\
      \  https://emergency.unhcr.org/emergency-assistance/core-relief-items/\n\nThree-track\
      \ assessment model (defined in BabyInfantCategory):\n  Track 1 \u2014 safety-critical\
      \ equipment (BabyEquipmentAssessmentEnum):\n    pushchairs, cots, car seats,\
      \ carriers, high chairs, sleeping bags.\n    EN 1888 (pushchairs), EN 716 (cots),\
      \ EN 14344 (car seats),\n    EN 16781 (baby sleeping bags \u2014 neck/armhole\
      \ openings, no loose\n    cords), all require structured provenance + structural\
      \ assessment.\n    Baby sleeping bags are Track 1, NOT BeddingTextilesItem \u2014\
      \ the\n    EN 16781 safety check differs materially from adult sleeping bag\n\
      \    hygiene assessment.\n  Track 2 \u2014 consumables (is_sealed + expiry_date):\n\
      \    infant_formula, feeding_bottles_teats, baby_food.\n  Track 3 \u2014 general\
      \ baby gear (condition_grade):\n    bath equipment, changing, monitors, bouncers."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_item
    see_also:
    - http://www.productontology.org/id/Baby_transport
    - http://www.productontology.org/id/Infant_bed
    - https://company.auntbertha.com/openeligibility/
    - https://emergency.unhcr.org/emergency-assistance/core-relief-items/kind-non-food-item-distribution
    mappings:
    - pto:Baby_transport
    is_a: DonationItem
    mixins:
    - BabyInfantCategory
    slots:
    - id
    - DonationItem_category
    - DonationItem_lifecycle_state
    - DonationItem_usage
    - DonationItem_attribute_completeness
    - DonationItem_source_collection
    - DonationItem_donation_source
    - DonationItem_storage_unit
    - sorting_notes
    - created_at
    - updated_at
    - notes
    - material
    - BabyInfantCategory_subcategory
    - BabyInfantCategory_assessment_result
    - manufacture_year
    - includes_original_accessories
    - BabyInfantCategory_is_winter_suitable
    - BabyInfantCategory_is_sealed
    - expiry_date
    - BabyInfantCategory_condition_grade
    class_uri: pto:Baby_transport
    rules:
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
          subcategory:
            name: subcategory
            equals_string: sleeping_bags
      postconditions:
        slot_conditions:
          is_winter_suitable:
            name: is_winter_suitable
            required: true
      description: "is_winter_suitable required at sorted state for baby sleeping\
        \ bags. A summer-weight baby sleeping bag (0.5\u20131.0 tog) issued in cold-\
        \ weather distribution is a safety risk \u2014 infants cannot regulate their\
        \ own temperature. BabyInfantCategory also carries this rule; the lifecycle\
        \ rule here ensures it is enforced at the sorted transition."
      title: lc-sorted-baby-sleeping-bag-winter-required
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
      postconditions:
        slot_conditions:
          subcategory:
            name: subcategory
            required: true
      description: subcategory required at sorted state. BabyInfantCategory rules
        then enforce the appropriate assessment track for that subcategory.
      title: lc-sorted-baby-subcategory-required
  FoodItem:
    name: FoodItem
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/FoodItem
    annotations:
      phase:
        tag: phase
        value: Phase 1 stub
    description: "Food donation item. COICOP Division 01 (food and non-alcoholic beverages).\
      \ Grounded in FoodOn (OBO Foundry food ontology):\n  http://purl.obolibrary.org/obo/foodon.owl\n\
      \nPhase 1 stub \u2014 fully declared to establish the schema; the sort_food\
      \ process path is activated when food-bank organisations are onboarded.\nAssessment:\
      \ packaging_intact + expiry_date (defined in FoodCategory). No condition_grade\
      \ or assessment_result \u2014 food safety is binary: packaging intact or not,\
      \ expired or not. FoodCategory does not extend CategoryMixin for this reason."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_item
    see_also:
    - foodon:00001006
    - http://purl.obolibrary.org/obo/foodon.owl
    mappings:
    - foodon:00001006
    is_a: DonationItem
    mixins:
    - FoodCategory
    slots:
    - id
    - DonationItem_category
    - DonationItem_lifecycle_state
    - DonationItem_usage
    - DonationItem_attribute_completeness
    - DonationItem_source_collection
    - DonationItem_donation_source
    - DonationItem_storage_unit
    - sorting_notes
    - created_at
    - updated_at
    - FoodCategory_food_type
    - FoodCategory_expiry_date
    - FoodCategory_packaging_intact
    - FoodCategory_storage_requirement
    - quantity
    class_uri: foodon:00001006
    rules:
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
      postconditions:
        slot_conditions:
          storage_requirement:
            name: storage_requirement
            required: true
      description: storage_requirement required at sorted state.
      title: lc-sorted-food-storage-required
  OtherItem:
    name: OtherItem
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/OtherItem
    description: "Catch-all for donation items not fitting any other category. No\
      \ mixin \u2014 minimal slots only (item_description + condition_grade). Use\
      \ sparingly: if a new item type appears frequently in operations, it warrants\
      \ a proper subclass with a category mixin and dedicated sorting fragment rather\
      \ than accumulating in OtherItem."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_item
    mappings:
    - schema:Product
    is_a: DonationItem
    slots:
    - id
    - DonationItem_category
    - DonationItem_lifecycle_state
    - DonationItem_usage
    - DonationItem_attribute_completeness
    - DonationItem_source_collection
    - DonationItem_donation_source
    - DonationItem_storage_unit
    - sorting_notes
    - created_at
    - updated_at
    - OtherItem_item_description
    - OtherItem_condition_grade
    slot_usage:
      item_description:
        name: item_description
        required: true
      condition_grade:
        name: condition_grade
        range: UsedConditionGradeEnum
        required: false
    class_uri: schema:Product
    rules:
    - preconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            equals_string: sorted
      postconditions:
        slot_conditions:
          item_description:
            name: item_description
            required: true
          condition_grade:
            name: condition_grade
            required: true
      description: item_description and condition_grade required at sorted state.
        item_description provides the minimum human-readable record for items with
        no controlled vocabulary.
      title: lc-sorted-other-required-fields
  AnyValue:
    name: AnyValue
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/AnyValue
    description: Current workaround before proper attributes are introduced. Unconstrained
      value holder for schemaless JSON blobs. Used for DemandSignal.attributes until
      the Phase 2 typed ItemAttributes refactor.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/demand_signal
    slots:
    - subcategory
    - demographic
    - size
    class_uri: inkind_knowledge_repo:AnyValue
  DemandSignal:
    name: DemandSignal
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/DemandSignal
    description: A signal representing demand for a category of items.  Covers standing
      interests, time-bounded campaigns, and specific beneficiary requests under a
      single unified model.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/demand_signal
    see_also:
    - schema:Demand
    slots:
    - id
    - DemandSignal_org
    - signal_type
    - DemandSignal_category
    - attributes
    - quantity_requested
    - quantity_fulfilled
    - campaign
    - holder
    - context_note
    - deadline
    - DemandSignal_urgency_tier
    - DemandSignal_lifecycle_state
    - registered_at
    - public_visibility
    slot_usage:
      org:
        name: org
        range: SocialOrganisation
        required: true
      category:
        name: category
        see_also:
        - openeligibility:ServiceTag
        range: CategoryEnum
        required: true
      lifecycle_state:
        name: lifecycle_state
        range: DemandSignalLifecycleEnum
        required: true
      urgency_tier:
        name: urgency_tier
        see_also:
        - openeligibility:HumanSituation
        range: UrgencyTierEnum
        required: false
    class_uri: inkind_knowledge_repo:DemandSignal
  Campaign:
    name: Campaign
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/Campaign
    description: A public-facing appeal grouping related DemandSignals under a shared
      title, timeline, and beneficiary group.  Campaign progress is derived from its
      child signals.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/campaign
    mappings:
    - schema:Event
    slots:
    - id
    - Campaign_org
    - title
    - description
    - starts_at
    - ends_at
    - target_beneficiary_group
    - Campaign_lifecycle_state
    - signals
    slot_usage:
      org:
        name: org
        range: SocialOrganisation
        required: true
      lifecycle_state:
        name: lifecycle_state
        range: CampaignLifecycleEnum
        required: true
    class_uri: schema:Event
  CategoryMixin:
    name: CategoryMixin
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/CategoryMixin
    description: "Abstract mixin base for all category classes except FoodCategory.\n\
      Provides shared slots (notes, material) available to all categories. Does NOT\
      \ declare a condition rule \u2014 each category type handles condition differently\
      \ (see schema description above for full rationale).\nFoodCategory does not\
      \ extend this mixin because food safety assessment uses packaging_intact + expiry_date\
      \ rather than condition_grade or assessment_result. Extending CategoryMixin\
      \ would pull in slots that are semantically incorrect for food items.\nAll other\
      \ concrete category mixins extend CategoryMixin and declare their own condition\
      \ approach (condition_grade or assessment_result) along with category-specific\
      \ slots, UC rules, VM rules, and completeness tier annotations."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/_base
    mixin: true
    slots:
    - notes
    - material
    class_uri: inkind_knowledge_repo:CategoryMixin
  AccessoriesCategory:
    name: AccessoriesCategory
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/AccessoriesCategory
    annotations:
      completeness_minimal:
        tag: completeness_minimal
        value: subcategory, usage
      completeness_standard:
        tag: completeness_standard
        value: subcategory, usage, condition_grade
      completeness_detailed:
        tag: completeness_detailed
        value: subcategory, demographic, material, usage, condition_grade
      coicop_division:
        tag: coicop_division
        value: '03.1'
    description: "Mixin for fashion and personal accessories. Applied to AccessoriesItem\
      \ via mixins: [AccessoriesCategory]. Deliberately simpler than ClothingCategory\
      \ \u2014 no size dimension, no demographic\u2192size value map, simpler demographic\
      \ vocabulary, no underwear UC rules. See schema description above for full rationale."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/accessories
    see_also:
    - http://www.productontology.org/id/Fashion_accessory
    is_a: CategoryMixin
    mixin: true
    slots:
    - notes
    - AccessoriesCategory_subcategory
    - AccessoriesCategory_demographic
    - AccessoriesCategory_material
    - AccessoriesCategory_condition_grade
    slot_usage:
      subcategory:
        name: subcategory
        range: AccessoriesSubcategoryEnum
        required: true
      demographic:
        name: demographic
        description: 'Optional age group. Not applicable to most accessories (bags,
          jewellery, belts are generally adult by default). Use for clearly age-targeted
          items: children''s hats, baby mittens, baby carriers (though carriers belong
          in BabyInfantItem).'
        range: AccessoriesDemographicEnum
        required: false
      material:
        name: material
        description: "Primary material (e.g. \"leather\", \"wool\", \"cotton\", \"\
          metal\"). Free text \u2014 no controlled vocabulary at this stage."
        range: string
        required: false
      condition_grade:
        name: condition_grade
        range: UsedConditionGradeEnum
        required: false
    class_uri: inkind_knowledge_repo:AccessoriesCategory
  ClothingCategory:
    name: ClothingCategory
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/ClothingCategory
    annotations:
      completeness_minimal:
        tag: completeness_minimal
        value: subcategory, usage
      completeness_standard:
        tag: completeness_standard
        value: subcategory, demographic, size, is_winter_suitable, usage, condition_grade
      completeness_detailed:
        tag: completeness_detailed
        value: subcategory, demographic, size, is_winter_suitable, season, usage,
          condition_grade, intact_labels
      coicop_division:
        tag: coicop_division
        value: '03.1'
      season_ui_hint:
        tag: season_ui_hint
        value: Fragment compiler may pre-fill is_winter_suitable=true when subcategory=outerwear
          and is_winter_suitable=false when subcategory=sportswear (swimwear). Sorter
          can override.
    description: "Mixin carrying clothing-specific slots, value maps, and UC rules.\
      \ Applied to ClothingItem via mixins: [ClothingCategory]. Does NOT include accessories\
      \ \u2014 see AccessoriesCategory (accessories.yaml).\nDomain-level rules only\
      \ (no lifecycle_state references). Lifecycle-aware rules (lc-*) live on ClothingItem\
      \ in donation_item.yaml because lifecycle_state is a DonationItem slot invisible\
      \ to this mixin.\nValue maps grounded in CPI ontology demographic and size vocabularies.\
      \ Underwear UC constraints reflect real social-sector hygiene policy. Seasonality:\
      \ is_winter_suitable (boolean, standard tier) + season (SeasonEnum, optional,\
      \ detailed tier). See schema description above for the full design rationale."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/clothing
    see_also:
    - http://www.ebusiness-unibw.org/ontologies/cpi/ns#ClothingAndAccessories
    is_a: CategoryMixin
    mixin: true
    slots:
    - notes
    - material
    - ClothingCategory_subcategory
    - ClothingCategory_demographic
    - ClothingCategory_size
    - ClothingCategory_is_winter_suitable
    - ClothingCategory_season
    - intact_labels
    - ClothingCategory_condition_grade
    slot_usage:
      subcategory:
        name: subcategory
        description: Subcategory becomes a required field on DonationItem when item's
          lifecycle is sorted.
        range: ClothingSubcategoryEnum
        required: false
      demographic:
        name: demographic
        range: DemographicEnum
        required: false
      size:
        name: size
        range: ClothingSizeEnum
        required: false
      is_winter_suitable:
        name: is_winter_suitable
        description: "Whether this garment provides meaningful warmth in cold-weather\
          \ conditions. Required at standard completeness for tops, bottoms, outerwear,\
          \ nightwear. The sorter's direct assessment \u2014 not inferred from subcategory\
          \ or material. The primary emergency distribution filter: \"all winter-suitable\
          \ clothing for adults.\""
        range: boolean
        required: false
      season:
        name: season
        description: "Seasonal suitability. Optional \u2014 detailed completeness\
          \ tier. Multivalued: a garment may span seasons (e.g. spring_autumn + summer).\
          \ VM rules auto-derive is_winter_suitable for the extreme values (winter,\
          \ summer, all_season); spring_autumn leaves the sorter to set is_winter_suitable\
          \ explicitly."
        range: SeasonEnum
        required: false
        multivalued: true
      condition_grade:
        name: condition_grade
        range: UsedConditionGradeEnum
        required: false
    class_uri: inkind_knowledge_repo:ClothingCategory
    rules:
    - preconditions:
        slot_conditions:
          subcategory:
            name: subcategory
            equals_string: underwear
          condition_grade:
            name: condition_grade
            any_of:
            - equals_string: fair
            - equals_string: poor
      postconditions:
        slot_conditions:
          lifecycle_state:
            name: lifecycle_state
            none_of:
            - equals_string: stored
            - equals_string: distributed
      description: 'Underwear must be new or like_new condition. fair or poor graded
        underwear must not be redistributed. Reflects universal hygiene policy across
        social organisations. action: block, suggest: disposal.'
      title: uc-underwear-condition-block
    - preconditions:
        slot_conditions:
          subcategory:
            name: subcategory
            equals_string: underwear
          demographic:
            name: demographic
            any_of:
            - equals_string: adult_male
            - equals_string: adult_female
      postconditions:
        slot_conditions:
          usage:
            name: usage
            equals_string: new
      description: 'Used adult underwear (adult_male or adult_female demographic)
        must not be redistributed. usage must be new. Reflects hygiene and dignity
        standards applied universally in the social sector. action: block.'
      title: uc-underwear-adult-used-block
    - preconditions:
        slot_conditions:
          subcategory:
            name: subcategory
            equals_string: underwear
      postconditions:
        slot_conditions:
          demographic:
            name: demographic
            none_of:
            - equals_string: unisex
      description: 'Underwear subcategory does not support unisex demographic. action:
        block (invalid combination).'
      title: vm-underwear-no-unisex
    - preconditions:
        slot_conditions:
          demographic:
            name: demographic
            equals_string: baby
      postconditions:
        slot_conditions:
          size:
            name: size
            any_of:
            - equals_string: baby_0_3m
            - equals_string: baby_3_6m
            - equals_string: baby_6_12m
            - equals_string: baby_12_18m
            - equals_string: baby_18_24m
      description: baby demographic constrains size to infant size codes.
      title: vm-size-baby
    - preconditions:
        slot_conditions:
          demographic:
            name: demographic
            equals_string: child
      postconditions:
        slot_conditions:
          size:
            name: size
            any_of:
            - equals_string: child_2T
            - equals_string: child_3T
            - equals_string: child_4T
            - equals_string: child_5
            - equals_string: child_6
            - equals_string: child_7
            - equals_string: child_8
            - equals_string: child_10
            - equals_string: child_12
            - equals_string: child_14
      description: child demographic constrains size to children's size codes.
      title: vm-size-child
    - preconditions:
        slot_conditions:
          demographic:
            name: demographic
            any_of:
            - equals_string: adult_male
            - equals_string: adult_female
            - equals_string: unisex
      postconditions:
        slot_conditions:
          size:
            name: size
            any_of:
            - equals_string: xs
            - equals_string: s
            - equals_string: m
            - equals_string: l
            - equals_string: xl
            - equals_string: xxl
            - equals_string: xxxl
            - equals_string: one_size
      description: adult/unisex demographics constrain size to adult size codes.
      title: vm-size-adult
    - preconditions:
        slot_conditions:
          season:
            name: season
            equals_string: winter
      postconditions:
        slot_conditions:
          is_winter_suitable:
            name: is_winter_suitable
            equals_string: 'true'
      description: season = winter implies is_winter_suitable = true. A garment explicitly
        tagged winter must be winter-suitable.
      title: vm-season-winter
    - preconditions:
        slot_conditions:
          season:
            name: season
            equals_string: summer
      postconditions:
        slot_conditions:
          is_winter_suitable:
            name: is_winter_suitable
            equals_string: 'false'
      description: "season = summer implies is_winter_suitable = false. A garment\
        \ explicitly tagged summer-only is not winter-suitable. Note: if a sorter\
        \ tags both summer and spring_autumn, the is_winter_suitable value is their\
        \ explicit call \u2014 no rule fires."
      title: vm-season-summer
    - preconditions:
        slot_conditions:
          season:
            name: season
            equals_string: all_season
      postconditions:
        slot_conditions:
          is_winter_suitable:
            name: is_winter_suitable
            equals_string: 'true'
      description: season = all_season implies is_winter_suitable = true. All-season
        items are by definition suitable in winter.
      title: vm-season-all
  FootwearCategory:
    name: FootwearCategory
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/FootwearCategory
    annotations:
