      expert:
        text: expert
        description: "Expert \u2014 minimal guidance, fast-path mode."
  DonationSourceTypeEnum:
    name: DonationSourceTypeEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/DonationSourceTypeEnum
    description: Discriminator for the origin type of a donation.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_source
    permissible_values:
      anonymous_private:
        text: anonymous_private
        description: Anonymous private donor.  Only type active in Phase 1. Identity
          tracked via opaque `anonymous_donor_id` token only.
      corporate:
        text: corporate
        description: "Corporate donor \u2014 linked to CorporateDonor profile. Year\
          \ 2 feature stub."
      organisation:
        text: organisation
        description: Donation from another SocialOrganisation (e.g., a Share workflow
          transfer).  Phase 2 stub.
  DonationSourceLifecycleEnum:
    name: DonationSourceLifecycleEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/DonationSourceLifecycleEnum
    description: Lifecycle states for a DonationSource.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_source
    permissible_values:
      announced:
        text: announced
        description: Donor indicated intent to donate; physical items not yet received.
      received:
        text: received
        description: Physical items received and linked to this source.
      acknowledged:
        text: acknowledged
        description: "Impact notification sent to donor.  Phase 1 stub \u2014 activated\
          \ when items complete their lifecycle and Donor Portal is live."
  CollectionTypeEnum:
    name: CollectionTypeEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/CollectionTypeEnum
    description: Operational type of a DonationCollection.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_collection
    permissible_values:
      arrival:
        text: arrival
        description: Root collection created when a donation arrives.  Replaces DonationBatch.  Phase
          1 only type in active use.
      working:
        text: working
        description: Temporary intermediate collection during a multi-stage sort pass.
          Phase 2 stub.
      sorted:
        text: sorted
        description: Stable grouping after a sort stage completes.  Phase 2 stub.
      stock:
        text: stock
        description: Named standing collection ready for distribution.  Maps to DemandSignal
          of type `standing`.  Phase 2 stub.
        see_also:
        - ceon:CircularValueNetwork
      campaign:
        text: campaign
        description: Collection assembled for a specific Campaign entity.  Phase 2
          stub.
      disposed:
        text: disposed
        description: "Items culled during sorting \u2014 auditable at collection level.\
          \ Phase 2 stub."
  CollectionLifecycleEnum:
    name: CollectionLifecycleEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/CollectionLifecycleEnum
    description: Lifecycle states for a DonationCollection.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_collection
    permissible_values:
      open:
        text: open
        description: Collection is open for item registration or operations.
      processing:
        text: processing
        description: Items are actively being registered or processed.
      closed:
        text: closed
        description: All processing complete; collection is closed.
      archived:
        text: archived
        description: Collection has been archived for record-keeping.
  DemandSignalTypeEnum:
    name: DemandSignalTypeEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/DemandSignalTypeEnum
    description: Discriminator for the type of demand signal.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/demand_signal
    permissible_values:
      standing:
        text: standing
        description: Permanent standing interest in a category.  No deadline, no quantity
          target.  Stays active until explicitly withdrawn.
      campaign:
        text: campaign
        description: Time-bounded coordinated effort tied to a Campaign.  Has deadline
          and quantity target.
      specific:
        text: specific
        description: Concrete request for a specific beneficiary or holder.  Has urgency
          tier.
  UrgencyTierEnum:
    name: UrgencyTierEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/UrgencyTierEnum
    description: Urgency classification for campaign and specific demand signals.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/demand_signal
    permissible_values:
      low:
        text: low
        description: "Low urgency \u2014 no immediate deadline pressure."
      medium:
        text: medium
        description: Medium urgency.
      high:
        text: high
        description: "High urgency \u2014 deadline approaching or need is acute."
      critical:
        text: critical
        description: "Critical \u2014 immediate fulfilment required."
  DemandSignalLifecycleEnum:
    name: DemandSignalLifecycleEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/DemandSignalLifecycleEnum
    description: Lifecycle states for a DemandSignal.  Standing signals stay `active`
      permanently; campaign and specific signals follow the full lifecycle.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/demand_signal
    permissible_values:
      active:
        text: active
        description: Signal is active and accepting matched items.
      partially_fulfilled:
        text: partially_fulfilled
        description: Some items matched but quantity_requested not yet reached.
      fulfilled:
        text: fulfilled
        description: All requested items matched.
      expired:
        text: expired
        description: Deadline passed without full fulfilment (campaign/specific types
          only).
      withdrawn:
        text: withdrawn
        description: Organisation explicitly cancelled this signal.
  CampaignLifecycleEnum:
    name: CampaignLifecycleEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/CampaignLifecycleEnum
    description: Lifecycle states for a Campaign.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/campaign
    permissible_values:
      planned:
        text: planned
        description: Campaign is planned but not yet started.
      active:
        text: active
        description: Campaign is active and accepting donations.
      completed:
        text: completed
        description: Campaign reached its end date with fulfilment achieved.
      cancelled:
        text: cancelled
        description: Campaign was cancelled before completion.
  AccessoriesSubcategoryEnum:
