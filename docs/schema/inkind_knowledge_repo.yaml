  MobilityAssessmentEnum:
    name: MobilityAssessmentEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/MobilityAssessmentEnum
    description: Structured safety and hygiene assessment for mobility aids and assistive
      devices. Unified vocabulary covering structural soundness, functional state,
      and body-contact hygiene. Replaces former separate boolean structural_integrity
      + functional_status slots. Required at sorting regardless of usage.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/mobility_aids
    permissible_values:
      safe_to_redistribute:
        text: safe_to_redistribute
        description: Structurally sound, fully functional (if powered), and clean.
          No hygiene concerns for body-contact items. Ready for redistribution. Appropriate
          for new items with no observed defects.
      safe_cosmetic_wear_only:
        text: safe_cosmetic_wear_only
        description: Minor cosmetic wear but structurally sound and fully functional.
          Safe to redistribute.
      safe_after_cleaning:
        text: safe_after_cleaning
        description: "Body-contact item (hearing aid, orthotic) that is structurally\
          \ sound but requires professional cleaning before redistribution. action:\
          \ warn \u2014 sorting_notes required."
      non_functional:
        text: non_functional
        description: "Powered device does not operate as expected. Consider repair\
          \ referral. action: warn \u2014 sorting_notes required."
      structurally_compromised:
        text: structurally_compromised
        description: 'Load-bearing or structural components unsafe. Applies regardless
          of usage. action: block, suggest: disposal or specialist repair referral.'
      specialist_referral_required:
        text: specialist_referral_required
        description: "Cannot be assessed by a general sorter \u2014 specialist evaluation\
          \ required (prosthetics, complex orthotics, specialised communication devices).\
          \ action: block from normal redistribution; flag for specialist organisation."
  MobilityAidsSubcategoryEnum:
    name: MobilityAidsSubcategoryEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/MobilityAidsSubcategoryEnum
    description: Mobility aids and assistive devices subcategories. Grounded in Product
      Types Ontology and Open Eligibility taxonomy.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/mobility_aids
    permissible_values:
      wheelchairs:
        text: wheelchairs
        description: Manual and powered wheelchairs. Structural + functional assessment
          required.
        see_also:
        - pto:Wheelchair
      crutches:
        text: crutches
        description: Axillary and forearm crutches, walking sticks. Structural assessment.
        see_also:
        - pto:Crutch
      walking_frames:
        text: walking_frames
        description: Walking frames, Zimmer frames, wheeled walkers, rollators.
        see_also:
        - pto:Walking_frame
      mobility_scooters:
        text: mobility_scooters
        description: Electric mobility scooters. Full functional + structural assessment.
      hearing_aids:
        text: hearing_aids
        description: "In-ear and behind-ear hearing aids. Body-contact \u2014 safe_after_cleaning\
          \ minimum."
        see_also:
        - pto:Hearing_aid
      visual_aids:
        text: visual_aids
        description: Reading glasses (non-prescription), magnifiers, white canes.
      orthotics:
        text: orthotics
        description: Splints, braces, supports. Body-contact assessment applies.
        see_also:
        - pto:Orthopedic_equipment
      prosthetics:
        text: prosthetics
        description: Prosthetic limbs. Specialist referral required.
      daily_living_aids:
        text: daily_living_aids
        description: Grab rails, bath seats, reachers, adapted cutlery.
        see_also:
        - pto:Assistive_technology
      communication_devices:
        text: communication_devices
        description: AAC devices, talking clocks, large-button phones. Functional
          assessment required.
        see_also:
        - pto:Augmentative_and_alternative_communication
      other:
        text: other
        description: Mobility aids and assistive devices not fitting above subcategories.
  BabyEquipmentAssessmentEnum:
    name: BabyEquipmentAssessmentEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/BabyEquipmentAssessmentEnum
    description: "Structured safety assessment for safety-critical baby equipment\
      \ (pushchairs, cots, car seats, carriers, high chairs). Required at sorting\
      \ regardless of usage \u2014 new equipment can have manufacturing defects or\
      \ fail safety age/provenance criteria.\nCar seat specific (EN 14344):\n  Structural\
      \ integrity after a collision cannot be verified. Car seats\n  over 10 years\
      \ old or with unknown collision history must receive\n  do_not_redistribute.\
      \ manufacture_year is required for all car seats\n  to enable the runtime age\
      \ check.\n\nCot specific (EN 716):\n  Drop-side cots are banned in the EU. A\
      \ new-looking dropside cot\n  must receive do_not_redistribute.\n\nBaby sleeping\
      \ bag specific (EN 16781):\n  Neck opening must prevent infant from slipping\
      \ inside. Armhole\n  openings must be present and correctly sized. No loose\
      \ cords,\n  drawstrings, or ribbon ties permitted. No small detachable decorative\n\
      \  parts. is_winter_suitable must be set \u2014 thermal weight ranges from\n\
      \  0.5 tog (summer) to 3.5 tog (winter)."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/baby_infant
    see_also:
    - https://eur-lex.europa.eu/
    permissible_values:
      safe_to_redistribute:
        text: safe_to_redistribute
        description: Structurally sound; all components present; manufacture date
          within acceptable range; no safety concerns. Ready for redistribution. Appropriate
          for new items with no observed defects.
      safe_minor_wear:
        text: safe_minor_wear
        description: Minor cosmetic wear but structurally sound and all safety-relevant
          components intact. Safe to redistribute.
      requires_specialist_check:
        text: requires_specialist_check
        description: "Appears functional but sorter cannot fully verify safety (unknown\
          \ locking mechanism, unfamiliar harness system, unclear provenance). action:\
          \ warn \u2014 redistribution only after specialist confirmation."
      structural_concern:
        text: structural_concern
        description: 'Visible structural damage, cracked components, bent frame, broken
          harness buckle. Applies to new (manufacturing defect) and used items. action:
          block.'
      do_not_redistribute:
        text: do_not_redistribute
        description: 'Must not be redistributed: car seat over 10 years old or confirmed
          post-collision (EN 14344), EU-banned dropside cot (EN 716), recalled model,
          missing critical safety components. action: block.'
  BabyInfantSubcategoryEnum:
    name: BabyInfantSubcategoryEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/BabyInfantSubcategoryEnum
    description: Baby and infant supplies subcategories. Grounded in Product Types
      Ontology. Baby clothing belongs in ClothingItem (demographic=baby).
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/baby_infant
    permissible_values:
      pushchairs_prams:
        text: pushchairs_prams
        description: Pushchairs, prams, strollers. Structural assessment required
          (EN 1888).
        see_also:
        - pto:Baby_transport
      car_seats:
        text: car_seats
        description: Car and booster seats. Assessment + manufacture_year required
          (EN 14344).
        see_also:
        - pto:Child_safety_seat
      cots_cribs:
        text: cots_cribs
        description: Cots, cribs, moses baskets. Structural assessment required (EN
          716). Dropside cots banned.
        see_also:
        - pto:Infant_bed
      baby_carriers:
        text: baby_carriers
        description: Baby slings, carriers, wraps. Structural assessment required.
        see_also:
        - pto:Baby_transport
      infant_formula:
        text: infant_formula
        description: Infant formula. Must be sealed + within expiry. UNHCR NFI core
          item.
        see_also:
        - pto:Infant_formula
      feeding_bottles_teats:
        text: feeding_bottles_teats
        description: Feeding bottles and teats. Must be sealed + unused (EN 14350).
      baby_food:
        text: baby_food
        description: Prepared baby food. Must be sealed + within expiry.
        see_also:
        - pto:Baby_food
      breastfeeding:
        text: breastfeeding
        description: Breast pumps, nursing pads, sterilisers.
      bath_equipment:
        text: bath_equipment
        description: Baby baths, bath seats, bath thermometers.
      changing:
        text: changing
        description: Changing mats, nappy bags, changing bags.
      baby_monitors:
        text: baby_monitors
        description: Audio and video baby monitors.
        see_also:
        - pto:Baby_monitor
      bouncers_swings:
        text: bouncers_swings
        description: Baby bouncers, swings, rockers, play gyms.
      high_chairs:
        text: high_chairs
        description: High chairs and booster feeding seats. Structural assessment
          required.
        see_also:
        - pto:High_chair
      sleeping_bags:
        text: sleeping_bags
        description: "Baby sleeping bags for home use (0-24 months). Track 1 \u2014\
          \ structured safety assessment required per EN 16781:2018. Sorter must verify:\n\
          \  - Neck opening size appropriate (infant cannot slip inside)\n  - Armhole\
          \ openings present and correctly sized\n  - No loose cords, drawstrings,\
          \ or ribbon ties (strangulation hazard)\n  - No small decorative parts that\
          \ could detach (choking hazard)\nis_winter_suitable required \u2014 thermal\
          \ weight varies widely from 0.5 tog (summer) to 3.5 tog (winter). Tog or\
          \ comfort temperature rating is typically printed on the label. Adult and\
          \ camping sleeping bags \u2192 BeddingTextilesItem."
        see_also:
        - pto:Sleeping_bag
      other:
        text: other
        description: Baby and infant supplies not fitting above subcategories.
  FoodTypeEnum:
    name: FoodTypeEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/FoodTypeEnum
    description: Primary food type classification. Grounded in FoodOn ontology (OBO
      Foundry). Each value maps to valid storage_requirement values via vm-storage-*
      rules.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/food
    see_also:
    - foodon:00001017
    permissible_values:
      dry_goods:
        text: dry_goods
        description: 'Non-perishable dry staples: pasta, rice, flour, cereals, pulses.
          Storage: ambient or dry_cool.'
        see_also:
        - foodon:00001256
      canned_goods:
        text: canned_goods
        description: 'Factory-sealed tins and cans. Shelf-stable at ambient temperature.
          Storage: ambient only.'
        see_also:
        - foodon:00002403
      fresh_produce:
        text: fresh_produce
        description: Unprocessed fruit, vegetables, herbs. Perishable. packaging_intact
          rule applies.
        see_also:
        - foodon:00001015
      dairy:
        text: dairy
        description: "Milk, cheese, yoghurt, and dairy-based products. Perishable\
          \ \u2014 requires refrigeration or freezing."
        see_also:
        - foodon:00001180
      frozen:
        text: frozen
        description: "Items requiring continuous frozen storage. Perishable \u2014\
          \ frozen storage is the only valid option. Breaking the cold chain makes\
          \ refreezing unsafe."
        see_also:
        - foodon:00002253
      beverages:
        text: beverages
        description: Bottled or packaged drinks (non-alcoholic).
        see_also:
        - foodon:00001062
      baby_food:
        text: baby_food
        description: "Commercially prepared infant formula and baby food. Perishable\
          \ once opened \u2014 packaging_intact rule applies. Note: infant formula\
          \ as a separate donation item belongs in BabyInfantItem (baby_infant category);\
          \ this value covers baby food donated as part of a food collection."
        see_also:
        - foodon:00002640
      condiments:
        text: condiments
        description: Sauces, spreads, oils, vinegars, and seasoning products.
        see_also:
        - foodon:00001139
      other:
        text: other
        description: Food items not fitting above categories.
  StorageRequirementEnum:
    name: StorageRequirementEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/StorageRequirementEnum
    description: Required storage condition for a food item. Valid values per food_type
      are constrained by vm-storage-* rules in FoodCategory.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/food
    permissible_values:
      ambient:
        text: ambient
        description: "Room temperature (15-25\xB0C), dry conditions. Standard pantry/warehouse\
          \ shelf."
      refrigerated:
        text: refrigerated
        description: "Refrigerated storage (0-4\xB0C)."
      frozen:
        text: frozen
        description: "Frozen storage (-18\xB0C or below)."
      dry_cool:
        text: dry_cool
        description: "Cool, dry conditions (8-15\xB0C) \u2014 root vegetable or wine-cellar\
          \ type."
  FoodSubcategoryEnum:
    name: FoodSubcategoryEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/FoodSubcategoryEnum
    description: Optional subcategory for further food classification within a food_type.
      Used when more granular labelling is operationally useful.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/food
    permissible_values:
      vegetables:
        text: vegetables
        description: Fresh vegetables.
        see_also:
        - foodon:00001638
      fruit:
        text: fruit
        description: Fresh fruit.
        see_also:
        - foodon:00001032
      bread_bakery:
        text: bread_bakery
        description: Bread, rolls, and baked goods.
        see_also:
        - foodon:00001112
      meat_alternatives:
        text: meat_alternatives
        description: Plant-based meat substitutes.
      ready_meals:
        text: ready_meals
        description: "Prepared meals \u2014 ambient, refrigerated, or frozen."
      other:
        text: other
        description: Food subcategory not covered above.
  DeviceTypeEnum:
    name: DeviceTypeEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/DeviceTypeEnum
    description: Device type used to complete a process step.
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/provenance
    permissible_values:
      mobile:
        text: mobile
        description: Mobile phone or tablet.
      desktop:
        text: desktop
        description: Desktop or laptop browser.
      scan:
        text: scan
        description: Barcode / QR scanner peripheral.
