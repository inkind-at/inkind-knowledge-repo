    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/toys
    see_also:
    - https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32009L0048
    permissible_values:
      age_0_to_3:
        text: age_0_to_3
        description: 0-3 years. MUST NOT have small parts (EU Toy Safety Directive
          2009/48/EC).
      age_3_to_6:
        text: age_3_to_6
        description: 3-6 years.
      age_6_to_12:
        text: age_6_to_12
        description: 6-12 years.
      age_12_plus:
        text: age_12_plus
        description: 12 years and above.
      adult:
        text: adult
        description: Adult games / collector items; not for children.
      all_ages:
        text: all_ages
        description: Suitable for all ages.
  SportsProtectiveAssessmentEnum:
    name: SportsProtectiveAssessmentEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/SportsProtectiveAssessmentEnum
    description: "Structured safety assessment for protective gear (helmets, pads,\
      \ life jackets, mouth guards). Structural damage may not be visually apparent\
      \ after impact \u2014 a helmet that has absorbed an impact is unsafe even if\
      \ it looks undamaged. Required regardless of usage."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/sports
    permissible_values:
      safe_to_redistribute:
        text: safe_to_redistribute
        description: Visually and physically intact; all components present (straps,
          buckles, padding); no signs of impact damage; appropriate for redistribution.
          Appropriate for new items with no observed defects.
      safe_cosmetic_wear_only:
        text: safe_cosmetic_wear_only
        description: Minor cosmetic wear (scratches, scuffs) but structurally sound
          with no impact damage. Safe to redistribute.
      unknown_impact_history:
        text: unknown_impact_history
        description: "No visible damage but impact history cannot be confirmed. action:\
          \ warn \u2014 sorter must confirm; advise recipient that protective certification\
          \ cannot be guaranteed."
      visible_structural_damage:
        text: visible_structural_damage
        description: 'Cracks, dents, deformation, or compromised structural components.
          Must not be redistributed regardless of usage. action: block.'
      unsafe_do_not_redistribute:
        text: unsafe_do_not_redistribute
        description: "Definitively unsafe: confirmed post-impact, recalled model,\
          \ expired certification, missing critical safety components. action: block\
          \ \u2014 consider specialist recycling."
