  FootwearSubcategoryEnum:
    name: FootwearSubcategoryEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/FootwearSubcategoryEnum
    description: "Footwear subcategories. Grounded in Product Types Ontology. is_winter_suitable\
      \ is the sorter's call \u2014 subcategory alone is insufficient (a lightweight\
      \ canvas boot is not winter-suitable; a fleece-lined boot is). Fragment compiler\
      \ provides UI hints."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/footwear
    permissible_values:
      shoes:
        text: shoes
        description: "Everyday shoes, trainers/sneakers, loafers, school shoes. is_winter_suitable\
          \ varies \u2014 trainers are spring_autumn/summer; leather Oxford shoes\
          \ can be all_season."
        see_also:
        - pto:Shoe
      boots:
        text: boots
        description: Ankle boots, knee-high boots, work boots, winter boots. Fragment
          compiler pre-fills is_winter_suitable=true; sorter overrides for summer
          ankle boots, fashion boots without insulation.
        see_also:
        - pto:Boot
      sandals:
        text: sandals
        description: Open sandals and flip-flops. Fragment compiler pre-fills is_winter_suitable=false.
        see_also:
        - pto:Sandal
      slippers:
        text: slippers
        description: Indoor slippers and house shoes. Typically all_season (indoor
          use, climate-controlled environment).
      sports_footwear:
        text: sports_footwear
        description: Football boots, running shoes, cleats, cycling shoes. Specialist
          sports footwear.
        see_also:
        - cpi:SportShoes
      other:
