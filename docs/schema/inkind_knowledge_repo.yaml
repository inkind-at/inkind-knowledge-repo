  ClothingMaterialEnum:
    name: ClothingMaterialEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/ClothingMaterialEnum
    description: "Primary fibre or fabric composition of a clothing item. Records\
      \ the predominant material; for blended fabrics (e.g. 60% cotton / 40% polyester),\
      \ select the dominant fibre or use synthetic_blend when no single synthetic\
      \ dominates and a more specific value does not apply.\nGrounded in:\n  Product\
      \ Types Ontology (pto:) \u2014 per-value IRIs that map Wikipedia textile\n \
      \   concepts, consistent with pto:Wood in FurnitureMaterialEnum.\n    http://www.productontology.org/id/\n\
      \  schema:material \u2014 overarching property on schema:Product, first-class\n\
      \    since GoodRelations was absorbed into schema.org in 2012.\n    https://schema.org/material\n\
      \    Used as see_also anchor for values that have no discrete pto: IRI\n   \
      \ (synthetic_blend, other).\n\nThree uses at sorting time:\n  1. Allergen filtering\
      \ \u2014 wool, latex, and nickel sensitivities;\n     requires intact_labels=true\
      \ for highest confidence;\n     exact percentages may be recorded in sorting_notes.\n\
      \  2. Seasonality hinting by the fragment compiler\n     (wool/fleece/down \u2192\
      \ pre-fill is_winter_suitable=true;\n      linen/silk \u2192 pre-fill is_winter_suitable=false).\n\
      \     Sorter override always takes precedence.\n  3. Care requirement matching\
      \ \u2014 silk and leather indicate specialist\n     care needs that the match\
      \ engine can surface."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/clothing
    see_also:
    - schema:material
    permissible_values:
      cotton:
        text: cotton
        description: Cotton or cotton-dominant blend (>50% cotton). The most common
          natural fibre. All-season versatile; thermal weight varies by weave and
          weight (a thin cotton t-shirt vs. a heavy flannel shirt).
        annotations:
          label_en:
            tag: label_en
            value: Cotton
          label_de:
            tag: label_de
            value: Baumwolle
        see_also:
        - pto:Cotton
      wool:
        text: wool
        description: Wool, merino, lambswool, cashmere, or wool-dominant blend. Primary
          natural indicator of winter suitability.
        annotations:
          label_en:
            tag: label_en
            value: Wool
          label_de:
            tag: label_de
            value: Wolle
          winter_hint:
            tag: winter_hint
            value: 'true'
        see_also:
        - pto:Wool
      linen:
        text: linen
        description: Linen (flax) fabric. Lightweight and breathable natural fibre.
          Primarily summer-weight.
        annotations:
          label_en:
            tag: label_en
            value: Linen
          label_de:
            tag: label_de
            value: Leinen
          winter_hint:
            tag: winter_hint
            value: 'false'
        see_also:
        - pto:Linen
      silk:
        text: silk
        description: Silk or silk-blend. Lightweight natural fibre; typically summer
          or formal wear. Requires specialist care (dry clean or hand wash). Fragment
          compiler may pre-fill is_winter_suitable=false.
        annotations:
          label_en:
            tag: label_en
            value: Silk
          label_de:
            tag: label_de
            value: Seide
          winter_hint:
            tag: winter_hint
            value: 'false'
        see_also:
        - pto:Silk
      denim:
        text: denim
        description: "Denim (woven cotton twill). Used for jeans, jackets, and skirts.\
          \ Seasonality varies by weight \u2014 standard denim is spring_autumn; heavy\
          \ or lined denim may be winter-suitable. Sorter decides."
        annotations:
          label_en:
            tag: label_en
            value: Denim
          label_de:
            tag: label_de
            value: Denim
        see_also:
        - pto:Denim
      leather:
        text: leather
        description: Leather or leather-look (genuine, PU, or faux leather). Primarily
          for outerwear (jackets, coats). Typically spring_autumn or winter-suitable
          depending on lining. Requires specialist care.
        annotations:
          label_en:
            tag: label_en
            value: Leather / Faux Leather
          label_de:
            tag: label_de
            value: Leder / Kunstleder
        see_also:
        - pto:Leather
      fleece:
        text: fleece
        description: "Polar fleece or other synthetic-pile insulating fabric. Warm\
          \ and lightweight. Fragment compiler may pre-fill is_winter_suitable=true.\
          \ This value covers synthetic-pile fleece only \u2014 use wool for merino\
          \ or lambswool fleece."
        annotations:
          label_en:
            tag: label_en
            value: Fleece
          label_de:
            tag: label_de
            value: Fleece
          winter_hint:
            tag: winter_hint
            value: 'true'
        see_also:
        - pto:Polar_fleece
      down:
        text: down
        description: Down-filled or feather-filled insulating garments (puffer jackets,
          gilets, down coats). Fragment compiler may pre-fill is_winter_suitable=true.
        annotations:
          label_en:
            tag: label_en
            value: Down / Fill
          label_de:
            tag: label_de
            value: Daunen
          winter_hint:
            tag: winter_hint
            value: 'true'
        see_also:
        - pto:Down_feather
      polyester:
        text: polyester
        description: Polyester or polyester-dominant synthetic. Common in sportswear,
          activewear, and everyday garments. All-season; thermal weight varies by
          fabric construction.
        annotations:
          label_en:
            tag: label_en
            value: Polyester
          label_de:
            tag: label_de
            value: Polyester
        see_also:
        - pto:Polyester
      nylon:
        text: nylon
        description: Nylon (polyamide) fabric. Common in sportswear, windbreakers,
          and tights. Strong, lightweight, and moisture-resistant.
        annotations:
          label_en:
            tag: label_en
            value: Nylon
          label_de:
            tag: label_de
            value: Nylon
        see_also:
        - pto:Nylon
      synthetic_blend:
        text: synthetic_blend
        description: 'Mixed synthetic fibres or a synthetic + natural blend where
          no single fibre dominates and a more specific value does not apply. Examples:
          polyester/spandex (activewear), nylon/cotton blends, acrylic/polyester blends.'
        annotations:
          label_en:
            tag: label_en
            value: Synthetic Blend
          label_de:
            tag: label_de
            value: Synthetische Mischung
        see_also:
        - schema:material
      other:
        text: other
        description: "Materials not covered above \u2014 e.g. viscose/rayon, bamboo,\
          \ modal, technical fabrics, specialty textiles. Record the specific material\
          \ in sorting_notes when known and intact_labels=true."
        annotations:
          label_en:
            tag: label_en
            value: Other
          label_de:
            tag: label_de
            value: Andere
        see_also:
        - schema:material
