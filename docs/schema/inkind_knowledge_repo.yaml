  PersonalCareItem:
    name: PersonalCareItem
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/PersonalCareItem
    annotations:
      label_en:
        tag: label_en
        value: Personal Care
      label_de:
        tag: label_de
        value: Personalhygiene
    description: "Personal care, hygiene, and health products. Merges COICOP 06.1\
      \ (medical products and appliances) and 12.1 (personal care \u2014 toiletries,\
      \ cosmetics, related appliances). Open Eligibility uses a single \"Personal\
      \ Care Items\" node for both:\n  https://company.auntbertha.com/openeligibility/\n\
      \nMerged because the operative safety rules are identical across both former\
      \ categories: sealed required, used tools blocked, expiry enforced. Splitting\
      \ them would duplicate all three rules with no semantic benefit.\nAssessment:\
      \ is_sealed + expiry_date (no condition_grade or assessment_result). For personal\
      \ care products, the relevant safety signals are hygiene integrity (sealed?)\
      \ and freshness (not expired?). A wear grade is meaningless for a tube of toothpaste\
      \ \u2014 it is either sealed or it is not."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/donation_item
    see_also:
    - http://www.productontology.org/id/Personal_hygiene
    - http://www.productontology.org/id/Cosmetics
    - https://company.auntbertha.com/openeligibility/
    mappings:
    - pto:Personal_hygiene
    is_a: DonationItem
    mixins:
    - PersonalCareCategory
    slots:
    - id
    - DonationItem_usage
    - DonationItem_category
    - DonationItem_lifecycle_state
    - DonationItem_attribute_completeness
    - DonationItem_source_collection
    - DonationItem_donation_source
    - DonationItem_storage_unit
    - sorting_notes
    - created_at
