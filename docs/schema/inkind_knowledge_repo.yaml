      \ and schema:itemCondition. Applied to wear-graded categories: clothing, accessories,\
      \ footwear, books, stationery, household, toys, general sports equipment.\n\
      Required at sorted state regardless of usage:\n  new item, no defects      \
      \     \u2192 like_new\n  new item, manufacturing defect \u2192 fair or poor\n\
      \  used item, minimal wear        \u2192 like_new or good\nSorters record what\
      \ they observe, not what the label says.\nCategories using structured assessment_result\
      \ enums instead (furniture, electronics, bedding, protective sports gear, mobility\
      \ aids, baby equipment) do NOT declare this slot."
