      subcategory:
        name: subcategory
        range: FurnitureSubcategoryEnum
        required: true
      material:
        name: material
        range: FurnitureMaterialEnum
        required: false
      assessment_result:
        name: assessment_result
        description: "Structural and quality assessment. Required regardless of usage\
          \ \u2014 new furniture can have manufacturing defects or assembly issues."
