        description: Footwear not fitting above subcategories.
        annotations:
          label_en:
            tag: label_en
            value: other
          label_de:
            tag: label_de
            value: Sonstige
  FootwearMaterialEnum:
    name: FootwearMaterialEnum
    definition_uri: https://inkind-at.github.io/inkind-knowledge-repo/FootwearMaterialEnum
    description: "Primary upper-material of a footwear item \u2014 the dominant outer\
      \ fabric or surface visible on the shoe upper (excluding the sole, which is\
      \ rubber or synthetic in almost all footwear).\nGrounded in Product Types Ontology\
      \ (pto:) where distinct IRIs exist, and schema:material as the overarching property\
      \ anchor for values without a discrete pto: IRI. Aligned with ClothingMaterialEnum\
      \ for shared values (leather, suede, wool).\nThree redistribution-relevant uses:\n\
      \  1. Care requirement matching \u2014 leather needs conditioning; suede\n \
      \    needs specialist brushing and waterproofing; canvas is typically\n    \
      \ machine-washable; rubber boots can be wiped clean.\n  2. Allergen filtering\
      \ \u2014 latex rubber (natural rubber) is a known\n     allergen; most modern\
      \ Wellington boots use synthetic rubber but\n     natural rubber is still used\
      \ in premium lines.\n  3. Seasonality hinting \u2014 canvas and synthetic_mesh\
      \ are typical\n     summer/spring-autumn materials; wool_felt is associated\
      \ with\n     warm indoor slippers. Fragment compiler MAY use material as a\n\
      \     supplementary UI pre-fill hint (secondary to subcategory-based\n     hints).\
      \ Sorter always overrides."
    from_schema: https://inkind-at.github.io/inkind-knowledge-repo/categories/footwear
    see_also:
    - schema:material
    permissible_values:
      leather:
        text: leather
        description: Genuine or polished leather upper. The most common material for
          dress shoes, leather boots, loafers, and classic Oxford shoes. Requires
          conditioning and polishing; not machine-washable.
        annotations:
          label_en:
            tag: label_en
            value: Leather
          label_de:
            tag: label_de
            value: Leder
        see_also:
        - pto:Leather
      suede:
        text: suede
        description: Suede or nubuck upper. Brushed, napped leather surface. Common
          for ankle boots, desert boots, and casual shoes. Requires specialist suede
          brush and waterproofing spray.
        annotations:
          label_en:
            tag: label_en
            value: Suede / Nubuck
          label_de:
            tag: label_de
            value: Wildleder / Nubuk
        see_also:
        - pto:Suede
      synthetic_leather:
        text: synthetic_leather
        description: PU or synthetic leather (faux leather) upper. Common in budget
          shoes, trainers, and fashion boots. Easier care than genuine leather but
          less durable over time.
        annotations:
          label_en:
            tag: label_en
            value: Synthetic Leather
          label_de:
            tag: label_de
            value: Kunstleder
        see_also:
        - schema:material
      canvas:
        text: canvas
        description: Canvas or cotton-based textile upper. Typical for casual trainers
          (e.g. classic low-top sneakers), espadrilles, and deck shoes. Usually machine-washable.
          Primarily spring-autumn or summer use.
        annotations:
          label_en:
            tag: label_en
            value: Canvas
          label_de:
            tag: label_de
            value: Segeltuch
        see_also:
        - schema:material
      synthetic_mesh:
        text: synthetic_mesh
        description: Breathable synthetic mesh or knit upper. Standard material for
          running shoes, athletic trainers, and performance footwear. Lightweight
          and quick-drying. Primarily spring-autumn or summer.
        annotations:
          label_en:
            tag: label_en
            value: Synthetic / Mesh
          label_de:
            tag: label_de
            value: Synthetisch / Mesh
        see_also:
        - schema:material
      rubber:
        text: rubber
        description: "Rubber or PVC. Primary material for Wellington boots, rain boots,\
          \ and some sandal soles. Fully waterproof; can be wiped clean. Natural rubber\
          \ is a known allergen \u2014 record in sorting_notes if identifiable as\
          \ natural rubber (often marked on the boot)."
        annotations:
          label_en:
            tag: label_en
            value: Rubber / PVC
          label_de:
            tag: label_de
            value: Gummi / PVC
        see_also:
        - pto:Rubber
      wool_felt:
        text: wool_felt
        description: Wool, felt, or boiled-wool upper. Most common in warm indoor
          slippers and some traditional boots. Allergen signal for wool-sensitive
          beneficiaries.
        annotations:
          label_en:
            tag: label_en
            value: Wool / Felt
          label_de:
            tag: label_de
            value: Wolle / Filz
        see_also:
        - pto:Wool
      textile:
        text: textile
        description: "Woven or knitted textile upper that is not canvas or synthetic\
          \ mesh \u2014 e.g. fabric mules, woven espadrille-style shoes, textile slip-ons."
        annotations:
          label_en:
            tag: label_en
            value: Textile
          label_de:
            tag: label_de
            value: Textil
        see_also:
        - schema:material
      other:
        text: other
        description: Materials not covered above (e.g. cork, wood clogs, exotic leather).
          Record the specific material in sorting_notes when known.
        annotations:
          label_en:
            tag: label_en
            value: Other
          label_de:
            tag: label_de
            value: Andere
        see_also:
        - schema:material
