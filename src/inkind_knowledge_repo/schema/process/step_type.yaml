---
id: https://inkind-at.github.io/inkind-knowledge-repo/step_type
name: step_type
title: Step Type Schema
description: >-
  The catalogue of available step types — the atomic operations that appear in
  process templates.  An organisation cannot invent new step types; it
  assembles sequences from this catalogue.
license: MIT
see_also:
  - http://purl.org/net/p-plan#Activity

prefixes:
  inkind_knowledge_repo: https://inkind-at.github.io/inkind-knowledge-repo/
  linkml: https://w3id.org/linkml/
  pplan: http://purl.org/net/p-plan#

default_prefix: inkind_knowledge_repo
default_range: string

imports:
  - linkml:types
  - ../core

classes:

  StepType:
    description: >-
      An atomic operation in a process template.  Step types are defined in
      the knowledge repo; they cannot be modified by organisations.
    slots:
      - id
      - label
      - description
      - produces_observations
      - postcondition
      - default_cost
      - fragment_bindings
    see_also:
      - pplan:Activity

slots:

  produces_observations:
    range: string
    multivalued: true
    description: >-
      Names of the attribute slots this step populates (e.g., `category`,
      `condition`, `photo_ref`).

  postcondition:
    range: ItemLifecycleStateEnum
    description: >-
      Entity lifecycle state produced on completion.  Null for intermediate
      steps; set for terminal steps (e.g., `stored` for assign_storage).

  default_cost:
    range: float
    required: true
    description: >-
      Estimated cost in minutes — used when the org has no StepCost override
      configured.

  fragment_bindings:
    range: UIFragmentBinding
    multivalued: true
    description: >-
      Inverse relation — UIFragmentBindings that reference this step type.
...
