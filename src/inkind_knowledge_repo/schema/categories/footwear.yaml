---
id: https://inkind-at.github.io/inkind-knowledge-repo/categories/footwear
name: footwear
title: Footwear Category Schema
description: >-
  Defines FootwearCategory mixin applied to FootwearItem.

  COICOP alignment: Division 03.2 (footwear).
  https://unstats.un.org/unsd/classifications/Family/Detail/2094

  Ontology grounding:
    Product Types Ontology — pto:Footwear, pto:Shoe, pto:Boot, pto:Sandal,
    pto:Leather, pto:Suede, pto:Rubber, pto:Wool
      http://www.productontology.org/id/Footwear
    CPI ontology — cpi:SportShoes
      http://www.ebusiness-unibw.org/ontologies/cpi/ns#
    schema:material — overarching property on schema:Product, used as
      see_also anchor for values without a discrete pto: IRI (canvas,
      synthetic_mesh, textile).
      https://schema.org/material

  Material model:
    FootwearMaterialEnum records the primary upper-material (the dominant
    outer fabric/surface visible on the shoe). Three redistribution-relevant
    uses:
      1. Care requirement matching — leather requires conditioning; suede
         requires specialist brushing and waterproofing; rubber boots can
         be wiped clean; canvas is machine-washable.
      2. Allergen filtering — latex rubber (relevant for latex-sensitive
         beneficiaries; most modern rubber boots use synthetic rubber, but
         natural rubber is still used in some products).
      3. Seasonality hinting — canvas and synthetic_mesh are typically
         summer/spring-autumn shoes; wool/felt slippers are all-season
         or winter-suitable for indoor use. The fragment compiler MAY
         use material as an additional UI pre-fill signal alongside
         subcategory. Sorter always overrides.
    Material is added to the detailed completeness tier.

  Separation from ClothingItem:
    - Shoe sizing systems (EU/UK/US/CM) differ fundamentally from clothing sizes.
    - Pair-completeness is a footwear-specific assessment concern.
    - The demographic slot is reused from clothing.yaml but the size slot is
      replaced by shoe_size + shoe_size_system.

  Seasonality:
    is_winter_suitable and season are applied to footwear for the same
    reason as clothing — boots and sandals are obviously different for
    emergency cold-weather distribution. SeasonEnum is declared in
    clothing.yaml and reused here via import. The same VM auto-derivation
    rules (vm-season-winter, vm-season-summer, vm-season-all) apply.
    The fragment compiler may pre-fill is_winter_suitable=true for boots
    and is_winter_suitable=false for sandals as a UI hint; sorters override.

  Completeness tiers:
    minimal:  subcategory, usage
    standard: subcategory, demographic, shoe_size, shoe_size_system,
              is_pair_complete, is_winter_suitable, usage, condition_grade
    detailed: subcategory, demographic, shoe_size, shoe_size_system,
              is_pair_complete, is_winter_suitable, season, usage,
              condition_grade

license: MIT
see_also:
  - http://www.productontology.org/id/Footwear
  - https://unstats.un.org/unsd/classifications/Family/Detail/2094
  - https://schema.org/material

prefixes:
  inkind_knowledge_repo: https://inkind-at.github.io/inkind-knowledge-repo/
  linkml: https://w3id.org/linkml/
  pto: http://www.productontology.org/id/
  cpi: http://www.ebusiness-unibw.org/ontologies/cpi/ns#

default_prefix: inkind_knowledge_repo
default_range: string

imports:
  - linkml:types
  - ./_base
  - ./clothing   # imports SeasonEnum, DemographicEnum, is_winter_suitable, season


classes:

  FootwearCategory:
    mixin: true
    is_a: CategoryMixin
    description: >-
      Mixin for footwear slots and UC rules.
      Applied to FootwearItem via mixins: [FootwearCategory].
      Uses shoe_size + shoe_size_system instead of ClothingSizeEnum.
      Reuses DemographicEnum, is_winter_suitable, and SeasonEnum from
      clothing.yaml. Same VM season auto-derivation rules apply.
    see_also:
      - http://www.productontology.org/id/Footwear
    slots:
      - condition_grade
      - subcategory
      - material
      - is_pair_complete
      - is_winter_suitable
      - demographic
      - shoe_size
      - shoe_size_system
      - season
    slot_usage:
      subcategory:
        range: FootwearSubcategoryEnum
        required: true
      demographic:
        range: DemographicEnum
        required: false
      is_winter_suitable:
        range: boolean
        required: false
        description: >-
          Whether this footwear provides meaningful warmth and weather
          protection in cold conditions. Required at standard completeness.
          Fragment compiler may pre-fill: boots → true, sandals → false.
          Sorter always overrides (e.g. a lightweight canvas boot → false).
      season:
        range: SeasonEnum
        required: false
        multivalued: true
        description: >-
          Seasonal suitability. Optional — detailed completeness tier.
          Same VM auto-derivation as ClothingCategory:
            winter → is_winter_suitable = true
            summer → is_winter_suitable = false
            all_season → is_winter_suitable = true
            spring_autumn → sorter decides is_winter_suitable explicitly.
      material:
        range: FootwearMaterialEnum
        required: false
        description: >-
          Primary upper-material. Optional — detailed completeness tier.
          Record the dominant outer surface material. See FootwearMaterialEnum
          for full vocabulary and ontology grounding.
      condition_grade:
        range: UsedConditionGradeEnum
        required: false
    annotations:
      completeness_minimal:  "subcategory, usage"
      completeness_standard: "subcategory, demographic, shoe_size, shoe_size_system, is_pair_complete, is_winter_suitable, usage, condition_grade"
      completeness_detailed: "subcategory, demographic, shoe_size, shoe_size_system, is_pair_complete, is_winter_suitable, season, material, usage, condition_grade"
      coicop_division: "03.2"
      season_ui_hint: >-
        Fragment compiler may pre-fill is_winter_suitable=true for boots
        and is_winter_suitable=false for sandals. Sorter can override.
    rules:
      - title: uc-footwear-pair-incomplete-warn
        description: >-
          Single shoes require sorter confirmation. Single shoes may still
          be appropriate for beneficiaries with limb differences.
          action: warn — sorting_notes required.
        preconditions:
          slot_conditions:
            is_pair_complete:
              equals_string: "false"
        postconditions:
          slot_conditions:
            sorting_notes:
              required: true

      # ── VM: season → is_winter_suitable auto-derivation (mirrors clothing) ─
      - title: vm-season-winter
        description: season = winter implies is_winter_suitable = true.
        preconditions:
          slot_conditions:
            season:
              equals_string: winter
        postconditions:
          slot_conditions:
            is_winter_suitable:
              equals_string: "true"

      - title: vm-season-summer
        description: season = summer implies is_winter_suitable = false.
        preconditions:
          slot_conditions:
            season:
              equals_string: summer
        postconditions:
          slot_conditions:
            is_winter_suitable:
              equals_string: "false"

      - title: vm-season-all
        description: season = all_season implies is_winter_suitable = true.
        preconditions:
          slot_conditions:
            season:
              equals_string: all_season
        postconditions:
          slot_conditions:
            is_winter_suitable:
              equals_string: "true"


slots:

  shoe_size:
    range: string
    description: >-
      Shoe size as a string. Use with shoe_size_system to disambiguate
      (e.g. "42" with system "EU", "8" with system "UK").
    annotations:
      label_en: "shoe size"
      label_de: "Schuhgröße"

  shoe_size_system:
    range: ShoeSizeSystemEnum
    description: Sizing system for the shoe_size value.
    annotations:
      label_en: "shoe size system"
      label_de: "Schuhgrößen-System"

  is_pair_complete:
    range: boolean
    description: >-
      Whether both shoes of the pair are present.
      UC warn if false — sorting_notes required.
    annotations:
      label_en: "is pair complete"
      label_de: "Ist das Paar vollständig?"


enums:

  FootwearSubcategoryEnum:
    description: >-
      Footwear subcategories. Grounded in Product Types Ontology.
      is_winter_suitable is the sorter's call — subcategory alone is
      insufficient (a lightweight canvas boot is not winter-suitable;
      a fleece-lined boot is). Fragment compiler provides UI hints.
    permissible_values:
      shoes:
        description: >-
          Everyday shoes, trainers/sneakers, loafers, school shoes.
          is_winter_suitable varies — trainers are spring_autumn/summer;
          leather Oxford shoes can be all_season.
        see_also: [pto:Shoe]
        annotations:
          label_en: "shoes"
          label_de: "Schuhe"
      boots:
        description: >-
          Ankle boots, knee-high boots, work boots, winter boots.
          Fragment compiler pre-fills is_winter_suitable=true; sorter
          overrides for summer ankle boots, fashion boots without insulation.
        see_also: [pto:Boot]
        annotations:
          label_en: "boots"
          label_de: "Stiefel"
      sandals:
        description: >-
          Open sandals and flip-flops. Fragment compiler pre-fills
          is_winter_suitable=false.
        see_also: [pto:Sandal]
        annotations:
          label_en: "sandals"
          label_de: "Sandalen"
      slippers:
        description: >-
          Indoor slippers and house shoes. Typically all_season
          (indoor use, climate-controlled environment).
        annotations:
          label_en: "slippers"
          label_de: "Hausschuhe"
      sports_footwear:
        description: >-
          Football boots, running shoes, cleats, cycling shoes.
          Specialist sports footwear.
        see_also: [cpi:SportShoes]
        annotations:
          label_en: "sports footwear"
          label_de: "Sportschuhe"
      other:
        description: Footwear not fitting above subcategories.
        annotations:
          label_en: "other"
          label_de: "Sonstige"

  FootwearMaterialEnum:
    description: >-
      Primary upper-material of a footwear item — the dominant outer fabric
      or surface visible on the shoe upper (excluding the sole, which is
      rubber or synthetic in almost all footwear).

      Grounded in Product Types Ontology (pto:) where distinct IRIs exist,
      and schema:material as the overarching property anchor for values
      without a discrete pto: IRI. Aligned with ClothingMaterialEnum for
      shared values (leather, suede, wool).

      Three redistribution-relevant uses:
        1. Care requirement matching — leather needs conditioning; suede
           needs specialist brushing and waterproofing; canvas is typically
           machine-washable; rubber boots can be wiped clean.
        2. Allergen filtering — latex rubber (natural rubber) is a known
           allergen; most modern Wellington boots use synthetic rubber but
           natural rubber is still used in premium lines.
        3. Seasonality hinting — canvas and synthetic_mesh are typical
           summer/spring-autumn materials; wool_felt is associated with
           warm indoor slippers. Fragment compiler MAY use material as a
           supplementary UI pre-fill hint (secondary to subcategory-based
           hints). Sorter always overrides.
    see_also:
      - schema:material
    permissible_values:
      leather:
        description: >-
          Genuine or polished leather upper. The most common material for
          dress shoes, leather boots, loafers, and classic Oxford shoes.
          Requires conditioning and polishing; not machine-washable.
        see_also: [pto:Leather]
        annotations:
          label_en: "Leather"
          label_de: "Leder"
      suede:
        description: >-
          Suede or nubuck upper. Brushed, napped leather surface. Common
          for ankle boots, desert boots, and casual shoes. Requires
          specialist suede brush and waterproofing spray.
        see_also: [pto:Suede]
        annotations:
          label_en: "Suede / Nubuck"
          label_de: "Wildleder / Nubuk"
      synthetic_leather:
        description: >-
          PU or synthetic leather (faux leather) upper. Common in budget
          shoes, trainers, and fashion boots. Easier care than genuine
          leather but less durable over time.
        see_also: [schema:material]
        annotations:
          label_en: "Synthetic Leather"
          label_de: "Kunstleder"
      canvas:
        description: >-
          Canvas or cotton-based textile upper. Typical for casual trainers
          (e.g. classic low-top sneakers), espadrilles, and deck shoes.
          Usually machine-washable. Primarily spring-autumn or summer use.
        see_also: [schema:material]
        annotations:
          label_en: "Canvas"
          label_de: "Segeltuch"
      synthetic_mesh:
        description: >-
          Breathable synthetic mesh or knit upper. Standard material for
          running shoes, athletic trainers, and performance footwear.
          Lightweight and quick-drying. Primarily spring-autumn or summer.
        see_also: [schema:material]
        annotations:
          label_en: "Synthetic / Mesh"
          label_de: "Synthetisch / Mesh"
      rubber:
        description: >-
          Rubber or PVC. Primary material for Wellington boots, rain boots,
          and some sandal soles. Fully waterproof; can be wiped clean.
          Natural rubber is a known allergen — record in sorting_notes if
          identifiable as natural rubber (often marked on the boot).
        see_also: [pto:Rubber]
        annotations:
          label_en: "Rubber / PVC"
          label_de: "Gummi / PVC"
      wool_felt:
        description: >-
          Wool, felt, or boiled-wool upper. Most common in warm indoor
          slippers and some traditional boots. Allergen signal for
          wool-sensitive beneficiaries.
        see_also: [pto:Wool]
        annotations:
          label_en: "Wool / Felt"
          label_de: "Wolle / Filz"
      textile:
        description: >-
          Woven or knitted textile upper that is not canvas or synthetic mesh
          — e.g. fabric mules, woven espadrille-style shoes, textile slip-ons.
        see_also: [schema:material]
        annotations:
          label_en: "Textile"
          label_de: "Textil"
      other:
        description: >-
          Materials not covered above (e.g. cork, wood clogs, exotic leather).
          Record the specific material in sorting_notes when known.
        see_also: [schema:material]
        annotations:
          label_en: "Other"
          label_de: "Andere"

  ShoeSizeSystemEnum:
    description: >-
      Shoe size measurement system. Multiple systems in common use across
      European, UK, US, and children's sizing conventions.
    permissible_values:
      EU: {description: "European sizing (e.g. 36, 38, 42, 46)", annotations: {label_en: "EU", label_de: "EU"}}
      UK: {description: "UK sizing (e.g. 3, 5, 8, 11)", annotations: {label_en: "UK", label_de: "UK"}}
      US: {description: "US sizing (e.g. 6, 7.5, 9, 12)", annotations: {label_en: "US", label_de: "US"}}
      CM: {description: "Foot length in centimetres — used for infant sizing", annotations: {label_en: "CM", label_de: "CM"}}