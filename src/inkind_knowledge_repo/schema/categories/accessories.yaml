---
id: https://inkind-at.github.io/inkind-knowledge-repo/categories/accessories
name: accessories
title: Accessories Category Schema
description: >-
  Defines AccessoriesCategory mixin applied to AccessoriesItem.
  Covers fashion and personal accessories: hats, scarves, gloves, belts,
  bags, jewellery, sunglasses, watches, wallets.

  COICOP alignment: Division 03.1 (clothing and footwear — COICOP groups
  accessories with clothing; separated here for schema and UI clarity).
  https://unstats.un.org/unsd/classifications/Family/Detail/2094

  Ontology grounding:
    Product Types Ontology — pto:Fashion_accessory, and per-value IRIs for
      ClothingMaterialEnum (pto:Leather, pto:Wool, pto:Cotton, pto:Silk).
      http://www.productontology.org/id/Fashion_accessory
    CPI ontology — see_also for subcategory terms
      http://www.ebusiness-unibw.org/ontologies/cpi/ns#
    schema:material — overarching property on schema:Product, used as
      see_also anchor for values without a discrete pto: IRI.
      https://schema.org/material

  Material model:
    AccessoriesMaterialEnum records the primary construction material of the
    accessory. Two redistribution-relevant uses:
      1. Allergen filtering — wool sensitivity (scarves, gloves, hats);
         nickel sensitivity in metal jewellery.
      2. Care requirement matching — leather requires conditioning/specialist
         care; silk is dry-clean only; metal jewellery requires anti-tarnish
         storage.
    Material is in the detailed completeness tier — already reflected in the
    annotations. Not every accessory has a single identifiable primary
    material (e.g. a wristwatch has metal case + leather strap + glass face),
    so material records the dominant element the sorter can identify quickly.

  Separation from ClothingItem (design rationale):
    - No size dimension — accessories are not sized XS-XXL. A scarf is
      not "medium"; a bag is not "adult female size S".
    - No demographic→size value map — the clothing value map is entirely
      irrelevant here.
    - Clothing UC rules (underwear condition, adult underwear must be new)
      do not apply to any accessory subcategory.
    - Progressive disclosure: "clothing or accessory?" is a clean first
      branch in the sorting UI — mixing them forces sorters to scan past
      irrelevant subcategories.
    - AccessoriesDemographicEnum uses a simpler age-only vocabulary
      (baby/child/adult/all_ages) — gender is not a meaningful dimension
      for most accessories at the sorting level.

  Completeness tiers:
    minimal:  subcategory, usage
    standard: subcategory, usage, condition_grade
    detailed: subcategory, demographic, material, usage, condition_grade

license: MIT
see_also:
  - http://www.productontology.org/id/Fashion_accessory
  - http://www.ebusiness-unibw.org/ontologies/cpi/ns#ClothingAndAccessories
  - https://unstats.un.org/unsd/classifications/Family/Detail/2094
  - https://schema.org/material

prefixes:
  inkind_knowledge_repo: https://inkind-at.github.io/inkind-knowledge-repo/
  linkml: https://w3id.org/linkml/
  pto: http://www.productontology.org/id/
  cpi: http://www.ebusiness-unibw.org/ontologies/cpi/ns#
  schema: http://schema.org/

default_prefix: inkind_knowledge_repo
default_range: string

imports:
  - linkml:types
  - ./_base


classes:

  AccessoriesCategory:
    mixin: true
    is_a: CategoryMixin
    description: >-
      Mixin for fashion and personal accessories.
      Applied to AccessoriesItem via mixins: [AccessoriesCategory].
      Deliberately simpler than ClothingCategory — no size dimension,
      no demographic→size value map, simpler demographic vocabulary,
      no underwear UC rules. See schema description above for full rationale.
    see_also:
      - http://www.productontology.org/id/Fashion_accessory
    slots:
      - subcategory
      - demographic
      - material
      - condition_grade
    slot_usage:
      subcategory:
        range: AccessoriesSubcategoryEnum
        required: true
      demographic:
        range: AccessoriesDemographicEnum
        required: false
        description: >-
          Optional age group. Not applicable to most accessories (bags,
          jewellery, belts are generally adult by default). Use for clearly
          age-targeted items: children's hats, baby mittens, baby carriers
          (though carriers belong in BabyInfantItem).
      material:
        range: AccessoriesMaterialEnum
        required: false
        description: >-
          Primary construction material of the accessory. Optional — detailed
          completeness tier. Record the dominant material; use other and
          note the specific material in sorting_notes when known.
          See AccessoriesMaterialEnum for full vocabulary and ontology grounding.
      condition_grade:
        range: UsedConditionGradeEnum
        required: false
    annotations:
      completeness_minimal:  "subcategory, usage"
      completeness_standard: "subcategory, usage, condition_grade"
      completeness_detailed: "subcategory, demographic, material, usage, condition_grade"
      coicop_division: "03.1"



enums:

  AccessoriesSubcategoryEnum:
    description: >-
      Fashion and personal accessories subcategories.
      Deliberately separate from ClothingSubcategoryEnum to enable clean
      progressive disclosure in the sorting UI.
      Grounded in Product Types Ontology (pto:) terms.
    permissible_values:
      hats_headwear:
        description: Hats, caps, beanies, headscarves, berets.
        see_also: [pto:Hat]
        annotations:
          label_en: "Headwear"
          label_de: "Kopfbedeckungen"
      scarves:
        description: Scarves and shawls worn at neck or shoulders.
        see_also: [pto:Scarf]
        annotations:
          label_en: "Scarves"
          label_de: "Schal"
      gloves_mittens:
        description: Gloves and mittens (all ages).
        see_also: [pto:Glove]
        annotations:
          label_en: "Gloves"
          label_de: "Handschuhe"
      belts:
        description: Belts, braces, and waist accessories.
        see_also: [pto:Belt]
        annotations:
          label_en: "Belts"
          label_de: "Gürtel"
      bags_luggage:
        description: >-
          Handbags, tote bags, backpacks, shoulder bags, wallets, purses,
          clutch bags, small luggage items.
        see_also: [pto:Bag]
        annotations:
          label_en: "Bags"
          label_de: "Taschen"
      jewellery:
        description: Necklaces, bracelets, rings, earrings, brooches.
        see_also: [pto:Jewellery]
        annotations:
          label_en: "Jewellery"
          label_de: "Schmuck"
      sunglasses:
        description: Sunglasses and fashion spectacle frames.
        see_also: [pto:Sunglasses]
        annotations:
          label_en: "Sunglasses"
          label_de: "Sonnenbrillen"
      watches:
        description: Wristwatches and pocket watches.
        see_also: [pto:Watch]
        annotations:
          label_en: "Watches"
          label_de: "Uhren"
      other:
        description: Accessories not fitting above subcategories.
        annotations:
          label_en: "Other"
          label_de: "Sonstiges"

  AccessoriesMaterialEnum:
    description: >-
      Primary construction material of a fashion or personal accessory.
      Records the dominant material the sorter can identify quickly.
      Not all accessories have a single primary material — a watch has a metal
      case, leather strap, and glass face; record the most prominent element.

      Grounded in Product Types Ontology (pto:) for individual fibres and
      common materials, and schema:material as the overarching property anchor.
      Values and grounding are aligned with ClothingMaterialEnum (clothing.yaml)
      for the fibre values (leather, wool, cotton, silk) for consistency.

      Two redistribution-relevant uses:
        1. Allergen filtering — wool (scarves, hats, gloves) and nickel
           (base metal jewellery, belt buckles) sensitivities.
        2. Care requirement matching — leather requires conditioning; silk
           is dry-clean only; metal jewellery requires anti-tarnish storage.
    see_also:
      - schema:material
    permissible_values:
      leather:
        description: >-
          Genuine or faux leather (PU/synthetic leather). Predominant material
          for bags, belts, wallets, and some gloves and watch straps.
          Requires specialist conditioning care.
        see_also: [pto:Leather]
        annotations:
          label_en: "Leather / Faux Leather"
          label_de: "Leder / Kunstleder"
      wool:
        description: >-
          Wool, merino, cashmere, or wool-dominant blend. Primary material for
          scarves, hats, and gloves. Allergen signal for wool-sensitive beneficiaries.
        see_also: [pto:Wool]
        annotations:
          label_en: "Wool"
          label_de: "Wolle"
      cotton:
        description: >-
          Cotton or cotton-dominant woven fabric. Common in fabric hats,
          canvas bags, and some gloves and scarves. All-season versatile.
        see_also: [pto:Cotton]
        annotations:
          label_en: "Cotton / Canvas Fabric"
          label_de: "Baumwolle / Segeltuch"
      silk:
        description: >-
          Silk or silk-blend. Typical for elegant scarves and ties.
          Requires specialist care (hand wash or dry clean).
        see_also: [pto:Silk]
        annotations:
          label_en: "Silk"
          label_de: "Seide"
      metal:
        description: >-
          Metal (gold, silver, base metal, stainless steel, or alloy).
          Predominant for jewellery, watch cases, belt buckles, and eyewear
          frames. Nickel in base metal alloys is a common allergen.
        see_also: [schema:material]
        annotations:
          label_en: "Metal"
          label_de: "Metall"
      plastic:
        description: >-
          Plastic or acrylic. Common for sunglasses frames, costume jewellery,
          and some bags. Wide range of types — record specifics in sorting_notes
          if relevant (e.g. recycled plastic, BPA-free for baby accessories).
        see_also: [schema:material]
        annotations:
          label_en: "Plastic"
          label_de: "Kunststoff"
      synthetic:
        description: >-
          Synthetic fabric or material — nylon, polyester, or other man-made
          fibres. Common in nylon bags, polyester scarves, and synthetic gloves.
          Distinct from leather_faux_leather (which mimics leather texture).
        see_also: [schema:material]
        annotations:
          label_en: "Synthetic"
          label_de: "Synthetisch"
      natural_fibre:
        description: >-
          Natural plant-based fibres other than cotton — straw, raffia,
          jute, bamboo, rattan, wicker. Common in summer hats and baskets.
        see_also: [schema:material]
        annotations:
          label_en: "Natural Fibre (Straw / Raffia / Wicker)"
          label_de: "Naturfaser (Stroh / Bast / Weide)"
      glass_crystal:
        description: >-
          Glass or crystal elements. Common in costume jewellery (glass beads,
          crystal pendants) and some decorative accessories.
        see_also: [schema:material]
        annotations:
          label_en: "Glass / Crystal"
          label_de: "Glas / Kristall"
      other:
        description: >-
          Materials not covered above. Record the specific material in
          sorting_notes when known.
        see_also: [schema:material]
        annotations:
          label_en: "Other"
          label_de: "Andere"

  AccessoriesDemographicEnum:
    description: >-
      Simplified age-group demographic for accessories. Gender split not
      modelled — gender is not a meaningful dimension for most accessories
      at the sorting level. This contrasts with DemographicEnum (clothing.yaml)
      which carries adult_male/adult_female because clothing size systems
      are gender-differentiated. Use only when the item clearly targets a
      specific age group (e.g. children's hat, baby mittens).
    permissible_values:
      baby:
        description: "Baby (0-24 months). e.g. baby hats, scratch mittens."
        annotations:
          label_en: "Baby (0-24 months)"
          label_de: "Baby (0-24 Monate)"
      child:
        description: "Child (2-14 years). e.g. children's hats, gloves."
        annotations:
          label_en: "Child (2-14 years)"
          label_de: "Kind (2-14 Jahre)"
      adult:
        description: "Adult. Default for most accessories when demographic matters."
        annotations:
          label_en: "Adult"
          label_de: "Erwachsene"
      all_ages:
        description: "Suitable for all ages or demographic not applicable."
        annotations:
          label_en: "All"
          label_de: "Alle"  