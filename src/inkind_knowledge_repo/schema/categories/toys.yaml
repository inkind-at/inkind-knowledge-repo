---
id: https://inkind-at.github.io/inkind-knowledge-repo/categories/toys
name: toys
title: Toys & Games Category Schema
description: >-
  Defines ToysCategory mixin applied to ToysItem.

  COICOP alignment: Division 09.3 (games, toys, and hobbies).
  https://unstats.un.org/unsd/classifications/Family/Detail/2094

  Ontology grounding:
    Product Types Ontology — pto:Toy, pto:Construction_toy, pto:Doll,
    pto:Board_game, pto:Puzzle, pto:Ride-on_toy, pto:Educational_toy,
    pto:Stuffed_animal, pto:Wood, pto:Rubber
      http://www.productontology.org/id/Toy
    schema:material — overarching property on schema:Product, used as
      see_also anchor for values without a discrete pto: IRI (plastic, metal,
      cardboard, foam, fabric_plush).
      https://schema.org/material

  Material model:
    ToysMaterialEnum records the primary construction material. Operationally
    relevant under the EU Toy Safety Directive 2009/48/EC Annex II (Chemical
    properties — restrictions on hazardous substances in toy materials):
      1. Old plastic toys (pre-2000) may contain lead-based paints or cadmium
         — flagging material=plastic and usage=used triggers a sorter awareness
         note. The schema cannot detect individual chemicals, but material type
         + age awareness can guide triage.
      2. Old PVC toys may contain DEHP/phthalate plasticisers (restricted under
         Directive Annex II, point 45 — phthalates in toys for children under 3).
         Sorters should note in sorting_notes if item appears to be vintage PVC.
      3. Rubber/natural rubber — latex allergen signal. Relevant for teething
         rings and bath toys.
      4. Wood — positive signal for durability and repairability. Supports
         demand signal matching for organisations seeking natural-material toys.
    Material is in the detailed completeness tier.

  Age grading standards:
    EU Toy Safety Directive 2009/48/EC (primary reference):
      https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32009L0048
      Defines age group boundaries and the small parts choking hazard rule.
      ToyAgeRangeEnum values align with the directive's age-grading categories.
    ASTM F963 (US reference, secondary):
      Consumer Safety Specification for Toy Safety — cited for completeness
      as many donated toys originate from the US market.

  UC constraint — small parts choking hazard:
    The uc-toys-small-parts-under3-block rule directly implements the
    EU Toy Safety Directive requirement: toys with small parts must not be
    marketed to or used by children under 3 years of age. This is a legal
    safety requirement, not merely a recommendation.

  Assessment: condition_grade (wear grade). Appropriate here because the
  redistribution signal for toys is primarily how worn/complete the item is,
  not a structured safety checklist (except for the small parts rule, which
  is an attribute constraint, not a condition assessment).

  Completeness tiers:
    minimal:  subcategory, usage
    standard: subcategory, age_range, is_set_complete, usage, condition_grade
    detailed: subcategory, material, age_range, is_set_complete,
              has_small_parts, usage, condition_grade

license: MIT
see_also:
  - http://www.productontology.org/id/Toy
  - https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32009L0048
  - https://unstats.un.org/unsd/classifications/Family/Detail/2094
  - https://schema.org/material

prefixes:
  inkind_knowledge_repo: https://inkind-at.github.io/inkind-knowledge-repo/
  linkml: https://w3id.org/linkml/
  pto: http://www.productontology.org/id/
  schema: http://schema.org/

default_prefix: inkind_knowledge_repo
default_range: string

imports:
  - linkml:types
  - ./_base


classes:

  ToysCategory:
    mixin: true
    is_a: CategoryMixin
    description: >-
      Mixin for toys and games slots and UC rules.
      Applied to ToysItem via mixins: [ToysCategory].
      Age grading follows EU Toy Safety Directive 2009/48/EC.
      The small parts rule (uc-toys-small-parts-under3-block) directly
      implements the Directive's choking hazard requirement.
    see_also:
      - http://www.productontology.org/id/Toy
      - https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32009L0048
    slots:
      - subcategory
      - material
      - age_range
      - is_set_complete
      - has_small_parts
      - condition_grade
    slot_usage:
      subcategory:
        range: ToysSubcategoryEnum
        required: true
      age_range:
        range: ToyAgeRangeEnum
        required: false
      material:
        range: ToysMaterialEnum
        required: false
        description: >-
          Primary construction material. Optional — detailed completeness tier.
          Operationally relevant under EU Toy Safety Directive 2009/48/EC
          Annex II (chemical restrictions in toy materials). See ToysMaterialEnum
          for full vocabulary, ontology grounding, and safety rationale.
      condition_grade:
        range: UsedConditionGradeEnum
        required: false
    annotations:
      completeness_minimal:  "subcategory, usage"
      completeness_standard: "subcategory, age_range, is_set_complete, usage, condition_grade"
      completeness_detailed: "subcategory, material, age_range, is_set_complete, has_small_parts, usage, condition_grade"
      coicop_division: "09.3"
      regulatory_reference: "EU Toy Safety Directive 2009/48/EC; ASTM F963"
    rules:
      - title: uc-toys-small-parts-under3-block
        description: >-
          Toys with small parts must not be assigned to age_0_to_3.
          Implements EU Toy Safety Directive 2009/48/EC choking hazard
          requirement (also ASTM F963 for US-market toys).
          action: block.
        preconditions:
          slot_conditions:
            has_small_parts:
              equals_string: "true"
        postconditions:
          slot_conditions:
            age_range:
              any_of:
                - equals_string: age_3_to_6
                - equals_string: age_6_to_12
                - equals_string: age_12_plus
                - equals_string: adult

      - title: uc-toys-incomplete-set-warn
        description: >-
          Incomplete sets require sorter confirmation — missing pieces may
          render the toy unusable or unsafe for its intended purpose.
          action: warn — sorting_notes required.
        preconditions:
          slot_conditions:
            is_set_complete:
              equals_string: "false"
        postconditions:
          slot_conditions:
            sorting_notes:
              required: true


slots:

  has_small_parts:
    range: boolean
    description: >-
      Whether the item contains small parts posing a choking hazard.
      UC block: has_small_parts=true → age_range must exclude age_0_to_3.
      Implements EU Toy Safety Directive 2009/48/EC.
    annotations:
      label_en: "Has Small Parts"
      label_de: "Enthält Kleinteile"


enums:

  ToysMaterialEnum:
    description: >-
      Primary construction material of a toy or game item.
      Operationally relevant under the EU Toy Safety Directive 2009/48/EC
      Annex II (Chemical properties), which restricts hazardous substances
      in toy materials. Recording material type enables targeted awareness:
        - Old plastic (pre-2000) → potential lead paint or cadmium concern.
          Sorters should note in sorting_notes for age-apparent vintage items.
        - PVC plastic → potential phthalate concern for toys aimed at
          children under 3 (Directive Annex II, point 45).
        - Rubber/natural rubber → latex allergen signal (teething rings,
          bath toys). Fragment compiler may surface allergen note when
          material=rubber and age_range=age_0_to_3.
        - Wood → durability and repairability signal; matches demand for
          natural-material toys.
        - Fabric_plush → allergen signal for dustmite sensitivity.
          Laundering before redistribution is good practice.

      Grounded in pto:Wood, pto:Rubber for values with discrete IRIs, and
      schema:material as the overarching property anchor for the remainder.
    see_also:
      - schema:material
      - https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32009L0048
    permissible_values:
      plastic:
        description: >-
          Plastic (various types — ABS, PP, HDPE, PVC). The most common
          primary toy material. PVC is of particular concern under the
          Directive (phthalate restrictions for toys for under-3s). Sorters
          should note in sorting_notes if item appears to be vintage PVC
          (typically pre-2005 soft plastic with characteristic flexibility
          and smell).
        see_also: [schema:material]
        annotations:
          label_en: "Plastic"
          label_de: "Kunststoff"
      wood:
        description: >-
          Solid wood or wood composite. Positive signal for durability and
          repairability. Common in building blocks, puzzles, pull toys,
          and wooden vehicles. Supports demand matching for natural-material
          toy preferences.
        see_also: [pto:Wood]
        annotations:
          label_en: "Wood"
          label_de: "Holz"
      fabric_plush:
        description: >-
          Soft fabric or plush textile. Primary material for stuffed animals,
          cloth dolls, fabric books, and cloth puzzles. Dust-mite allergen
          signal — laundering before redistribution is recommended best practice.
          Check that soft toys do not have small detachable decorative parts
          (choking hazard for age_0_to_3 — see has_small_parts).
        see_also: [schema:material]
        annotations:
          label_en: "Fabric / Plush"
          label_de: "Stoff / Plüsch"
      rubber_silicone:
        description: >-
          Rubber or silicone. Common in bath toys, teething rings, and some
          bouncy balls. Natural rubber is a known latex allergen — relevant
          for teething rings and squeeze toys for very young children
          (age_0_to_3). Synthetic rubber (TPR, TPE, silicone) is latex-free.
          Record in sorting_notes if natural rubber is identifiable.
        see_also: [pto:Rubber]
        annotations:
          label_en: "Rubber / Silicone"
          label_de: "Gummi / Silikon"
      metal:
        description: >-
          Metal (steel, aluminium, tin, die-cast alloy). Common in die-cast
          model vehicles, metal construction toys, and some board game
          pieces. Older die-cast toys may contain lead alloys — sorters
          should note in sorting_notes for visibly very old metal toys.
        see_also: [schema:material]
        annotations:
          label_en: "Metal"
          label_de: "Metall"
      cardboard_paper:
        description: >-
          Cardboard or paper. Primary material for board games, jigsaw
          puzzles, card games, memory games, and paper craft kits.
          Condition signal: check for water damage, missing pieces.
        see_also: [schema:material]
        annotations:
          label_en: "Cardboard / Paper"
          label_de: "Pappe / Papier"
      foam:
        description: >-
          Foam (EVA, polyurethane, or other foam). Common in foam building
          blocks, play mats, foam sports toys, and puzzle mats.
          Check for crumbling or deterioration — degraded foam can
          produce small particles.
        see_also: [schema:material]
        annotations:
          label_en: "Foam"
          label_de: "Schaum"
      mixed:
        description: >-
          Mixed or composite materials where no single material dominates
          — e.g. a board game with a cardboard board, plastic pieces, and
          paper cards.
        see_also: [schema:material]
        annotations:
          label_en: "Mixed"
          label_de: "Gemischt"
      other:
        description: >-
          Materials not covered above. Record the specific material in
          sorting_notes when known.
        see_also: [schema:material]
        annotations:
          label_en: "Other"
          label_de: "Andere"

  ToysSubcategoryEnum:
    description: Toys subcategories. Grounded in Product Types Ontology.
    permissible_values:
      construction:     {description: "Building blocks, LEGO-style, construction sets.", see_also: [pto:Construction_toy], annotations: {label_en: "Construction toys", label_de: "Konstruktionsspielzeug"}}
      dolls_figures:    {description: "Dolls, action figures, puppets, plush toys.", see_also: [pto:Doll], annotations: {label_en: "Dolls & figures", label_de: "Puppen & Figuren"}}
      board_games:      {description: "Board games, card games, dice games.", see_also: [pto:Board_game], annotations: {label_en: "Board games", label_de: "Brettspiele"}}
      puzzles:          {description: "Jigsaw puzzles, 3D puzzles, shape sorters.", see_also: [pto:Puzzle], annotations: {label_en: "Puzzles", label_de: "Puzzles"}}
      outdoor_toys:     {description: "Balls, kites, skipping ropes, sandpit toys.", annotations: {label_en: "Outdoor toys", label_de: "Draußen-Spielzeug"}}
      ride_on:          {description: "Tricycles, balance bikes, scooters, ride-on cars.", see_also: [pto:Ride-on_toy], annotations: {label_en: "Ride-on toys", label_de: "Rutschfahrzeuge"}}
      arts_crafts:      {description: "Colouring books, craft kits, modelling clay, paint sets.", annotations: {label_en: "Arts & Crafts", label_de: "Kunst & Basteln"}}
      educational:      {description: "Educational games and learning toys.", see_also: [pto:Educational_toy], annotations: {label_en: "Educational toys", label_de: "Lernspielzeug"}}
      plush:            {description: "Soft toys and stuffed animals.", see_also: [pto:Stuffed_animal], annotations: {label_en: "Plush toys", label_de: "Plüschtiere"}}
      other:            {description: "Toys not fitting above subcategories.", annotations: {label_en: "Other", label_de: "Sonstiges"}}

  ToyAgeRangeEnum:
    description: >-
      Age suitability for toys. Values aligned with EU Toy Safety Directive
      2009/48/EC age-grading categories. The age_0_to_3 value is the critical
      boundary for the small parts choking hazard rule.
    see_also:
      - https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32009L0048
    permissible_values:
      age_0_to_3:  {description: "0-3 years. MUST NOT have small parts (EU Toy Safety Directive 2009/48/EC).", annotations: {label_en: "0-3 years", label_de: "0-3 Jahre"}}
      age_3_to_6:  {description: "3-6 years.", annotations: {label_en: "3-6 years", label_de: "3-6 Jahre"}}
      age_6_to_12: {description: "6-12 years.", annotations: {label_en: "6-12 years", label_de: "6-12 Jahre"}}
      age_12_plus: {description: "12 years and above.", annotations: {label_en: "12+ years", label_de: "12+ Jahre"}}
      adult:       {description: "Adult games / collector items; not for children.", annotations: {label_en: "Adult", label_de: "Erwachsene"}}
      all_ages:    {description: "Suitable for all ages.", annotations: {label_en: "All ages", label_de: "Alle Altersgruppen"}}