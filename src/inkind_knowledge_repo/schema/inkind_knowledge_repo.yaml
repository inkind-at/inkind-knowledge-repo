---
id: https://inkind-at.github.io/inkind-knowledge-repo
name: inkind-knowledge-repo
title: inkind-knowledge-repo
description: |-
  Formal knowledge representation for in-kind donation coordination.
  Defines the domain schema, category schemas with constraint rules and
  dependent field maps, process templates, UI fragment bindings, and
  organisation configuration instances.
license: MIT
see_also:
  - https://inkind-at.github.io/inkind-knowledge-repo

prefixes:
  inkind_knowledge_repo: https://inkind-at.github.io/inkind-knowledge-repo/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/

default_prefix: inkind_knowledge_repo
default_range: string

# ── Import order follows schema dependency graph ──────────────────────────────
#
#   1. core             — core domain vocabulary: condition model, lifecycle
#                         states, category registry, cross-cutting operational
#                         slots. Single canonical source for all foundational
#                         definitions. Must appear first so its slot definitions
#                         take precedence when entity schemas are merged.
#                         LinkML de-duplicates diamond imports, so importing
#                         core both here and transitively through entity schemas
#                         is safe.
#
#   2. entities/        — domain entity classes and enums
#   3. categories/      — category-specific attribute schemas and mixin classes
#   4. process/         — step type catalogue and process templates
#   5. ui/              — fragment binding routing table
#   6. provenance       — provenance record (π(s_k))
#
imports:
  - linkml:types
  - core
  - entities/organisation
  - entities/actor
  - entities/storage_location
  - entities/donation_source
  - entities/donation_collection
  - entities/donation_item
  - entities/demand_signal
  - entities/campaign
  - categories/_base
  - categories/accessories
  - categories/clothing
  - categories/footwear
  - categories/furniture
  - categories/bedding_textiles
  - categories/household
  - categories/electronics
  - categories/toys
  - categories/sports
  - categories/books
  - categories/stationery
  - categories/personal_care
  - categories/mobility_aids
  - categories/baby_infant
  - categories/food
  # - process/step_type
  # - process/process_template
  # - ui/fragment_binding
  - provenance

classes:

  NamedThing:
    description: >-
      A generic grouping for any identifiable entity with an id, name, and
      description. Provided as a convenience base class; entity schemas are
      not required to extend it.
    slots:
      - id
      - name
      - description
    class_uri: schema:Thing

# No top-level slots or enums here — all foundational definitions live in
# core.yaml (core domain vocabulary). Entity and category schemas own their
# domain-specific slots and enums. Centralising slot ownership in leaf schemas
# prevents URI conflicts when LinkML merges the full import tree.
